<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الحداد برو - المؤقت والربح</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .video-wrapper { width: 100%; height: 100vh; pointer-events: none; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 15px 0; z-index: 10000; border-top: 1px solid #1a1a1a; }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: flex !important; }
        
        /* مؤقت الدائرة */
        .timer-container { position: absolute; top: 100px; left: 20px; z-index: 1000; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .circle-timer { width: 30px; height: 30px; transform: rotate(-90deg); }
        .circle-timer circle { fill: none; stroke-width: 3; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.1); }
        .circle-progress { stroke: #ef4444; stroke-dasharray: 88; stroke-dashoffset: 88; transition: stroke-dashoffset 1s linear; }

        /* أنيميشن الربح */
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            80% { opacity: 1; transform: translateY(-80px) scale(1); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
        .reward-popup { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #4ade80; font-weight: 900; font-size: 2.5rem; text-shadow: 0 0 20px rgba(74,222,128,0.5); pointer-events: none; z-index: 2000; animation: floatUp 2s forwards; }
        
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; }
        .delete-btn { background: #ef444422; color: #ef4444; padding: 6px 12px; border-radius: 10px; border: 1px solid #ef444444; }
    </style>
</head>
<body>

    <!-- الجزء العلوي -->
    <div class="fixed top-6 left-6 right-6 z-[11000] flex justify-between items-center">
        <div id="balContainer" class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 flex items-center gap-2 transition-all duration-300">
            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            <span id="mainBal" class="text-green-400 font-black text-lg">$0.0000</span>
        </div>
        <div onclick="switchTab('notifs')" class="relative bg-black/60 p-3 rounded-full border border-white/10 cursor-pointer">
            <span>🔔</span>
            <div id="notifBadge" class="absolute top-0 right-0 w-3 h-3 bg-red-600 rounded-full hidden"></div>
        </div>
    </div>

    <!-- المؤقت العائم (يظهر برمجياً) -->
    <div id="videoTimer" class="timer-container hidden">
        <svg class="circle-timer">
            <circle class="circle-bg" cx="15" cy="15" r="14"></circle>
            <circle id="timerProgress" class="circle-progress" cx="15" cy="15" r="14"></circle>
        </svg>
        <span id="timerText" class="text-xs font-bold">10s</span>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active-page !p-0">
        <div class="swiper mySwiper"><div class="swiper-wrapper" id="videoWrapper"></div></div>
    </div>

    <!-- شاشة الإحصائيات -->
    <div id="statsPage" class="page p-6">
        <h2 class="text-3xl font-black mt-12 mb-6">إحصائيات القناة 📉</h2>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="stat-card">
                <p class="text-[10px] text-gray-400 font-bold uppercase">إجمالي المشاهدات</p>
                <p id="totalViews" class="text-2xl font-black text-blue-500">0</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] text-gray-400 font-bold uppercase">الأرباح التقديرية</p>
                <p id="totalEarn" class="text-2xl font-black text-green-400">$0.00</p>
            </div>
        </div>

        <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 mb-8">
            <h3 class="font-bold mb-4">بث فيديو جديد</h3>
            <div class="flex gap-2">
                <input id="ytInput" type="text" placeholder="رابط يوتيوب..." class="flex-1 bg-black border border-white/10 p-3 rounded-xl outline-none">
                <button onclick="handlePublish()" class="bg-red-600 px-6 rounded-xl font-black">نشر</button>
            </div>
        </div>

        <h3 class="font-bold mb-4">فيديوهاتك المنشورة</h3>
        <div id="myVideosList" class="space-y-3"></div>
    </div>

    <!-- بروفايل المستخدم -->
    <div id="userProfilePage" class="page">
        <div class="p-10 text-center bg-gradient-to-b from-red-600/20 to-black">
            <img id="uProfImg" class="w-24 h-24 rounded-full border-4 border-red-600 mx-auto mb-4">
            <h2 id="uProfName" class="text-2xl font-black mb-4 underline">...</h2>
            <div class="flex justify-center gap-10 mb-6">
                <div><p id="uVids" class="text-xl font-bold">0</p><p class="text-[10px] text-gray-500">فيديو</p></div>
                <div><p id="uFolls" class="text-xl font-bold">0</p><p class="text-[10px] text-gray-500">متابع</p></div>
            </div>
            <button id="followBtn" onclick="toggleFollow()" class="bg-red-600 px-10 py-2 rounded-full font-bold">متابعة</button>
        </div>
        <div class="grid grid-cols-3 gap-1 p-1" id="uVidGrid"></div>
    </div>

    <!-- حسابي -->
    <div id="myAccountPage" class="page items-center justify-center p-6 text-center">
        <img id="myPhoto" class="w-28 h-28 rounded-full border-4 border-red-600 mb-4 mx-auto">
        <h2 id="myName" class="text-2xl font-black mb-6">...</h2>
        <div class="bg-white/5 w-full p-8 rounded-[2.5rem] border border-white/10">
            <p class="text-xs text-gray-500 font-bold mb-1 uppercase tracking-widest">المحفظة</p>
            <p id="myBal" class="text-5xl font-black text-green-400">$0.0000</p>
        </div>
    </div>

    <!-- شريط التنقل -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl">🏠</div>
        <div onclick="switchTab('stats')" class="bg-red-600 px-8 py-1.5 rounded-2xl font-black text-2xl">+</div>
        <div onclick="switchTab('profile')" class="text-2xl">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124", storageBucket: "tik-ton-92124.firebasestorage.app",
            messagingSenderId: "885830196454", appId: "1:885830196454:web:a18a778644558e0a8ec9ec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "dev_user_99", first_name: "الحداد👑", photo_url: "" };
        const uID = String(user.id);

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer = null;

        async function init() {
            loadVideos();
            db.collection("users").doc(uID).onSnapshot(doc => {
                if(doc.exists) {
                    balance = doc.data().balance || 0;
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                    document.getElementById('myBal').innerText = `$${balance.toFixed(4)}`;
                }
            });
            document.getElementById('myName').innerText = user.first_name;
            document.getElementById('myPhoto').src = user.photo_url || 'https://via.placeholder.com/150';
        }

        async function loadVideos() {
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderFeed();
                updateStats();
            });
        }

        function renderFeed() {
            const wrapper = document.getElementById('videoWrapper');
            wrapper.innerHTML = '';
            allVideos.forEach((v, i) => {
                wrapper.innerHTML += `
                    <div class="swiper-slide">
                        <div id="player-${i}" class="video-wrapper"></div>
                        <div class="absolute right-4 bottom-32 flex flex-col items-center gap-6 z-[100]">
                            <img src="${v.ownerImg || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-full border-2 border-red-600" onclick="openProfile('${v.ownerId}', '${v.ownerName}', '${v.ownerImg}')">
                            <div class="text-center"><span>❤️</span><p class="text-xs font-bold">${v.likes || 0}</p></div>
                        </div>
                        <div class="absolute bottom-24 right-6 text-right z-[100]">
                            <h3 class="font-black">@${v.ownerName}</h3>
                            <p class="text-[10px] text-gray-400">مشاهدة: ${v.views || 0}</p>
                        </div>
                    </div>`;
            });
            swiper = new Swiper(".mySwiper", { direction: "vertical", on: { slideChange: () => { stopAll(); resetAndStartTimer(swiper.activeIndex); } } });
            setTimeout(initPlayers, 500);
            resetAndStartTimer(0);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1, rel: 0 },
                    events: { onStateChange: (e) => { if(e.data === YT.PlayerState.PLAYING) resetAndStartTimer(i); } }
                });
            });
        }

        function resetAndStartTimer(index) {
            if(currentTimer) clearInterval(currentTimer);
            const video = allVideos[index];
            const timerEl = document.getElementById('videoTimer');
            const progress = document.getElementById('timerProgress');
            const text = document.getElementById('timerText');
            
            // إذا كان المستخدم هو صاحب الفيديو لا يربح
            if(video.ownerId === uID) { timerEl.classList.add('hidden'); return; }

            timerEl.classList.remove('hidden');
            let timeLeft = 10;
            text.innerText = timeLeft + "s";
            progress.style.strokeDashoffset = 88;

            currentTimer = setInterval(async () => {
                timeLeft--;
                text.innerText = timeLeft + "s";
                progress.style.strokeDashoffset = 88 - (88 * (10 - timeLeft) / 10);

                if(timeLeft <= 0) {
                    clearInterval(currentTimer);
                    timerEl.classList.add('hidden');
                    showRewardEffect();
                    await addReward(video.id);
                }
            }, 1000);
        }

        function showRewardEffect() {
            const popup = document.createElement('div');
            popup.className = 'reward-popup';
            popup.innerText = '+0.0005$';
            document.body.appendChild(popup);
            
            const balContainer = document.getElementById('balContainer');
            balContainer.classList.add('scale-110', 'border-green-500', 'shadow-[0_0_20px_#22c55e]');
            
            setTimeout(() => {
                popup.remove();
                balContainer.classList.remove('scale-110', 'border-green-500', 'shadow-[0_0_20px_#22c55e]');
            }, 2000);
        }

        async function addReward(vidId) {
            balance += 0.0005;
            await db.collection("users").doc(uID).set({ balance: balance }, {merge: true});
            await db.collection("shared_videos").doc(vidId).update({ views: firebase.firestore.FieldValue.increment(1) });
        }

        function updateStats() {
            const myVids = allVideos.filter(v => v.ownerId === uID);
            let views = 0; myVids.forEach(v => views += (v.views || 0));
            document.getElementById('totalViews').innerText = views;
            document.getElementById('totalEarn').innerText = `$${(views * 0.001).toFixed(2)}`;

            const list = document.getElementById('myVideosList');
            list.innerHTML = '';
            myVids.forEach(v => {
                list.innerHTML += `
                    <div class="flex items-center gap-4 bg-white/5 p-3 rounded-2xl border border-white/5">
                        <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-16 h-10 rounded-lg">
                        <div class="flex-1 text-sm font-bold">شوهد: ${v.views}</div>
                        <button onclick="deleteVid('${v.id}')" class="delete-btn text-xs">حذف</button>
                    </div>`;
            });
        }

        async function deleteVid(id) { if(confirm("حذف الفيديو؟")) await db.collection("shared_videos").doc(id).delete(); }

        function stopAll() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); }
        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'home') document.getElementById('homePage').classList.add('active-page');
            if(t === 'stats') document.getElementById('statsPage').classList.add('active-page');
            if(t === 'profile') document.getElementById('myAccountPage').classList.add('active-page');
            if(t !== 'home') { stopAll(); document.getElementById('videoTimer').classList.add('hidden'); clearInterval(currentTimer); }
        }

        async function handlePublish() {
            const url = document.getElementById('ytInput').value;
            const vidId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(!vidId) return alert('الرابط خطأ');
            await db.collection("shared_videos").add({ videoId: vidId, ownerId: uID, ownerName: user.first_name, ownerImg: user.photo_url, views: 0, likes: 0, createdAt: new Date() });
            document.getElementById('ytInput').value = ''; alert('تم النشر! 🚀');
        }

        async function openProfile(tID, name, img) {
            document.getElementById('uProfName').innerText = name;
            document.getElementById('uProfImg').src = img || 'https://via.placeholder.com/150';
            const userDoc = await db.collection("users").doc(tID).get();
            document.getElementById('uFolls').innerText = userDoc.exists ? (userDoc.data().followersCount || 0) : 0;
            const grid = document.getElementById('uVidGrid');
            grid.innerHTML = '';
            allVideos.filter(v => v.ownerId === tID).forEach(v => {
                grid.innerHTML += `<div class="aspect-[9/16] bg-gray-900"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`;
            });
            switchTab('userProfile');
        }

        window.onload = init;
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
    </html>
