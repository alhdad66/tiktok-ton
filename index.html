<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Ton - منصة الحداد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Cairo', sans-serif; color: white; }
        .page { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 10; padding-bottom: 80px; }
        .active-page { display: flex !important; z-index: 50 !important; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; }
        .nav-item.active { color: #fff; }
        .plus-btn { background: #ff0000; padding: 5px 18px; border-radius: 12px; color: #white; font-weight: bold; font-size: 24px; margin-top: -5px; }
    </style>
</head>
<body>

    <div id="homePage" class="page active-page">
        <div class="fixed top-8 w-full flex justify-between px-6 z-20 items-center">
            <div class="bg-black/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                <p id="mainBalance" class="text-lg font-black text-green-400">$0.0000</p>
            </div>
            <button onclick="nextVideo()" class="bg-red-600 px-4 py-2 rounded-full font-bold text-xs">التالي ⏭️</button>
        </div>
        <div id="player"></div>
    </div>

    <div id="uploadPage" class="page p-6 text-right">
        <h2 class="text-3xl font-black mt-12 mb-6">انشر فيديو 🚀</h2>
        <input id="ytUrl" type="text" placeholder="رابط يوتيوب هنا..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white mb-4">
        <button onclick="publish()" class="w-full bg-red-600 py-4 rounded-xl font-black">نشر للجميع</button>
    </div>

    <div id="profilePage" class="page p-6 text-center">
        <div class="mt-16 flex flex-col items-center">
            <img id="userImg" src="" class="w-24 h-24 rounded-full border-4 border-red-600 mb-4 hidden">
            <div id="userIcon" class="w-24 h-24 bg-gray-800 rounded-full flex items-center justify-center text-4xl mb-4">👤</div>
            <h2 id="userName" class="text-xl font-black">مستخدم تلجرام</h2>
            <div class="mt-6 bg-green-500/10 p-6 rounded-3xl w-full">
                <p id="profBalance" class="text-4xl font-black text-green-400">$0.0000</p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="tabs('homePage', this)">🏠</div>
        <div class="nav-item" onclick="tabs('uploadPage', this)"><div class="plus-btn">+</div></div>
        <div class="nav-item" onclick="tabs('profilePage', this)">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDyav3T7_ar6Bq_wpHiUasF7rIqM3_S0A",
            authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124",
            storageBucket: "tik-ton-92124.firebasestorage.app",
            messagingSenderId: "885830196454",
            appId: "1:885830196454:web:a18a778644558e0a8ec9ec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // بيانات تلجرام
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user || { id: "test_user", first_name: "ضيف" };
        const userId = String(user.id);

        let player, bal = 0, playlist = ["dQw4w9WgXcQ"], idx = 0;

        // جلب الفيديوهات
        async function getVids() {
            const snap = await db.collection("shared_videos").get();
            if(!snap.empty) playlist = snap.docs.map(d => d.data().videoId);
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: playlist[idx],
                playerVars: {'autoplay':1, 'controls':1, 'playsinline':1},
                events: {'onStateChange': (e) => { if(e.data == 0) earn(0.0010); }}
            });
        }

        async function earn(a) {
            bal += a; updateUI();
            await db.collection("users").doc(userId).set({ balance: bal, name: user.first_name }, { merge: true });
        }

        function nextVideo() {
            idx = (idx + 1) % playlist.length;
            player.loadVideoById(playlist[idx]);
            earn(0.0005);
        }

        async function publish() {
            const url = document.getElementById('ytUrl').value;
            const vidId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(vidId) {
                await db.collection("shared_videos").add({ videoId: vidId, createdAt: new Date() });
                alert('تم النشر!'); location.reload();
            }
        }

        function tabs(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function updateUI() {
            const v = `$${bal.toFixed(4)}`;
            document.getElementById('mainBalance').innerText = v;
            document.getElementById('profBalance').innerText = v;
        }

        window.onload = async () => {
            await getVids();
            // عرض بيانات تلجرام
            document.getElementById('userName').innerText = user.first_name;
            if(user.photo_url) {
                document.getElementById('userImg').src = user.photo_url;
                document.getElementById('userImg').classList.remove('hidden');
                document.getElementById('userIcon').classList.add('hidden');
            }
            const doc = await db.collection("users").doc(userId).get();
            if(doc.exists) { bal = doc.data().balance || 0; updateUI(); }
        };
    </script>
</body>
</html>
