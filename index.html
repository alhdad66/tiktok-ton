<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Ton - منصة الحداد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: 'Cairo', sans-serif; color: white; }
        .page { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; z-index: 10; padding-bottom: 80px; }
        .active-page { display: flex !important; z-index: 50 !important; }
        .video-player { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #666; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #fff; transform: scale(1.1); }
        .plus-btn { background: #2563eb; padding: 5px 18px; border-radius: 12px; color: white; font-weight: bold; font-size: 22px; margin-top: -5px; }
    </style>
</head>
<body>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active-page">
        <div class="fixed top-10 w-full flex justify-center z-20">
            <div class="bg-black/50 backdrop-blur-md px-6 py-2 rounded-full border border-white/10">
                <p id="mainBalance" class="text-xl font-black text-green-400">$0.0000</p>
            </div>
        </div>
        <video id="vPlayer" class="video-player" playsinline loop muted autoplay onclick="nextVideo()">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-girl-walking-in-a-studio-34509-large.mp4">
        </video>
    </div>

    <!-- صفحة الحساب -->
    <div id="profilePage" class="page p-6 text-center">
        <div class="mt-16 mb-10 flex flex-col items-center">
            <div class="w-24 h-24 bg-gray-800 rounded-full flex items-center justify-center text-5xl mb-4 border-2 border-white/10">👤</div>
            <h2 class="text-2xl font-black">المبدع الحداد</h2>
            <div class="mt-6 bg-green-500/10 border border-green-500/20 p-6 rounded-3xl w-full">
                <p class="text-xs text-gray-400 mb-1">أرباحك الحالية</p>
                <p id="profBalance" class="text-4xl font-black text-green-400">$0.0000</p>
            </div>
        </div>
        <button onclick="alert('السحب متاح عند 5$')" class="w-full bg-green-600 py-5 rounded-2xl font-black mb-4">💳 سحب الأرباح</button>
    </div>

    <!-- شريط التنقل -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="changeTab('homePage', this)">🏠</div>
        <div class="nav-item" onclick="alert('قريباً')"><div class="plus-btn">+</div></div>
        <div class="nav-item" onclick="changeTab('profilePage', this)">👤</div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بـ عبود
        const firebaseConfig = {
            apiKey: "AIzaSyDyav3T7_ar6Bq_wpHiUasF7rIqM3_S0A",
            authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124",
            storageBucket: "tik-ton-92124.firebasestorage.app",
            messagingSenderId: "885830196454",
            appId: "1:885830196454:web:a18a778644558e0a8ec9ec"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentBalance = 0.0;
        const videoElement = document.getElementById('vPlayer');
        const videoSources = [
            "https://assets.mixkit.co/videos/preview/mixkit-fashion-girl-walking-in-a-studio-34509-large.mp4",
            "https://assets.mixkit.co/videos/preview/mixkit-man-dancing-under-neon-lights-34405-large.mp4",
            "https://assets.mixkit.co/videos/preview/mixkit-young-woman-modelling-on-a-yellow-background-34510-large.mp4"
        ];
        let videoIndex = 0;

        function changeTab(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(element) element.classList.add('active');
            if(pageId === 'homePage') videoElement.play(); else videoElement.pause();
        }

        async function nextVideo() {
            videoIndex = (videoIndex + 1) % videoSources.length;
            videoElement.src = videoSources[videoIndex];
            videoElement.play();
            
            // زيادة الرصيد
            currentBalance += 0.0005;
            updateDisplay();

            // حفظ في Firebase
            try {
                await db.collection("users").doc("main_user").set({
                    balance: currentBalance,
                    lastSeen: new Date()
                }, { merge: true });
            } catch (e) { console.error(e); }
        }

        function updateDisplay() {
            const val = `$${currentBalance.toFixed(4)}`;
            document.getElementById('mainBalance').innerText = val;
            document.getElementById('profBalance').innerText = val;
        }

        // تحميل البيانات عند البدء
        window.onload = async () => {
            try {
                const doc = await db.collection("users").doc("main_user").get();
                if (doc.exists) {
                    currentBalance = doc.data().balance || 0;
                    updateDisplay();
                }
            } catch (e) { console.log("New User"); }
        };
    </script>
</body>
</html>
