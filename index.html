<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - النسخة المعتمدة</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root { --primary: #dc2626; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); font-family: 'Cairo', sans-serif; color: white; overflow: hidden; position: fixed; }
        
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        iframe { width: 100vw !important; height: 56.25vw !important; max-height: 75vh; }

        .ui-top { position: fixed; top: 40px; left: 20px; right: 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .interactive { pointer-events: auto !important; }

        .glass-card { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; }
        
        .page { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(25px); z-index: 2000; display: none; flex-direction: column; padding: 25px; padding-top: 100px; overflow-y: auto; }
        .page.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); z-index: 1500; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { opacity: 0.4; transition: 0.3s; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-btn.active { opacity: 1; color: var(--primary); }

        .reward-badge { background: var(--primary); padding: 8px 15px; border-radius: 50px; font-weight: 900; font-size: 12px; box-shadow: 0 0 15px rgba(220,38,38,0.4); }
    </style>
</head>
<body>

    <!-- الواجهة العلوية -->
    <div class="ui-top">
        <div onclick="openPage('wallet')" class="interactive bg-black/50 backdrop-blur-xl border border-white/10 px-4 py-2 rounded-full flex items-center gap-2 active:scale-95 transition-all">
            <span id="topBal" class="text-white font-black text-lg tabular-nums">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_8px_red]"></div>
        </div>

        <div id="timerBox" class="hidden reward-badge">
            <span id="timerVal">10s</span>
        </div>
        
        <!-- زر المدير (يظهر لك فقط) -->
        <button id="adminBtn" onclick="requestAdminAccess()" class="hidden interactive bg-zinc-900 w-10 h-10 rounded-full flex items-center justify-center border border-white/10 text-xl">⚙️</button>
    </div>

    <!-- مشغل الفيديوهات -->
    <div id="homePage" class="h-full w-full">
        <div class="swiper mySwiper h-full w-full">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- صفحة المحفظة -->
    <div id="walletPage" class="page">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-red-600 italic">المحفظة 💰</h2>
            <button onclick="closePages()" class="interactive text-zinc-500">إغلاق ✕</button>
        </div>

        <div class="glass-card text-center mb-6">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mb-2">الرصيد المتاح</p>
            <h1 id="wallBal" class="text-5xl font-black mb-10 tabular-nums">$0.0000</h1>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openPage('withdraw')" class="interactive bg-red-600 py-4 rounded-2xl font-black text-xs shadow-lg shadow-red-900/40">سحب المال</button>
                <button onclick="share()" class="interactive bg-zinc-800 py-4 rounded-2xl font-black text-xs">دعوة صديق</button>
            </div>
        </div>

        <div class="glass-card">
            <p class="text-xs font-bold mb-4">رابط الإحالة</p>
            <div class="bg-black p-4 rounded-xl flex items-center gap-2 border border-white/5 overflow-hidden">
                <input id="refInput" readonly class="bg-transparent text-[10px] text-zinc-500 flex-1 outline-none" value="...">
                <button onclick="copy()" class="bg-white text-black px-4 py-2 rounded-lg text-[10px] font-black">نسخ</button>
            </div>
        </div>
    </div>

    <!-- صفحة السحب -->
    <div id="withdrawPage" class="page">
        <h2 class="text-3xl font-black mb-8 text-red-600">طلب سحب</h2>
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div onclick="selectM('USDT')" id="m-usdt" class="glass-card text-center border-2 border-transparent interactive">
                <span class="text-2xl block mb-1">💲</span><p class="text-[10px] font-bold">USDT</p>
            </div>
            <div onclick="selectM('ليبيانا')" id="m-lib" class="glass-card text-center border-2 border-transparent interactive">
                <span class="text-2xl block mb-1">📞</span><p class="text-[10px] font-bold">ليبيانا</p>
            </div>
            <div onclick="selectM('المدار')" id="m-mad" class="glass-card text-center border-2 border-transparent interactive">
                <span class="text-2xl block mb-1">📱</span><p class="text-[10px] font-bold">المدار</p>
            </div>
            <div onclick="selectM('آخر')" id="m-oth" class="glass-card text-center border-2 border-transparent interactive">
                <span class="text-2xl block mb-1">🏦</span><p class="text-[10px] font-bold">أخرى</p>
            </div>
        </div>
        <div id="wForm" class="hidden space-y-4">
            <input id="wAcc" type="text" placeholder="الرقم أو عنوان المحفظة..." class="interactive w-full bg-zinc-900 p-4 rounded-xl outline-none border border-white/5">
            <input id="wAm" type="number" placeholder="المبلغ ($)" class="interactive w-full bg-zinc-900 p-4 rounded-xl outline-none border border-white/5">
            <button onclick="submitWithdraw()" class="interactive w-full bg-red-600 py-5 rounded-2xl font-black shadow-lg shadow-red-900/40">تأكيد العملية</button>
        </div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="adminPage" class="page">
        <h2 class="text-3xl font-black mb-8">لوحة التحكم 🛠️</h2>
        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="glass-card"><p class="text-[9px] opacity-40 uppercase">المستخدمين</p><h4 id="aUsers" class="text-2xl font-black">0</h4></div>
            <div class="glass-card"><p class="text-[9px] opacity-40 uppercase">إجمالي الديون</p><h4 id="aDebt" class="text-2xl font-black text-red-500">$0</h4></div>
        </div>
        <h3 class="font-bold mb-4">طلبات معلقة (<span id="aPend">0</span>)</h3>
        <div id="aReqs" class="space-y-4 pb-24"></div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <div onclick="openPage('wallet')" class="nav-btn interactive" id="btn-wallet">
            <span class="text-2xl">💰</span><span>المحفظة</span>
        </div>
        <div onclick="openPage('home')" class="nav-btn interactive active" id="btn-home">
            <span class="text-2xl">🏠</span><span>الرئيسية</span>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const MY_ID = "7416599626"; // الـ ID الخاص بك عبود
        const uID = String(tg.initDataUnsafe?.user?.id || "88583019");
        const uName = tg.initDataUnsafe?.user?.first_name || "مستخدم";

        let allVideos = [], swiper, players = {}, currentTimer = null, currentBal = 0, selectedMethod = '';

        async function init() {
            // التحقق من هوية المدير
            if(uID === MY_ID) {
                document.getElementById('adminBtn').classList.remove('hidden');
                loadAdmin();
            }

            // مراقبة رصيد المستخدم
            db.collection("users").doc(uID).onSnapshot(d => {
                if(d.exists) {
                    currentBal = d.data().balance || 0;
                    document.getElementById('topBal').innerText = `$${currentBal.toFixed(4)}`;
                    document.getElementById('wallBal').innerText = `$${currentBal.toFixed(4)}`;
                    document.getElementById('refInput').value = `https://t.me/YourBot?start=${uID}`;
                } else {
                    db.collection("users").doc(uID).set({ name: uName, balance: 0, createdAt: new Date() });
                }
            });

            // جلب الفيديوهات
            const snap = await db.collection("shared_videos").orderBy("createdAt", "desc").limit(10).get();
            allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderFeed();
        }

        function renderFeed() {
            const wrap = document.getElementById('videoWrapper');
            wrap.innerHTML = allVideos.map((v, i) => `
                <div class="swiper-slide h-full w-full">
                    <div class="video-container"><div id="v-${i}"></div></div>
                    <div class="fixed bottom-32 right-6 left-6 text-right pointer-events-none z-50">
                        <h3 class="text-xl font-black text-red-600 drop-shadow-lg">@${v.ownerName}</h3>
                        <p class="text-[10px] text-white/60 mt-1">شاهد لمدة 10 ثواني لزيادة رصيدك 🚀</p>
                    </div>
                </div>
            `).join('');

            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", 
                on: { slideChange: () => { stopAll(); playVideo(swiper.activeIndex); } } 
            });

            setTimeout(() => {
                allVideos.forEach((v, i) => {
                    players[i] = new YT.Player(`v-${i}`, {
                        videoId: v.videoId,
                        playerVars: { autoplay: 0, controls: 1, modestbranding: 1, playsinline: 1 },
                        events: { 'onStateChange': (e) => { if(e.data == 1 && i == swiper.activeIndex) startEarning(i); } }
                    });
                });
                playVideo(0);
            }, 800);
        }

        function playVideo(idx) { if(players[idx]?.playVideo) players[idx].playVideo(); }
        function stopAll() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); clearInterval(currentTimer); document.getElementById('timerBox').classList.add('hidden'); }

        function startEarning(idx) {
            clearInterval(currentTimer);
            if(allVideos[idx].ownerId === uID) return;
            const box = document.getElementById('timerBox');
            box.classList.remove('hidden');
            let s = 10;
            document.getElementById('timerVal').innerText = s + "s";
            currentTimer = setInterval(async () => {
                s--;
                document.getElementById('timerVal').innerText = s + "s";
                if(s <= 0) {
                    clearInterval(currentTimer);
                    box.classList.add('hidden');
                    await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(0.0005) });
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 1000);
        }

        function requestAdminAccess() {
            const pass = prompt("أدخل رمز الدخول السري:");
            if(pass === "1234") { // يمكنك تغيير الرمز هنا
                openPage('admin');
            } else {
                tg.showAlert("رمز خاطئ!");
            }
        }

        function selectM(m) {
            selectedMethod = m;
            document.querySelectorAll('.glass-card').forEach(c => c.style.borderColor = 'transparent');
            const idMap = {'USDT':'m-usdt','ليبيانا':'m-lib','المدار':'m-mad','آخر':'m-oth'};
            document.getElementById(idMap[m]).style.borderColor = '#dc2626';
            document.getElementById('wForm').classList.remove('hidden');
        }

        async function submitWithdraw() {
            const am = parseFloat(document.getElementById('wAm').value);
            const acc = document.getElementById('wAcc').value;
            if(am < 5 || am > currentBal || !acc) { tg.showAlert("تأكد من البيانات (الحد الأدنى للسحب $5)"); return; }
            await db.collection("withdrawal_requests").add({ userId: uID, userName: uName, amount: am, method: selectedMethod, accountDetails: acc, status: 'pending', createdAt: new Date() });
            await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(-am) });
            tg.showAlert("تم إرسال طلبك! المراجعة تتم خلال 24 ساعة.");
            closePages();
        }

        function openPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(p === 'home') { closePages(); return; }
            document.getElementById(p + 'Page').classList.add('active');
            if(document.getElementById('btn-'+p)) document.getElementById('btn-'+p).classList.add('active');
            stopAll();
        }

        function closePages() {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-home').classList.add('active');
            playVideo(swiper.activeIndex);
        }

        function copy() { const i = document.getElementById('refInput'); i.select(); document.execCommand('copy'); tg.showScanQrPopup({text:"تم نسخ الرابط!"}); }
        function share() { window.open(`https://t.me/share/url?url=${encodeURIComponent(document.getElementById('refInput').value)}&text=اربح المال من مشاهدة الفيديوهات! 💰`); }

        function loadAdmin() {
            db.collection("withdrawal_requests").where("status","==","pending").onSnapshot(snap => {
                document.getElementById('aPend').innerText = snap.size;
                const list = document.getElementById('aReqs');
                list.innerHTML = snap.docs.map(doc => {
                    const r = doc.data();
                    return `
                        <div class="glass-card border-r-4 border-red-600 mb-2">
                            <div class="flex justify-between items-center mb-2">
                                <div><h5 class="text-sm font-bold">${r.userName}</h5><p class="text-[9px] opacity-40">${r.method}</p></div>
                                <h4 class="text-red-500 font-black">$${r.amount}</h4>
                            </div>
                            <p class="bg-black/50 p-2 rounded text-[10px] mb-3 break-all font-mono">${r.accountDetails}</p>
                            <button onclick="approveReq('${doc.id}')" class="w-full bg-green-600 py-3 rounded-xl text-[10px] font-black">تأكيد الدفع ✅</button>
                        </div>
                    `;
                }).join('');
            });
            db.collection("users").get().then(s => {
                document.getElementById('aUsers').innerText = s.size;
                let d = 0; s.forEach(doc => d += (doc.data().balance || 0));
                document.getElementById('aDebt').innerText = `$${d.toFixed(2)}`;
            });
        }
        async function approveReq(id) { if(confirm("هل أرسلت المال فعلاً؟")) await db.collection("withdrawal_requests").doc(id).update({status:'approved'}); }

        window.onload = init;
    </script>
</body>
</html>
