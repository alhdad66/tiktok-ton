<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - عبود برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 10000; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: flex !important; }
        .timer-badge { position: absolute; top: 110px; left: 20px; background: #dc2626; padding: 8px 15px; border-radius: 50px; z-index: 1000; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .yt-frame-container { position: relative; width: 100%; height: 100%; pointer-events: none; }
        iframe { width: 100%; height: 100%; pointer-events: none; }
        .profile-grid-item { position: relative; width: 100%; aspect-ratio: 1/1; background: #111; overflow: hidden; border: 0.5px solid #222; }
        .profile-grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .tab-btn { position: relative; padding: 10px 0; font-weight: 900; color: #555; transition: all 0.3s; }
        .tab-btn.active { color: white; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: #dc2626; }
        .admin-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Header Balance -->
    <div class="fixed top-8 left-6 right-6 z-[11000] flex justify-between items-center pointer-events-none">
        <div class="bg-zinc-900/95 px-5 py-2.5 rounded-full border border-white/5 pointer-events-auto flex items-center gap-3 shadow-xl">
            <span id="mainBal" class="text-red-500 font-black text-lg">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
        </div>
        <div id="adminBtn" onclick="switchTab('admin')" class="hidden bg-zinc-900/95 p-3 rounded-full border border-white/5 cursor-pointer shadow-lg active:scale-95 transition-transform pointer-events-auto">
            <span class="text-xl">👑</span>
        </div>
    </div>

    <!-- Pages -->
    <div id="homePage" class="page active-page !p-0">
        <div id="videoTimer" class="timer-badge hidden">
            <div class="w-2 h-2 bg-white animate-ping rounded-full"></div>
            <span id="timerText" class="font-black text-xs text-white">10s</span>
        </div>
        <div class="swiper mySwiper"><div class="swiper-wrapper" id="videoWrapper"></div></div>
    </div>

    <div id="tasksPage" class="page p-6 pt-24">
        <h2 class="text-3xl font-black mb-8 italic text-right">المهام 📋</h2>
        <div id="userTasksList" class="space-y-3 pb-10 text-right"></div>
    </div>

    <div id="publishPage" class="page p-6 pt-24">
        <h2 class="text-3xl font-black mb-8 italic text-right">نشر فيديو 🎬</h2>
        <div class="bg-zinc-900/60 p-6 rounded-[2.5rem] border border-white/5 mb-6 space-y-4 text-right">
            <input id="ytUrlInput" type="text" placeholder="رابط فيديو اليوتيوب" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right outline-none">
            <button onclick="addVideo()" class="w-full bg-red-600 p-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-transform">نشر الآن</button>
        </div>
        <h3 class="text-right font-black mb-4 text-zinc-400">فيديوهاتي:</h3>
        <div id="myVidsList" class="space-y-3"></div>
    </div>

    <div id="invitePage" class="page p-6 pt-24 text-right">
        <h2 class="text-3xl font-black mb-2 italic">نظام الإحالة 🎁</h2>
        <div class="bg-zinc-900/60 p-6 rounded-[2rem] border border-white/5 mb-6">
            <p class="text-[10px] text-zinc-500 mb-2 font-bold uppercase">رابط الدعوة الخاص بك</p>
            <div class="flex gap-2 mb-4">
                <input id="refLinkInput" type="text" readonly class="flex-1 bg-black border border-white/10 p-4 rounded-xl text-[10px] outline-none" dir="ltr">
                <button onclick="copyRefLink()" class="bg-white text-black px-6 rounded-xl font-black text-xs">نسخ</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-black p-4 rounded-2xl text-center">
                    <p class="text-[9px] text-zinc-500 mb-1">المدعوين</p>
                    <h4 id="totalReferrals" class="text-xl font-black text-red-500">0</h4>
                </div>
                <div class="bg-black p-4 rounded-2xl text-center">
                    <p class="text-[9px] text-zinc-500 mb-1">الأرباح</p>
                    <h4 id="refEarnings" class="text-xl font-black text-green-500">$0.00</h4>
                </div>
            </div>
        </div>
    </div>

    <div id="notifsPage" class="page p-6 pt-24 text-right">
        <h2 class="text-3xl font-black mb-8 italic">التنبيهات 🔔</h2>
        <div id="notifList" class="space-y-3"></div>
    </div>

    <!-- Profile Page -->
    <div id="profilePage" class="page p-0 pt-16">
        <div class="flex flex-col items-center mb-6 px-6">
            <div class="w-24 h-24 rounded-full border-4 border-red-600 p-1 mb-3">
                <img src="https://ui-avatars.com/api/?background=333&color=fff&name=User" id="uAvatar" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 id="uProfName" class="text-xl font-black uppercase">...</h2>
            <div class="flex gap-10 mt-4 text-center">
                <div><h4 id="profTotalViews" class="text-lg font-black">0</h4><p class="text-[9px] text-zinc-500 uppercase">مشاهدة</p></div>
                <div><h4 id="profTotalLikes" class="text-lg font-black">0</h4><p class="text-[9px] text-zinc-500 uppercase">إعجاب</p></div>
                <div onclick="withdrawRequest()" class="bg-zinc-900 px-4 py-1 rounded-xl cursor-pointer border border-white/10 active:scale-95">
                    <h4 class="text-lg font-black text-green-500">💸</h4><p class="text-[9px] text-green-600 uppercase italic">سحب</p>
                </div>
            </div>
        </div>
        <div class="flex border-b border-zinc-900 mb-1">
            <button onclick="setProfileTab('myvids')" id="tab-myvids" class="tab-btn active flex-1 text-xs">فيديوهاتي</button>
            <button onclick="setProfileTab('liked')" id="tab-liked" class="tab-btn flex-1 text-xs">أعجبني ❤️</button>
            <button onclick="setProfileTab('stats')" id="tab-stats" class="tab-btn flex-1 text-xs">إحصائيات</button>
        </div>
        <div id="grid-container" class="grid grid-cols-3 gap-0.5"></div>
        <div id="stats-container" class="hidden p-4"><canvas id="tradingChart" class="w-full h-40"></canvas></div>
    </div>

    <!-- Admin Page -->
    <div id="adminPage" class="page p-6 pt-24 text-right">
        <h2 class="text-3xl font-black mb-8 text-red-600 italic">الإدارة 👑</h2>
        <div class="space-y-6">
            <div class="admin-card">
                <h3 class="font-black mb-3">إضافة مهمة جديدة</h3>
                <input id="admTTitle" type="text" placeholder="عنوان المهمة" class="w-full bg-black p-3 rounded-lg mb-2 text-xs border border-white/10">
                <input id="admTLink" type="text" placeholder="الرابط" class="w-full bg-black p-3 rounded-lg mb-2 text-xs border border-white/10">
                <input id="admTReward" type="number" placeholder="المكافأة $" class="w-full bg-black p-3 rounded-lg mb-3 text-xs border border-white/10">
                <button onclick="adminAddTask()" class="w-full bg-red-600 py-3 rounded-lg font-black text-xs">إضافة</button>
            </div>
            <div class="admin-card">
                <h3 class="font-black mb-3">طلبات السحب المعلقة</h3>
                <div id="adminWithdrawalsList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl opacity-40">🏠</div>
        <div onclick="switchTab('tasks')" class="text-2xl opacity-40">📋</div>
        <div onclick="switchTab('publish')" class="bg-red-600 w-14 h-10 rounded-2xl flex items-center justify-center font-black text-2xl">➕</div>
        <div onclick="switchTab('invite')" class="text-2xl opacity-40">🎁</div>
        <div onclick="switchTab('notifs')" class="text-2xl opacity-40">🔔</div>
        <div onclick="switchTab('profile')" class="text-2xl opacity-40">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const tgUser = tg.initDataUnsafe?.user || {};
        const uID = String(tgUser.id || "7416599626");
        const userName = tgUser.first_name || "مستخدم جديد";
        const userPhoto = tgUser.photo_url || `https://ui-avatars.com/api/?name=${userName}&background=random`;
        const adminID = "7416599626";

        let balance = 0, userData = {}, swiper, players = {}, currentTimer = null, allVideos = [];

        async function init() {
            const userRef = db.collection("users").doc(uID);
            const userDoc = await userRef.get();
            
            if(!userDoc.exists) {
                await userRef.set({ name: userName, balance: 0, referralCount: 0, referralEarnings: 0, watchedVids: [], likedVids: [], completedTasks: [], createdAt: new Date() });
            }

            userRef.onSnapshot(doc => {
                if(doc.exists) {
                    userData = doc.data();
                    balance = userData.balance || 0;
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                    document.getElementById('totalReferrals').innerText = userData.referralCount || 0;
                    document.getElementById('refEarnings').innerText = `$${(userData.referralEarnings || 0).toFixed(4)}`;
                    document.getElementById('uProfName').innerText = userData.name;
                    document.getElementById('uAvatar').src = userPhoto;
                    document.getElementById('refLinkInput').value = `https://t.me/YOUR_BOT?start=${uID}`;
                    renderProfileGrid();
                }
            });

            if(uID === adminID) {
                document.getElementById('adminBtn').classList.remove('hidden');
                loadAdminData();
            }
            loadVideos();
            loadTasks();
            loadNotifs();
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(t + 'Page')?.classList.add('active-page');
            stopVideos();
            if(t === 'home' && swiper) players[swiper.activeIndex]?.playVideo();
            if(t === 'profile') renderChart();
        }

        function loadVideos() {
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderHome();
                renderMyVids();
                renderProfileGrid();
            });
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper'); wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                const liked = userData.likedVids?.includes(v.id);
                wrap.innerHTML += `
                <div class="swiper-slide relative">
                    <div class="yt-frame-container"><div id="player-${i}"></div></div>
                    <div class="absolute right-4 bottom-32 flex flex-col items-center gap-6 z-10">
                        <div onclick="toggleLike('${v.id}')" class="flex flex-col items-center gap-1 cursor-pointer">
                            <span class="text-3xl ${liked ? 'text-red-500' : 'text-white'}">${liked ? '❤️' : '🤍'}</span>
                            <span class="text-[10px] font-black">${v.likes || 0}</span>
                        </div>
                    </div>
                </div>`;
            });
            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { direction: "vertical", on: { slideChange: () => { stopVideos(); players[swiper.activeIndex]?.playVideo(); } } });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId, playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, rel: 0, modestbranding: 1 },
                    events: { 'onStateChange': (e) => { if(e.data == 1 && i == swiper.activeIndex) startCountdown(i); } }
                });
            });
        }

        function startCountdown(idx) {
            clearInterval(currentTimer);
            const v = allVideos[idx]; if(!v || v.ownerId === uID || userData.watchedVids?.includes(v.id)) return;
            document.getElementById('videoTimer').classList.remove('hidden');
            let sec = 10;
            currentTimer = setInterval(async () => {
                sec--; document.getElementById('timerText').innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer); document.getElementById('videoTimer').classList.add('hidden');
                    await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(0.0005), watchedVids: firebase.firestore.FieldValue.arrayUnion(v.id) });
                    db.collection("shared_videos").doc(v.id).update({ views: firebase.firestore.FieldValue.increment(1) });
                }
            }, 1000);
        }

        async function toggleLike(vId) {
            const isLiked = userData.likedVids?.includes(vId);
            const userRef = db.collection("users").doc(uID);
            const vidRef = db.collection("shared_videos").doc(vId);
            if(isLiked) {
                await userRef.update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vId) });
                await vidRef.update({ likes: firebase.firestore.FieldValue.increment(-1) });
            } else {
                await userRef.update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vId) });
                await vidRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
            }
        }

        function renderMyVids() {
            const list = document.getElementById('myVidsList'); if(!list) return;
            const mine = allVideos.filter(v => v.ownerId === uID);
            list.innerHTML = mine.map(v => `
                <div class="bg-zinc-900/60 p-3 rounded-2xl flex items-center gap-4 border border-white/5">
                    <img src="https://img.youtube.com/vi/${v.videoId}/default.jpg" class="w-16 h-12 rounded-lg">
                    <div class="flex-1 text-right text-[10px] text-zinc-400">👀 ${v.views || 0} | ❤️ ${v.likes || 0}</div>
                    <button onclick="deleteVideo('${v.id}')" class="text-red-500 font-black text-xs">حذف</button>
                </div>`).join('');
            document.getElementById('profTotalViews').innerText = mine.reduce((a,b)=>a+(b.views||0),0);
            document.getElementById('profTotalLikes').innerText = mine.reduce((a,b)=>a+(b.likes||0),0);
        }

        let activeTab = 'myvids';
        function setProfileTab(t) {
            activeTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            if(t === 'stats') { document.getElementById('grid-container').classList.add('hidden'); document.getElementById('stats-container').classList.remove('hidden'); }
            else { document.getElementById('grid-container').classList.remove('hidden'); document.getElementById('stats-container').classList.add('hidden'); renderProfileGrid(); }
        }

        function renderProfileGrid() {
            const grid = document.getElementById('grid-container'); if(!grid) return;
            let vids = activeTab === 'myvids' ? allVideos.filter(v => v.ownerId === uID) : allVideos.filter(v => userData.likedVids?.includes(v.id));
            grid.innerHTML = vids.map(v => `<div class="profile-grid-item" onclick="switchTab('home')"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg"></div>`).join('');
        }

        async function addVideo() {
            const url = document.getElementById('ytUrlInput').value;
            const vidId = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|\/v\/|embed\/|shorts\/))([^?&"'>]+)/)?.[1];
            if(!vidId) return alert("رابط يوتيوب غير صحيح");
            await db.collection("shared_videos").add({ videoId: vidId, ownerId: uID, views: 0, likes: 0, createdAt: new Date() });
            document.getElementById('ytUrlInput').value = ''; alert("تم النشر!");
        }

        async function deleteVideo(id) { if(confirm("حذف الفيديو؟")) await db.collection("shared_videos").doc(id).delete(); }

        async function adminAddTask() {
            const t = document.getElementById('admTTitle').value, l = document.getElementById('admTLink').value, r = parseFloat(document.getElementById('admTReward').value);
            if(!t || !l || !r) return alert("املأ كل الحقول");
            await db.collection("tasks").add({ title: t, link: l, reward: r, createdAt: new Date() });
            alert("تمت الإضافة!");
        }

        function loadAdminData() {
            db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
                const list = document.getElementById('adminWithdrawalsList');
                list.innerHTML = snap.docs.map(doc => {
                    const w = doc.data();
                    return `<div class="bg-black p-3 rounded-xl border border-white/10 flex justify-between items-center text-[10px]">
                        <button onclick="approveWithdraw('${doc.id}')" class="bg-green-600 px-3 py-1 rounded">قبول</button>
                        <span>${w.userName} - $${w.amount.toFixed(2)}</span>
                    </div>`;
                }).join('');
            });
        }

        async function approveWithdraw(id) { await db.collection("withdrawals").doc(id).update({ status: 'approved' }); alert("تم القبول"); }

        function loadTasks() {
            db.collection("tasks").onSnapshot(snap => {
                const l = document.getElementById('userTasksList');
                l.innerHTML = snap.docs.map(doc => {
                    const t = doc.data(); const done = userData.completedTasks?.includes(doc.id);
                    return `<div class="bg-zinc-900/60 p-4 rounded-2xl flex justify-between border border-white/5">
                        <button onclick="${done ? '' : `doTask('${doc.id}', '${t.link}', ${t.reward})`}" class="${done ? 'text-zinc-500' : 'text-red-500'} font-black text-xs">${done ? 'تم' : 'تنفيذ'}</button>
                        <div><p class="text-sm font-black">${t.title}</p><p class="text-xs text-green-500">+$${t.reward}</p></div>
                    </div>`;
                }).join('');
            });
        }

        async function doTask(id, link, reward) { window.open(link, '_blank'); if(confirm("تمت المهمة؟")) { await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(reward), completedTasks: firebase.firestore.FieldValue.arrayUnion(id) }); } }

        function loadNotifs() {
            db.collection("users").doc(uID).collection("notifs").orderBy("createdAt", "desc").limit(5).onSnapshot(snap => {
                document.getElementById('notifList').innerHTML = snap.docs.map(doc => `<div class="bg-zinc-900/40 p-3 rounded-xl text-xs">${doc.data().message}</div>`).join('');
            });
        }

        function stopVideos() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); clearInterval(currentTimer); }

        function renderChart() {
            const ctx = document.getElementById('tradingChart')?.getContext('2d'); if(!ctx) return;
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, { type: 'line', data: { labels: ['A','B','C','D','E'], datasets: [{ data:[10,25,15,30,20], borderColor:'#dc2626', tension:0.4, borderWeight:3, pointRadius:0 }] }, options: { plugins:{legend:{display:false}}, scales:{y:{display:false},x:{display:false}} } });
        }

        window.onload = init;
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
