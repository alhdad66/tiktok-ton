<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abood Pro V7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        
        /* شريط التنقل السفلي كما في الصورة */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 1000; border-top: 1px solid #1a1a1a; height: 70px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; cursor: pointer; flex: 1; }
        .nav-item.active { color: #fff; }
        .nav-item span { font-size: 10px; font-weight: bold; margin-top: 2px; }

        /* الزر الأحمر المركزي (+) */
        .plus-btn { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 55px; height: 45px; background: #e63946; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; z-index: 1100; box-shadow: 0 0 15px rgba(230, 57, 70, 0.4); cursor: pointer; }

        /* نافذة النشر والإحصائيات (تظهر عند ضغط +) */
        #publishModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; padding: 20px; padding-top: 60px; backdrop-filter: blur(10px); }
        .chart-container { background: #0a0a0a; border-radius: 30px; padding: 15px; border: 1px solid #1a1a1a; height: 180px; margin-bottom: 20px; }
        
        /* التايمر والأزرار الجانبية في الفيديو */
        .timer-circle { position: absolute; top: 110px; left: 20px; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid #e63946; display: flex; align-items: center; justify-content: center; z-index: 500; color: #e63946; font-weight: 900; }
        .side-actions { position: absolute; bottom: 120px; right: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 500; }
        .action-btn { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); font-size: 20px; }

        /* ستايل الصفحة */
        .page { position: fixed; inset: 0; background: #000; z-index: 100; display: none; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: block !important; }
        
        iframe { width: 100%; height: 100vh; transform: scale(1.65); pointer-events: none; }
    </style>
</head>
<body>

    <!-- التوازن العلوي (ثابت) -->
    <div class="fixed top-10 left-0 right-0 z-[1500] px-6 flex justify-between items-center">
        <div id="adminBtn" onclick="switchTab('admin')" class="hidden w-11 h-11 bg-red-600 rounded-full flex items-center justify-center text-xl shadow-lg cursor-pointer">👑</div>
        <div class="bg-zinc-900/80 px-4 py-2 rounded-full border border-white/5 flex items-center gap-2">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
            <span id="mainBal" class="text-red-600 font-black italic">$0.0000</span>
        </div>
    </div>

    <!-- زر الزائد المركزي -->
    <div class="plus-btn" onclick="togglePublishModal()">+</div>

    <!-- نافذة النشر (الرسم البياني + الحقل) -->
    <div id="publishModal">
        <div class="flex justify-between items-center mb-6">
            <button onclick="togglePublishModal()" class="text-zinc-500 text-sm">إغلاق ✕</button>
            <h2 class="text-xl font-black italic text-red-600">إحصائيات القناة</h2>
        </div>
        
        <div class="chart-container">
            <canvas id="statsChart"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900 p-4 rounded-2xl text-center border border-white/5">
                <p class="text-[10px] text-zinc-500">المشاهدات</p>
                <h4 id="stViews" class="text-xl font-black text-red-600">0</h4>
            </div>
            <div class="bg-zinc-900 p-4 rounded-2xl text-center border border-white/5">
                <p class="text-[10px] text-zinc-500">التفاعل</p>
                <h4 id="stLikes" class="text-xl font-black text-red-600">0</h4>
            </div>
        </div>

        <div class="bg-zinc-900 p-5 rounded-3xl border border-red-600/20">
            <p class="text-xs text-zinc-400 mb-3 text-right">رابط فيديو يوتيوب الجديد:</p>
            <div class="flex gap-2">
                <button onclick="handlePublish()" class="bg-red-600 px-6 rounded-xl font-bold">نشر</button>
                <input id="ytInput" type="text" placeholder="https://..." class="flex-1 bg-black border border-white/10 p-3 rounded-xl text-sm outline-none">
            </div>
        </div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active-page">
        <div id="videoTimer" class="timer-circle hidden">10</div>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- صفحة الأرباح -->
    <div id="withdrawPage" class="page p-6 pt-32 text-right">
        <h2 class="text-3xl font-black italic mb-8">أرباحي 💰</h2>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-white/5 mb-6 text-center">
            <p class="text-zinc-500 text-sm mb-2">الرصيد المتاح للسحب</p>
            <h1 id="withdrawBal" class="text-5xl font-black text-red-600">$0.0000</h1>
        </div>
        <button onclick="requestWithdraw()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg">سحب الآن عبر USDT</button>
    </div>

    <!-- صفحة المهام -->
    <div id="tasksPage" class="page p-6 pt-32 text-right">
        <h2 class="text-3xl font-black italic mb-8">المهام اليومية 🔥</h2>
        <div class="space-y-4">
            <div class="bg-zinc-900 p-5 rounded-2xl border border-white/5 flex justify-between items-center">
                <button class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold">ابدأ</button>
                <div>
                    <p class="font-bold">مشاهدة 10 فيديوهات</p>
                    <p class="text-[10px] text-zinc-500">الجائزة: $0.005</p>
                </div>
            </div>
        </div>
    </div>

    <!-- الملف الشخصي -->
    <div id="profilePage" class="page">
        <div class="pt-32 pb-12 text-center bg-zinc-900/50">
            <img id="uProfImg" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-red-600 shadow-2xl mb-4 object-cover">
            <h2 id="uProfName" class="text-2xl font-black">...</h2>
            <div class="flex justify-center gap-10 mt-6">
                <div><p id="followersCount" class="font-black text-red-600 text-xl">0</p><span class="text-[10px] text-zinc-500">متابع</span></div>
                <div><p class="font-black text-red-600 text-xl">0</p><span class="text-[10px] text-zinc-500">يتابع</span></div>
            </div>
        </div>
        <div id="profileGrid" class="grid grid-cols-3 gap-1 p-1 mt-4"></div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="adminPage" class="page p-6 pt-32 text-right">
        <h2 class="text-2xl font-black text-red-600 mb-6">طلبات السحب المعلقة</h2>
        <div id="withdrawRequestsList" class="space-y-4"></div>
    </div>

    <!-- الشريط السفلي المطابق للصور -->
    <div class="nav-bar">
        <div onclick="switchTab('profile_self')" class="nav-item"><span>👤</span><span>حسابي</span></div>
        <div onclick="switchTab('withdraw')" class="nav-item"><span>💰</span><span>الأرباح</span></div>
        <div class="flex-1"></div> <!-- فراغ للزر المركزي -->
        <div onclick="switchTab('tasks')" class="nav-item"><span>🔥</span><span>المهام</span></div>
        <div onclick="switchTab('home')" class="nav-item active"><span>🏠</span><span>الرئيسية</span></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "7416599626");
        const adminID = "7416599626";

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer, watchedList = [];

        async function init() {
            const userRef = db.collection("users").doc(uID);
            const doc = await userRef.get();
            if(!doc.exists) await userRef.set({ name: tg.initDataUnsafe?.user?.first_name || "user@", img: tg.initDataUnsafe?.user?.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png", balance: 0, watchedVids: [], following: [], followersCount: 0 });
            
            if(uID === adminID) document.getElementById('adminBtn').classList.remove('hidden');

            userRef.onSnapshot(s => {
                if(s.exists) {
                    balance = s.data().balance || 0;
                    watchedList = s.data().watchedVids || [];
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                    document.getElementById('withdrawBal').innerText = `$${balance.toFixed(4)}`;
                }
            });

            db.collection("shared_videos").onSnapshot(snap => {
                allVideos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderHome();
                updateStats();
            });

            initChart();
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                wrap.innerHTML += `
                <div class="swiper-slide relative">
                    <div id="player-${i}"></div>
                    <div class="side-actions">
                        <div onclick="openProfile('${v.ownerId}')"><img src="${v.ownerImg}" class="w-11 h-11 rounded-full border-2 border-red-600 mb-4"></div>
                        <div class="flex flex-col items-center"><div class="action-btn text-red-500">❤️</div><span class="text-[10px] mt-1">${v.likes || 0}</span></div>
                        <div class="flex flex-col items-center"><div class="action-btn">💬</div><span class="text-[10px] mt-1">${v.views || 0}</span></div>
                        <div class="flex flex-col items-center"><div class="action-btn">🔁</div><span class="text-[10px] mt-1">مشاركة</span></div>
                    </div>
                </div>`;
            });
            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { direction: "vertical", on: { slideChange: () => handleSlideChange() } });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, { videoId: v.videoId, playerVars: { autoplay: i===0?1:0, controls: 0, modestbranding: 1, playsinline: 1 },
                    events: { onStateChange: (e) => { if(e.data === YT.PlayerState.PLAYING) startTimer(i); } }
                });
            });
        }

        function handleSlideChange() {
            clearInterval(currentTimer);
            document.getElementById('videoTimer').classList.add('hidden');
            Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo());
            if(players[swiper.activeIndex]?.playVideo) players[swiper.activeIndex].playVideo();
        }

        function startTimer(idx) {
            if(watchedList.includes(allVideos[idx].id)) return;
            clearInterval(currentTimer);
            let timeLeft = 10;
            const badge = document.getElementById('videoTimer');
            badge.classList.remove('hidden');
            badge.innerText = timeLeft;
            currentTimer = setInterval(async () => {
                timeLeft--;
                badge.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(currentTimer);
                    badge.classList.add('hidden');
                    awardUser(allVideos[idx].id);
                }
            }, 1000);
        }

        async function awardUser(vidId) {
            await db.collection("users").doc(uID).update({
                balance: firebase.firestore.FieldValue.increment(0.0005),
                watchedVids: firebase.firestore.FieldValue.arrayUnion(vidId)
            });
            await db.collection("shared_videos").doc(vidId).update({ views: firebase.firestore.FieldValue.increment(1) });
        }

        function togglePublishModal() {
            const m = document.getElementById('publishModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function handlePublish() {
            const val = document.getElementById('ytInput').value;
            const vidId = val.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(!vidId) return alert("الرابط غير صحيح");
            await db.collection("shared_videos").add({ videoId: vidId, ownerId: uID, ownerName: tg.initDataUnsafe?.user?.first_name || "user@", ownerImg: tg.initDataUnsafe?.user?.photo_url || "", views: 0, likes: 0 });
            document.getElementById('ytInput').value = '';
            togglePublishModal();
            alert("تم النشر بنجاح!");
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(t === 'profile_self') { openProfile(uID); return; }
            document.getElementById(t + 'Page')?.classList.add('active-page');
            Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo());
        }

        function initChart() {
            const ctx = document.getElementById('statsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5', '6'],
                    datasets: [{
                        data: [5, 12, 8, 20, 15, 25],
                        borderColor: '#e63946',
                        backgroundColor: 'rgba(230, 57, 70, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        async function openProfile(id) {
            const doc = await db.collection("users").doc(id).get();
            const data = doc.data();
            document.getElementById('uProfName').innerText = data.name;
            document.getElementById('uProfImg').src = data.img;
            document.getElementById('followersCount').innerText = data.followersCount || 0;
            const grid = document.getElementById('profileGrid'); grid.innerHTML = '';
            allVideos.filter(v => v.ownerId === id).forEach(v => {
                grid.innerHTML += `<div class="aspect-[3/4] bg-zinc-900 rounded-lg overflow-hidden"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`;
            });
            switchTab('profile');
        }

        function updateStats() {
            const mine = allVideos.filter(v => v.ownerId === uID);
            document.getElementById('stViews').innerText = mine.reduce((a, b) => a + (b.views || 0), 0);
            document.getElementById('stLikes').innerText = mine.reduce((a, b) => a + (b.likes || 0), 0);
        }

        window.onload = init;
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
