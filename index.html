<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة المنصة - عبود برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 10000; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: flex !important; }
        .admin-section { background: #111; border: 1px solid #222; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        .btn-action { transition: all 0.2s active:scale-95; }
        .banned-overlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .swiper { width: 100%; height: 100vh; }
        .timer-badge { position: absolute; top: 110px; left: 20px; background: #dc2626; padding: 8px 15px; border-radius: 50px; z-index: 1000; display: flex; align-items: center; gap: 8px; }
        .yt-frame-container { position: relative; width: 100%; height: 100%; pointer-events: none; }
        iframe { width: 100%; height: 100%; }
        .profile-tab.active { border-bottom: 3px solid #dc2626; color: #dc2626; opacity: 1; }
        .profile-tab { opacity: 0.5; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Banned Overlay -->
    <div id="bannedScreen" class="banned-overlay">
        <h1 class="text-6xl mb-4">🚫</h1>
        <h2 class="text-3xl font-black text-red-600 mb-2">تم حظر حسابك</h2>
        <p class="text-zinc-500">لقد انتهكت سياسات المنصة. يرجى التواصل مع الإدارة.</p>
    </div>

    <!-- Balance Header -->
    <div class="fixed top-8 left-6 right-6 z-[11000] flex justify-between items-center pointer-events-none">
        <div class="bg-zinc-900/95 px-5 py-2.5 rounded-full border border-white/5 pointer-events-auto flex items-center gap-3">
            <span id="mainBal" class="text-red-500 font-black text-lg">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
        </div>
        <div id="adminBtn" onclick="switchTab('admin')" class="hidden bg-zinc-900/95 p-3 rounded-full border border-white/5 cursor-pointer pointer-events-auto">
            <span class="text-xl">👑</span>
        </div>
    </div>

    <!-- Home Page -->
    <div id="homePage" class="page active-page !p-0">
        <div id="videoTimer" class="timer-badge hidden">
            <span id="timerText" class="font-black text-xs">10s</span>
        </div>
        <div class="swiper mySwiper"><div class="swiper-wrapper" id="videoWrapper"></div></div>
    </div>

    <!-- Stats/Post Page -->
    <div id="statsPage" class="page p-6 pt-24 text-right">
        <h2 class="text-2xl font-black mb-6">الإحصائيات والنشر 📈</h2>
        <div class="bg-red-600/10 p-6 rounded-3xl border border-red-600/20 mb-6">
            <p class="text-xs font-black text-red-500 mb-4">نشر فيديو (رابط يوتيوب)</p>
            <div class="flex gap-2">
                <input id="ytInput" type="text" placeholder="https://..." class="flex-1 bg-black border border-white/10 p-4 rounded-2xl text-xs text-right outline-none">
                <button onclick="handlePublish()" class="bg-red-600 px-6 rounded-2xl font-black">نشر</button>
            </div>
        </div>
        <div id="myVideosList" class="space-y-3"></div>
    </div>

    <!-- Profile Page -->
    <div id="profilePage" class="page !p-0">
        <div class="pt-24 pb-8 text-center bg-zinc-900/40">
            <img id="uProfImg" src="" class="w-24 h-24 mx-auto rounded-full border-2 border-red-600 mb-4 object-cover">
            <h2 id="uProfName" class="text-2xl font-black">...</h2>
            <div class="flex justify-center gap-8 mt-4">
                <div><p id="uVidsCount" class="font-black">0</p><p class="text-[10px] text-zinc-500">فيديو</p></div>
                <div><p id="uFollsCount" class="font-black">0</p><p class="text-[10px] text-zinc-500">متابع</p></div>
            </div>
            <div class="px-10 mt-6 space-y-2">
                <button id="followBtn" onclick="toggleFollow()" class="w-full bg-red-600 py-3 rounded-2xl font-black text-sm">متابعة</button>
                <button id="withdrawRequestBtn" onclick="requestWithdrawal()" class="w-full bg-white text-black py-3 rounded-2xl font-black text-sm hidden">طلب سحب أرباح 💸</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-1 p-1" id="profileGrid"></div>
    </div>

    <!-- Admin Page (The Core Upgrade) -->
    <div id="adminPage" class="page p-6 pt-24 text-right">
        <h2 class="text-3xl font-black mb-8 text-red-600 italic">الإدارة العليا 👑</h2>

        <!-- Section: Withdrawals -->
        <div class="admin-section">
            <h3 class="text-lg font-black mb-4">💰 طلبات السحب المعلقة</h3>
            <div id="adminWithdrawals" class="space-y-3"></div>
        </div>

        <!-- Section: User Management -->
        <div class="admin-section">
            <h3 class="text-lg font-black mb-4">🚫 إدارة المستخدمين (حظر)</h3>
            <div class="flex gap-2 mb-4">
                <input id="searchUserID" type="text" placeholder="أدخل ID المستخدم..." class="flex-1 bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <button onclick="manageUserStatus()" class="bg-white text-black px-4 rounded-2xl font-black text-xs">بحث/تعديل</button>
            </div>
            <div id="userStatusResult" class="text-xs font-bold text-red-500"></div>
        </div>

        <!-- Section: Tasks -->
        <div class="admin-section">
            <h3 class="text-lg font-black mb-4">📋 إضافة مهمة جديدة</h3>
            <div class="space-y-3">
                <input id="taskT" type="text" placeholder="عنوان المهمة" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <input id="taskL" type="text" placeholder="الرابط" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <input id="taskR" type="number" step="0.001" placeholder="المكافأة $" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <button onclick="addNewTask()" class="w-full bg-red-600 py-4 rounded-2xl font-black">نشر المهمة</button>
            </div>
        </div>
    </div>

    <!-- Nav Bar -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl opacity-40 hover:opacity-100">🏠</div>
        <div onclick="switchTab('stats')" class="bg-red-600 w-12 h-10 rounded-xl flex items-center justify-center font-black text-xl">+</div>
        <div onclick="switchTab('profile_self')" class="text-2xl opacity-40 hover:opacity-100">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "7416599626");
        const uName = tg.initDataUnsafe?.user?.first_name || "Guest";
        const uPic = tg.initDataUnsafe?.user?.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";
        const adminID = "7416599626";

        let allVids = [], myLikes = [], myFollowing = [], userData = {};
        let swiper, players = {}, currentTimer = null;

        async function init() {
            const userRef = db.collection("users").doc(uID);
            
            // تحقق من الحظر أولاً
            userRef.onSnapshot(doc => {
                if(doc.exists) {
                    userData = doc.data();
                    if(userData.isBanned) {
                        document.getElementById('bannedScreen').style.display = 'flex';
                        return;
                    }
                    document.getElementById('mainBal').innerText = `$${(userData.balance || 0).toFixed(4)}`;
                    myLikes = userData.likedVids || [];
                    myFollowing = userData.following || [];
                    if(uID === adminID) document.getElementById('adminBtn').classList.remove('hidden');
                } else {
                    userRef.set({ name: uName, img: uPic, balance: 0.5, isBanned: false, following: [], likedVids: [], followersCount: 0 });
                }
            });

            // تحميل الفيديوهات
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVids = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderHome();
                renderMyVids();
            });

            if(uID === adminID) {
                loadAdminData();
            }
        }

        // --- لوحة التحكم (Admin Functions) ---
        function loadAdminData() {
            // تحميل طلبات السحب
            db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
                const container = document.getElementById('adminWithdrawals');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const w = doc.data();
                    container.innerHTML += `
                        <div class="bg-zinc-900 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                            <div class="flex gap-2">
                                <button onclick="updateWithdrawal('${doc.id}', 'approved', '${w.uid}', ${w.amount})" class="bg-green-600 text-[10px] px-3 py-1 rounded-lg font-bold">قبول</button>
                                <button onclick="updateWithdrawal('${doc.id}', 'rejected', '${w.uid}', ${w.amount})" class="bg-red-600 text-[10px] px-3 py-1 rounded-lg font-bold">رفض</button>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black">${w.uName}</p>
                                <p class="text-[10px] text-green-500">$${w.amount.toFixed(2)}</p>
                            </div>
                        </div>`;
                });
            });
        }

        async function updateWithdrawal(docId, status, userId, amount) {
            await db.collection("withdrawals").doc(docId).update({ status: status });
            if(status === 'rejected') {
                // إعادة المبلغ للمستخدم إذا رفض الطلب
                await db.collection("users").doc(userId).update({ balance: firebase.firestore.FieldValue.increment(amount) });
            }
            alert("تم تحديث حالة الطلب");
        }

        async function manageUserStatus() {
            const id = document.getElementById('searchUserID').value;
            if(!id) return;
            const doc = await db.collection("users").doc(id).get();
            if(!doc.exists) {
                document.getElementById('userStatusResult').innerText = "المستخدم غير موجود";
                return;
            }
            const data = doc.data();
            const newStatus = !data.isBanned;
            await db.collection("users").doc(id).update({ isBanned: newStatus });
            document.getElementById('userStatusResult').innerText = newStatus ? "تم حظر المستخدم" : "تم فك الحظر";
        }

        async function addNewTask() {
            const title = document.getElementById('taskT').value;
            const link = document.getElementById('taskL').value;
            const reward = parseFloat(document.getElementById('taskR').value);
            if(!title || !link || isNaN(reward)) return;
            await db.collection("tasks").add({ title, link, reward, createdAt: new Date() });
            alert("تمت إضافة المهمة");
            document.getElementById('taskT').value = '';
        }

        // --- وظائف المستخدم (User Functions) ---
        async function requestWithdrawal() {
            if(userData.balance < 5) {
                alert("الحد الأدنى للسحب هو 5 دولار");
                return;
            }
            const amount = userData.balance;
            await db.collection("users").doc(uID).update({ balance: 0 });
            await db.collection("withdrawals").add({
                uid: uID, uName: uName, amount: amount, status: "pending", createdAt: new Date()
            });
            alert("تم إرسال طلب السحب بنجاح");
        }

        async function handlePublish() {
            const val = document.getElementById('ytInput').value;
            const vID = val.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(vID) {
                await db.collection("shared_videos").add({
                    videoId: vID, ownerId: uID, ownerName: uName, ownerImg: uPic, views: 0, likes: 0, createdAt: new Date()
                });
                document.getElementById('ytInput').value = '';
                alert("تم النشر!");
            }
        }

        function renderMyVids() {
            const list = document.getElementById('myVideosList');
            list.innerHTML = '<h3 class="text-sm font-black mb-4">مقاطعي المنشورة</h3>';
            allVids.filter(v => v.ownerId === uID).forEach(v => {
                list.innerHTML += `
                    <div class="bg-zinc-900/40 p-3 rounded-2xl flex items-center gap-4 border border-white/5">
                        <button onclick="deleteMyVid('${v.id}')" class="text-red-500 text-[10px] font-black">حذف</button>
                        <div class="flex-1"><p class="text-[10px] text-zinc-500">Views: ${v.views}</p></div>
                        <img src="https://img.youtube.com/vi/${v.videoId}/default.jpg" class="w-12 h-10 rounded-lg">
                    </div>`;
            });
        }

        async function deleteMyVid(id) {
            if(confirm("حذف الفيديو؟")) await db.collection("shared_videos").doc(id).delete();
        }

        // --- نظام الفيديو والواجهة (UI & Video) ---
        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            if(!wrap) return;
            const cIdx = swiper ? swiper.activeIndex : 0;
            wrap.innerHTML = '';
            allVids.forEach((v, i) => {
                const liked = myLikes.includes(v.id);
                wrap.innerHTML += `
                    <div class="swiper-slide bg-black">
                        <div class="yt-frame-container"><div id="player-${i}"></div></div>
                        <div class="absolute right-5 bottom-32 flex flex-col items-center gap-6 z-50 pointer-events-auto">
                            <img src="${v.ownerImg}" class="w-14 h-14 rounded-full border-2 border-red-600" onclick="openProfile('${v.ownerId}')">
                            <div onclick="toggleLike('${v.id}')" class="text-center">
                                <span class="text-3xl ${liked ? 'text-red-600' : 'opacity-40'}">❤️</span>
                                <p class="text-[10px] font-black">${v.likes || 0}</p>
                            </div>
                        </div>
                        <div class="absolute bottom-24 right-6 text-right">
                            <p class="font-black">@${v.ownerName}</p>
                        </div>
                    </div>`;
            });
            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { direction: "vertical", initialSlide: cIdx, on: { slideChange: () => { stopAll(); playCurrent(); } } });
            setTimeout(initYT, 500);
        }

        function initYT() {
            allVids.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId, playerVars: { autoplay: i === swiper.activeIndex ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1 },
                    events: { onStateChange: (e) => { if(e.data == 1 && i === swiper.activeIndex) startTimer(i); } }
                });
            });
        }

        function startTimer(idx) {
            clearInterval(currentTimer);
            const v = allVids[idx];
            if(v.ownerId === uID) return;
            document.getElementById('videoTimer').classList.remove('hidden');
            let s = 10;
            currentTimer = setInterval(async () => {
                s--; document.getElementById('timerText').innerText = s + "s";
                if(s <= 0) {
                    clearInterval(currentTimer);
                    document.getElementById('videoTimer').classList.add('hidden');
                    await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(0.001) });
                    await db.collection("shared_videos").doc(v.id).update({ views: firebase.firestore.FieldValue.increment(1) });
                }
            }, 1000);
        }

        function stopAll() { Object.values(players).forEach(p => p.pauseVideo?.()); clearInterval(currentTimer); }
        function playCurrent() { players[swiper.activeIndex]?.playVideo?.(); }

        async function toggleLike(vidId) {
            const liked = myLikes.includes(vidId);
            const uRef = db.collection("users").doc(uID);
            const vRef = db.collection("shared_videos").doc(vidId);
            if(liked) {
                await uRef.update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vidId) });
                await vRef.update({ likes: firebase.firestore.FieldValue.increment(-1) });
            } else {
                await uRef.update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vidId) });
                await vRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
            }
        }

        async function openProfile(id) {
            const doc = await db.collection("users").doc(id).get();
            const data = doc.data();
            document.getElementById('uProfName').innerText = data.name;
            document.getElementById('uProfImg').src = data.img;
            document.getElementById('uFollsCount').innerText = data.followersCount || 0;
            
            const grid = document.getElementById('profileGrid');
            grid.innerHTML = '';
            const vids = allVids.filter(v => v.ownerId === id);
            document.getElementById('uVidsCount').innerText = vids.length;
            vids.forEach(v => {
                const idx = allVids.findIndex(vid => vid.id === v.id);
                grid.innerHTML += `<div onclick="jumpTo(${idx})" class="aspect-[9/16] bg-zinc-900"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`;
            });

            document.getElementById('withdrawRequestBtn').classList.toggle('hidden', id !== uID);
            switchTab('profile');
        }

        function jumpTo(i) { switchTab('home'); setTimeout(() => swiper.slideTo(i), 300); }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'profile_self') { openProfile(uID); return; }
            document.getElementById(t + 'Page').classList.add('active-page');
            stopAll();
            if(t === 'home') playCurrent();
        }

        window.onload = init;
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
