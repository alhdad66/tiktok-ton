<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Earn Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .video-container { height: calc(100vh - 70px); position: relative; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-card { height: 100%; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
        .nav-bar { height: 70px; background: #111; border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #888; cursor: pointer; }
        .nav-item.active { color: #facc15; }
        .reward-timer { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; border: 1px solid #facc15; z-index: 50; }
        .hidden { display: none !important; }
        iframe { pointer-events: none; width: 100%; aspect-ratio: 9/16; }
        .admin-section { height: calc(100vh - 70px); overflow-y: auto; background: #111; padding: 20px; }
    </style>
</head>
<body>

    <!-- قسم الفيديوهات الرئيسي -->
    <div id="view-feed" class="video-container">
        <!-- الفيديوهات سيتم توليدها هنا بواسطة JS -->
    </div>

    <!-- قسم الملف الشخصي -->
    <div id="view-profile" class="hidden p-6 space-y-6 overflow-y-auto h-[calc(100vh-70px)]">
        <div class="text-center">
            <div class="w-24 h-24 bg-yellow-400 rounded-full mx-auto flex items-center justify-center text-black text-3xl font-bold mb-3" id="user-avatar">?</div>
            <h2 class="text-xl font-bold" id="user-name">تحميل...</h2>
            <p class="text-gray-400 text-sm" id="user-id-display">ID: ---</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-center">
                <p class="text-gray-400 text-xs mb-1">الرصيد الحالي</p>
                <p class="text-2xl font-bold text-yellow-400" id="balance-display">0.00$</p>
            </div>
            <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-center">
                <p class="text-gray-400 text-xs mb-1">الإحالات</p>
                <p class="text-2xl font-bold text-blue-400" id="ref-count">0</p>
            </div>
        </div>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
            <h3 class="font-bold mb-2">رابط الإحالة</h3>
            <p class="text-xs text-gray-500 mb-3">اربح 0.5$ عن كل مستخدم جديد</p>
            <div class="flex gap-2">
                <input id="ref-link" type="text" readonly class="flex-1 bg-black border border-zinc-700 rounded-lg px-3 py-2 text-xs outline-none">
                <button onclick="copyRef()" class="bg-yellow-400 text-black px-4 py-2 rounded-lg font-bold text-xs">نسخ</button>
            </div>
        </div>
        <button onclick="switchTab('withdraw')" class="w-full bg-white/5 border border-white/10 py-4 rounded-xl font-bold">سحب الأرباح</button>
    </div>

    <!-- قسم السحب -->
    <div id="view-withdraw" class="hidden p-6 space-y-6">
        <h2 class="text-2xl font-bold text-center">سحب الأرباح</h2>
        <div class="space-y-4">
            <input id="withdraw-amount" type="number" placeholder="المبلغ" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none focus:border-yellow-400">
            <input id="withdraw-wallet" type="text" placeholder="عنوان المحفظة أو الحساب" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none focus:border-yellow-400">
            <button onclick="requestWithdrawal()" class="w-full bg-yellow-400 text-black font-bold py-4 rounded-xl">تقديم طلب السحب</button>
        </div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="view-admin" class="hidden admin-section space-y-6">
        <h2 class="text-2xl font-bold border-b border-zinc-800 pb-4">لوحة التحكم</h2>
        
        <!-- إضافة فيديو -->
        <div class="bg-zinc-900 p-4 rounded-xl">
            <h3 class="font-bold mb-3">نشر فيديو جديد</h3>
            <input id="adm-vid-title" type="text" placeholder="عنوان الفيديو" class="w-full bg-black border border-zinc-800 p-2 rounded mb-2">
            <input id="adm-vid-url" type="text" placeholder="رابط يوتيوب" class="w-full bg-black border border-zinc-800 p-2 rounded mb-3">
            <button onclick="adminAddVideo()" class="w-full bg-blue-600 py-2 rounded font-bold">إضافة للفيد</button>
        </div>

        <!-- المستخدمين -->
        <div class="bg-zinc-900 p-4 rounded-xl">
            <h3 class="font-bold mb-3 text-blue-400">قائمة المستخدمين</h3>
            <div id="admin-user-list" class="space-y-2 text-xs">
                <!-- جلب المستخدمين بواسطة JS -->
            </div>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('feed')">
            <i class="fa-solid fa-house text-xl"></i>
            <span>الفيد</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')">
            <i class="fa-solid fa-user text-xl"></i>
            <span>حسابي</span>
        </div>
        <div id="admin-nav-btn" class="nav-item hidden" onclick="switchTab('admin')">
            <i class="fa-solid fa-lock text-xl"></i>
            <span>الإدارة</span>
        </div>
    </div>

    <script>
        // --- إعدادات Firebase ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);
        const auth = firebase.auth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v-earn-default';
        const MY_TELEGRAM_ID = "7416599626";

        let currentUser = null;
        let userData = null;
        let videos = [];
        let rewardActive = false;
        let timerInterval = null;

        // --- تهيئة التطبيق والمصادقة ---
        async function init() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    setupUser();
                    loadVideos();
                }
            });
        }

        // --- إعداد بيانات المستخدم ---
        async function setupUser() {
            const userRef = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid);
            
            userRef.onSnapshot(doc => {
                if (doc.exists) {
                    userData = doc.data();
                    updateUI();
                    if (userData.telegramId === MY_TELEGRAM_ID || userData.isAdmin) {
                        document.getElementById('admin-nav-btn').classList.remove('hidden');
                        loadAdminData();
                    }
                    if (userData.isBanned) {
                        document.body.innerHTML = "<div class='flex items-center justify-center h-screen text-red-500 font-bold'>تم حظر حسابك لمخالفة الشروط</div>";
                    }
                } else {
                    userRef.set({
                        uid: currentUser.uid,
                        telegramId: MY_TELEGRAM_ID, // افتراضياً للمطور أول مرة
                        balance: 0,
                        referrals: 0,
                        isAdmin: currentUser.uid === MY_TELEGRAM_ID,
                        isBanned: false,
                        createdAt: new Date().toISOString()
                    });
                }
            });
        }

        // --- تحديث الواجهة ---
        function updateUI() {
            document.getElementById('balance-display').innerText = `${userData.balance.toFixed(2)}$`;
            document.getElementById('ref-count').innerText = userData.referrals;
            document.getElementById('user-name').innerText = "مستخدم " + currentUser.uid.substring(0, 5);
            document.getElementById('user-id-display').innerText = "ID: " + currentUser.uid;
            document.getElementById('user-avatar').innerText = currentUser.uid.substring(0, 1).toUpperCase();
            document.getElementById('ref-link').value = `https://t.me/MyBot?start=${currentUser.uid}`;
        }

        // --- تحميل الفيديوهات ---
        function loadVideos() {
            const vRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('videos');
            vRef.onSnapshot(snapshot => {
                videos = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                renderVideos();
            });
        }

        function renderVideos() {
            const container = document.getElementById('view-feed');
            container.innerHTML = '';
            
            if (videos.length === 0) {
                container.innerHTML = '<div class="h-full flex flex-col items-center justify-center p-10 text-center opacity-40"><i class="fa-solid fa-clapperboard text-5xl mb-4"></i><p>لا توجد فيديوهات حالياً</p></div>';
                return;
            }

            videos.forEach((v, index) => {
                const videoId = getYoutubeId(v.url);
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="reward-timer" id="timer-${index}">شاهد 10 ث للربح</div>
                    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&mute=1&loop=1" frameborder="0"></iframe>
                    <div class="absolute bottom-10 left-6 text-white w-2/3">
                        <h3 class="font-bold text-lg">${v.title}</h3>
                        <p class="text-xs opacity-60">بواسطة: الإدارة</p>
                    </div>
                `;
                container.appendChild(card);
            });

            startObserver();
        }

        // --- نظام المكافأة عند التمرير ---
        function startObserver() {
            const options = { threshold: 0.7 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const index = Array.from(entry.target.parentNode.children).indexOf(entry.target);
                        startRewardTimer(index);
                    }
                });
            }, options);

            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        }

        function startRewardTimer(index) {
            clearInterval(timerInterval);
            let seconds = 10;
            const timerEl = document.getElementById(`timer-${index}`);
            if (!timerEl || timerEl.innerText === 'تمت المكافأة ✓') return;

            timerInterval = setInterval(() => {
                seconds--;
                timerEl.innerText = `انتظر ${seconds} ث...`;
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    claimReward(index);
                }
            }, 1000);
        }

        async function claimReward(index) {
            const timerEl = document.getElementById(`timer-${index}`);
            timerEl.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i> تمت المكافأة ✓';
            
            const userRef = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid);
            await userRef.update({
                balance: firebase.firestore.FieldValue.increment(0.1)
            });
        }

        // --- لوحة الإدارة (وظائف) ---
        async function loadAdminData() {
            const uRef = db.collection('artifacts').doc(appId).collection('users');
            uRef.onSnapshot(snap => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const u = doc.data();
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center bg-black/50 p-2 rounded';
                    item.innerHTML = `
                        <span>${u.uid.substring(0,6)}... (${u.balance.toFixed(2)}$)</span>
                        <div class="flex gap-1">
                            <button onclick="adminToggleBan('${u.uid}', ${u.isBanned})" class="px-2 py-1 ${u.isBanned ? 'bg-green-600' : 'bg-red-600'} rounded">${u.isBanned ? 'فك حظر' : 'حظر'}</button>
                            <button onclick="adminAdjustBalance('${u.uid}', 1)" class="bg-blue-600 px-2 py-1 rounded">+</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        async function adminAddVideo() {
            const title = document.getElementById('adm-vid-title').value;
            const url = document.getElementById('adm-vid-url').value;
            if (!title || !url) return alert('أدخل البيانات');
            
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('videos').add({
                title, url, createdAt: new Date().toISOString()
            });
            alert('تم النشر');
            document.getElementById('adm-vid-title').value = '';
            document.getElementById('adm-vid-url').value = '';
        }

        async function adminToggleBan(uid, status) {
            await db.collection('artifacts').doc(appId).collection('users').doc(uid).update({ isBanned: !status });
        }

        // --- المساعدة ---
        function switchTab(tab) {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(tab === 'feed') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(tab === 'profile') document.querySelectorAll('.nav-item')[1].classList.add('active');
            if(tab === 'admin') document.getElementById('admin-nav-btn').classList.add('active');
        }

        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function copyRef() {
            const input = document.getElementById('ref-link');
            input.select();
            document.execCommand('copy');
            alert('تم نسخ الرابط');
        }

        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const wallet = document.getElementById('withdraw-wallet').value;
            
            if (amount < 5) return alert('الحد الأدنى للسحب 5$');
            if (amount > userData.balance) return alert('رصيد غير كافٍ');
            
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('withdrawals').add({
                uid: currentUser.uid,
                amount,
                wallet,
                status: 'pending',
                createdAt: new Date().toISOString()
            });
            
            await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).update({
                balance: firebase.firestore.FieldValue.increment(-amount)
            });
            
            alert('تم تقديم طلب السحب بنجاح');
            switchTab('profile');
        }

        init();
    </script>
</body>
</html>
