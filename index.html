<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fogrener - Ultra Stable</title>
    
    <!-- مكتبات أساسية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            touch-action: manipulation; /* تحسين الاستجابة للمس */
        }
        
        .swiper { height: 100vh; width: 100vw; z-index: 1; }
        .video-container { position: relative; height: 100%; width: 100%; background: #000; display: flex; align-items: center; }
        
        /* مشغل يوتيوب - وضعنا طبقة شفافة فوقه لمنع تداخل اللمس */
        .yt-wrapper { width: 100%; aspect-ratio: 9/16; position: relative; pointer-events: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .touch-layer { position: absolute; inset: 0; z-index: 5; background: transparent; }

        /* العناصر العائمة */
        .ui-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .pointer-auto { pointer-events: auto; }

        /* شريط التنقل السفلي */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(0,0,0,0.9); border-top: 1px solid #222; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; pointer-events: auto;
        }

        .tab-btn { display: flex; flex-direction: column; align-items: center; color: #777; font-size: 10px; cursor: pointer; }
        .tab-btn.active { color: #fff; }
        .center-add { background: #fff; color: #000; width: 45px; height: 30px; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* الصفحات */
        .page { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <!-- الواجهة العلوية -->
    <div class="ui-overlay flex justify-between p-4 items-start">
        <div class="bg-black/60 px-4 py-1 rounded-full border border-white/10 pointer-auto" onclick="location.reload()">
            🔄 تحديث
        </div>
        <div class="bg-black/60 px-4 py-1 rounded-full border border-white/10 pointer-auto text-green-400 font-bold" onclick="showPage('wallet')">
            <span id="bal-val">0.00</span> 💰
        </div>
    </div>

    <!-- الفيديوهات -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="video-list">
            <!-- سيتم تحميل الفيديوهات هنا -->
             <div class="swiper-slide flex items-center justify-center">جاري تحميل الفيديوهات...</div>
        </div>
    </div>

    <!-- القائمة السفلية -->
    <div class="bottom-nav">
        <div class="tab-btn active" onclick="showPage('feed')"><span>🏠</span><span>الرئيسية</span></div>
        <div class="tab-btn" onclick="showPage('friends')"><span>👥</span><span>الأصدقاء</span></div>
        <div class="center-add" onclick="showPage('add')">+</div>
        <div class="tab-btn" onclick="showPage('wallet')"><span>💰</span><span>الأرباح</span></div>
        <div class="tab-btn" onclick="showPage('profile')"><span>👤</span><span>الملف</span></div>
    </div>

    <!-- صفحة الأرباح -->
    <div id="page-wallet" class="page">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">المحفظة</h1>
            <button onclick="showPage('feed')" class="text-2xl">✕</button>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl text-center shadow-2xl border border-zinc-800">
            <p class="text-zinc-500 mb-2">رصيدك الحالي</p>
            <div class="text-5xl font-black text-green-400 mb-6" id="wallet-val">$0.0000</div>
            <button class="w-full bg-white text-black py-4 rounded-2xl font-black text-lg active:scale-95 transition" onclick="alert('سيتم فتح السحب قريباً')">طلب سحب</button>
        </div>
    </div>

    <!-- صفحة الإضافة -->
    <div id="page-add" class="page">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">نشر فيديو</h1>
            <button onclick="showPage('feed')" class="text-2xl">✕</button>
        </div>
        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
            <p class="mb-4 text-zinc-400">أدخل رابط فيديو يوتيوب (Shorts أو عادي):</p>
            <input type="text" id="vid-url" placeholder="https://youtube.com/..." class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-700">
            <button onclick="uploadVid()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">تأكيد النشر</button>
        </div>
    </div>

    <!-- صفحة الأصدقاء -->
    <div id="page-friends" class="page text-center">
        <div class="flex justify-between items-center mb-8 text-right">
            <h1 class="text-3xl font-black">الأصدقاء</h1>
            <button onclick="showPage('feed')" class="text-2xl">✕</button>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
            <p class="text-zinc-400 mb-4 text-sm">اربح 0.10$ عن كل صديق يقوم بالتسجيل من خلالك</p>
            <div id="invite-link" class="bg-black p-4 rounded-xl text-blue-400 text-xs mb-6 break-all">...</div>
            <button onclick="copyInvite()" class="w-full bg-[#fe2c55] py-4 rounded-xl font-black">نسخ الرابط</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // تكوين الخدمة السحابية
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const tg = window.Telegram.WebApp;

        let user = null;
        let mySwiper = null;
        let players = {};
        let currentBalance = 0;

        // 1. تشغيل التطبيق (بدون انتظار تليجرام لو تأخر)
        async function initApp() {
            try {
                tg.expand();
                tg.ready();
                
                // محاولة تسجيل الدخول
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } catch (e) {
                console.log("Auth Error: ", e);
            }
        }

        // 2. مراقبة حالة المستخدم
        auth.onAuthStateChanged(u => {
            if (u) {
                user = u;
                loadProfile();
                loadVideos();
                updateInviteLink();
            }
        });

        // 3. جلب بيانات الملف الشخصي (بشكل آمن)
        function loadProfile() {
            const userPath = `/artifacts/${appId}/users/${user.uid}/profile/v2`;
            db.doc(userPath).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    currentBalance = data.balance || 0;
                    document.getElementById('bal-val').innerText = currentBalance.toFixed(4);
                    document.getElementById('wallet-val').innerText = `$${currentBalance.toFixed(4)}`;
                } else {
                    db.doc(userPath).set({ balance: 0, created: new Date() });
                }
            }, (err) => console.log("Firestore Permission Error: ", err));
        }

        // 4. تحميل الفيديوهات
        async function loadVideos() {
            const vidPath = `/artifacts/${appId}/public/data/v2_vids`;
            const snap = await db.collection(vidPath).get();
            const videos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            const container = document.getElementById('video-list');
            if (videos.length === 0) {
                container.innerHTML = `<div class="swiper-slide flex items-center justify-center text-zinc-500">لا توجد فيديوهات، كن أول من ينشر!</div>`;
                return;
            }

            container.innerHTML = videos.map((v, i) => `
                <div class="swiper-slide">
                    <div class="video-container">
                        <div class="yt-wrapper">
                            <div id="player-${i}"></div>
                            <div class="touch-layer" onclick="togglePlay(${i})"></div>
                        </div>
                        <div class="absolute right-4 bottom-32 flex flex-col items-center gap-6 z-[200] pointer-auto">
                            <div class="text-3xl" onclick="alert('أعجبني!')">❤️</div>
                            <div class="text-3xl" onclick="showPage('friends')">🚀</div>
                        </div>
                        <div class="absolute bottom-24 left-4 z-[200]">
                            <h3 class="font-bold">@${v.user || 'Unknown'}</h3>
                        </div>
                    </div>
                </div>
            `).join('');

            initSwiper(videos);
        }

        // 5. تهيئة Swiper ومشغلات يوتيوب
        function initSwiper(vids) {
            mySwiper = new Swiper(".mySwiper", {
                direction: "vertical",
                on: {
                    slideChange: () => {
                        Object.values(players).forEach(p => p.pauseVideo?.());
                        players[mySwiper.activeIndex]?.playVideo?.();
                    }
                }
            });

            vids.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: (i===0?1:0), controls: 0, modestbranding: 1, playsinline: 1, loop: 1, rel: 0 },
                    events: { 'onStateChange': (e) => handleEarn(e) }
                });
            });
        }

        let earnTimer = null;
        function handleEarn(e) {
            if (e.data === YT.PlayerState.PLAYING) {
                earnTimer = setInterval(() => {
                    db.doc(`/artifacts/${appId}/users/${user.uid}/profile/v2`).update({
                        balance: firebase.firestore.FieldValue.increment(0.0002)
                    });
                }, 10000); // ربح كل 10 ثواني مشاهدة
            } else {
                clearInterval(earnTimer);
            }
        }

        function togglePlay(i) {
            const state = players[i]?.getPlayerState?.();
            if (state === 1) players[i].pauseVideo();
            else players[i].playVideo();
        }

        // 6. التحكم بالصفحات
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if (id !== 'feed') {
                document.getElementById(`page-${id}`).classList.add('active');
                Object.values(players).forEach(p => p.pauseVideo?.());
            } else {
                players[mySwiper?.activeIndex]?.playVideo?.();
            }
        }

        // 7. نشر فيديو
        async function uploadVid() {
            const url = document.getElementById('vid-url').value;
            const vidId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if (!vidId) return alert("الرابط غير صحيح");

            const name = tg.initDataUnsafe?.user?.first_name || "مستخدم_فقرينر";
            await db.collection(`/artifacts/${appId}/public/data/v2_vids`).add({
                videoId: vidId,
                user: name,
                likes: 0,
                time: new Date()
            });
            alert("تم النشر بنجاح!");
            location.reload();
        }

        function updateInviteLink() {
            const link = `https://t.me/FogrenerBot?start=${user.uid}`;
            document.getElementById('invite-link').innerText = link;
        }

        function copyInvite() {
            const link = document.getElementById('invite-link').innerText;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showAlert("تم نسخ رابط الدعوة!");
        }

        window.onload = initApp;
    </script>
</body>
</html>
