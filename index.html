<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok TON - شاهد واربح</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            height: 100vh;
            width: 100vw;
            background: #000;
        }

        #player {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.6);
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .glass-ui {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .action-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .action-button:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
            z-index: 100;
        }

        .progress-container {
            position: fixed;
            top: 15px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            z-index: 1000;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            border-radius: 2px;
            transition: width 1s linear;
        }

        .reward-badge {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(34, 197, 94, 0.9);
            z-index: 1000;
            display: none;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, addDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tiktok-ton-final';

        // State
        let user = null;
        let userData = {};
        let videos = [];
        let currentIndex = 0;
        let player;
        let watchTime = 0;
        let isRewarded = false;
        let timerId = null;

        const tg = window.Telegram.WebApp;
        tg.expand();

        // Auth
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                loadData();
            } else {
                await signInAnonymously(auth);
            }
        });

        async function loadData() {
            // User Profile
            const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
            onSnapshot(profileRef, (snap) => {
                if (snap.exists()) {
                    userData = snap.data();
                    renderUI();
                } else {
                    setDoc(profileRef, {
                        balance: 0,
                        likedVideos: [],
                        username: tg.initDataUnsafe?.user?.username || "user",
                        name: tg.initDataUnsafe?.user?.first_name || "مستخدم"
                    });
                }
            });

            // Videos
            const vidsCol = collection(db, 'artifacts', appId, 'public', 'data', 'videos');
            onSnapshot(vidsCol, (snap) => {
                videos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (videos.length > 0 && !player) initYoutube();
            });
        }

        function initYoutube() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);
        }

        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('player', {
                videoId: videos[currentIndex].youtubeId,
                playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'iv_load_policy': 3 },
                events: { 'onStateChange': handleStateChange }
            });
        };

        function handleStateChange(e) {
            if (e.data == YT.PlayerState.PLAYING) {
                if (!timerId) timerId = setInterval(tick, 1000);
            } else {
                clearInterval(timerId);
                timerId = null;
            }
        }

        async function tick() {
            watchTime++;
            const progress = (watchTime / 10) * 100;
            document.getElementById('progress-bar').style.width = Math.min(progress, 100) + "%";

            if (watchTime >= 10 && !isRewarded) {
                isRewarded = true;
                const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
                await updateDoc(profileRef, { balance: increment(0.01) });
                document.getElementById('reward-badge').style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function renderUI() {
            document.getElementById('balance-text').innerText = (userData.balance || 0).toFixed(3);
            document.getElementById('prof-name').innerText = userData.name;
            document.getElementById('prof-user').innerText = "@" + (userData.username || "user");
            
            if (videos[currentIndex]) {
                document.getElementById('creator-name').innerText = videos[currentIndex].creatorName || "مجهول";
                const isLiked = userData.likedVideos?.includes(videos[currentIndex].id);
                document.getElementById('heart-btn').style.color = isLiked ? '#ef4444' : '#fff';
            }
        }

        // Global Actions
        window.nextVideo = () => {
            if (currentIndex < videos.length - 1) {
                currentIndex++;
                watchTime = 0;
                isRewarded = false;
                document.getElementById('progress-bar').style.width = "0%";
                document.getElementById('reward-badge').style.display = 'none';
                player.loadVideoById(videos[currentIndex].youtubeId);
                renderUI();
            }
        };

        window.toggleLike = async () => {
            const vidId = videos[currentIndex].id;
            let likes = userData.likedVideos || [];
            if (likes.includes(vidId)) {
                likes = likes.filter(id => id !== vidId);
            } else {
                likes.push(vidId);
            }
            const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'main');
            await updateDoc(profileRef, { likedVideos: likes });
            tg.HapticFeedback.impactOccurred('light');
        };

        window.switchPage = (page) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(page + '-page').classList.remove('hidden');
        };

        window.handlePublish = async () => {
            const url = document.getElementById('yt-url').value;
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const m = url.match(reg);
            const id = (m && m[2].length === 11) ? m[2] : null;

            if (id) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'videos'), {
                    youtubeId: id,
                    creatorName: userData.name,
                    timestamp: Date.now()
                });
                document.getElementById('yt-url').value = "";
                switchPage('feed');
            }
        };
    </script>
</head>
<body>

    <!-- Progress & Rewards -->
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div id="reward-badge" class="reward-badge">تم ربح 0.01 TON 💰</div>

    <!-- Feed Page -->
    <div id="feed-page" class="page video-container">
        <div id="player"></div>
        
        <!-- Right Actions -->
        <div class="absolute right-4 bottom-32 flex flex-col items-center z-50">
            <div class="action-button shadow-lg" onclick="toggleLike()">
                <i id="heart-btn" class="fas fa-heart text-xl"></i>
            </div>
            <div class="action-button shadow-lg" onclick="nextVideo()">
                <i class="fas fa-step-forward text-xl"></i>
            </div>
            <div class="action-button shadow-lg">
                <i class="fas fa-share text-xl text-blue-400"></i>
            </div>
        </div>

        <!-- Video Info -->
        <div class="absolute bottom-24 left-5 right-16 z-40 text-right pointer-events-none">
            <h3 class="font-bold text-lg mb-1" id="creator-name">تحميل...</h3>
            <p class="text-sm text-gray-300">شاهد الفيديو واربح العملات الرقمية مجاناً 🚀</p>
        </div>
    </div>

    <!-- Publish Page -->
    <div id="publish-page" class="page hidden h-screen bg-neutral-900 p-8 flex flex-col justify-center">
        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
            <i class="fas fa-cloud-upload-alt text-4xl text-blue-500 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">نشر فيديو جديد</h2>
            <p class="text-sm text-gray-400 mb-6">ضع رابط اليوتيوب هنا وسيقوم التطبيق بالباقي</p>
            <input id="yt-url" type="text" placeholder="https://youtube.com/..." 
                   class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-4 text-center outline-none focus:border-blue-500">
            <button onclick="handlePublish()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-2xl font-bold transition-all">نشر الفيديو</button>
        </div>
    </div>

    <!-- Profile Page -->
    <div id="profile-page" class="page hidden h-screen bg-black overflow-y-auto pb-24">
        <div class="relative h-48 bg-gradient-to-b from-blue-900/40 to-black"></div>
        <div class="px-8 -mt-12">
            <div class="flex justify-between items-end mb-6">
                <div class="w-24 h-24 rounded-full bg-neutral-800 border-4 border-black flex items-center justify-center text-3xl">👤</div>
                <div class="flex gap-4 mb-2">
                    <div class="text-center">
                        <div class="font-bold" id="balance-text">0.000</div>
                        <div class="text-[10px] text-gray-500 uppercase">رصيد TON</div>
                    </div>
                </div>
            </div>
            
            <h2 class="text-2xl font-bold" id="prof-name">...</h2>
            <p class="text-blue-500 mb-6" id="prof-user">@user</p>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="text-xs text-gray-400">المتابعين</div>
                    <div class="text-lg font-bold">0</div>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="text-xs text-gray-400">أرباح اليوم</div>
                    <div class="text-lg font-bold text-green-500">+0.00</div>
                </div>
            </div>

            <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-history text-blue-500"></i> فيديوهات نالت إعجابك</h3>
            <div class="grid grid-cols-3 gap-2">
                <div class="aspect-[9/16] bg-neutral-900 rounded-xl border border-white/5 flex items-center justify-center">
                    <i class="fas fa-play text-white/10"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button onclick="switchPage('feed')" class="flex flex-col items-center">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[9px] mt-1">الرئيسية</span>
        </button>
        <button onclick="switchPage('publish')" class="flex flex-col items-center">
            <div class="w-12 h-8 bg-gradient-to-r from-blue-500 via-white to-red-500 rounded-lg flex items-center justify-center">
                <i class="fas fa-plus text-black text-sm"></i>
            </div>
        </button>
        <button onclick="switchPage('profile')" class="flex flex-col items-center">
            <i class="fas fa-user text-xl text-gray-500"></i>
            <span class="text-[9px] mt-1 text-gray-500">الملف</span>
        </button>
    </nav>

</body>
</html>
