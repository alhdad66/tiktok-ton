<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Ton Pro - الحداد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { position: relative; background: #000; }
        .video-wrapper { width: 100%; height: 100vh; pointer-events: none; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; z-index: 10000; border-top: 1px solid #1a1a1a; }
        .action-btns { position: absolute; right: 15px; bottom: 180px; display: flex; flex-direction: column; gap: 22px; align-items: center; z-index: 100; }
        .owner-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #ef4444; padding: 2px; background: #000; cursor: pointer; pointer-events: auto; }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
        .active-page { display: flex !important; }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; overflow: hidden; cursor: pointer; }
        .ticker-card { background: linear-gradient(145deg, #111, #050505); border: 1px solid #222; border-radius: 20px; padding: 15px; }
        .live-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- رصيد المستخدم العلوي -->
    <div class="fixed top-6 left-6 z-[11000] bg-black/60 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
        <div class="live-dot"></div>
        <span id="mainBal" class="text-green-400 font-black text-lg">$0.0000</span>
    </div>

    <!-- الصفحة الرئيسية (تيك توك) -->
    <div id="homePage" class="page active-page !p-0">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- صفحة النشر والإحصائيات -->
    <div id="publishPage" class="page p-6">
        <h2 class="text-3xl font-black mt-10 mb-6">لوحة التحكم 📊</h2>
        
        <!-- شاشة الإحصائيات (شاشة التداول) -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="ticker-card">
                <p class="text-[10px] text-gray-500 uppercase font-bold">مشاهدات فيديوهاتك</p>
                <p id="statViews" class="text-2xl font-black text-blue-500">0</p>
                <p class="text-[9px] text-green-500 mt-1">↑ 12% اليوم</p>
            </div>
            <div class="ticker-card">
                <p class="text-[10px] text-gray-500 uppercase font-bold">أرباح البث</p>
                <p id="statEarn" class="text-2xl font-black text-green-400">$0.00</p>
                <p class="text-[9px] text-gray-400 mt-1">متصل الآن 🟢</p>
            </div>
        </div>

        <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 mb-6">
            <p class="text-sm font-bold mb-4 text-red-500">انشر فيديو جديد</p>
            <input id="ytInput" type="text" placeholder="رابط فيديو يوتيوب..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-white mb-4 outline-none focus:border-red-600">
            <button onclick="handlePublish()" class="w-full bg-red-600 py-4 rounded-xl font-black text-xl shadow-lg">بدء البث الآن</button>
        </div>
    </div>

    <!-- صفحة الملف الشخصي (لأي مستخدم) -->
    <div id="userProfilePage" class="page">
        <div class="p-8 text-center bg-gradient-to-b from-red-900/20 to-black">
            <button onclick="switchTab('home')" class="absolute top-6 right-6 text-2xl text-gray-400">✕</button>
            <img id="uProfImg" src="" class="w-24 h-24 rounded-full border-4 border-red-600 mx-auto mb-4 shadow-2xl">
            <h2 id="uProfName" class="text-2xl font-black mb-2">...</h2>
            <div class="flex justify-center gap-6 mt-4 opacity-70">
                <div><p class="font-black text-lg" id="uVidCount">0</p><p class="text-[10px] uppercase">فيديو</p></div>
                <div><p class="font-black text-lg">1.4K</p><p class="text-[10px] uppercase">متابع</p></div>
            </div>
        </div>
        <div class="video-grid" id="uVidGrid">
            <!-- فيديوهات المستخدم تظهر هنا -->
        </div>
    </div>

    <!-- حسابي الخاص -->
    <div id="myAccountPage" class="page items-center justify-center p-6">
        <img id="myPhoto" src="" class="w-24 h-24 rounded-full border-4 border-red-600 mb-4 shadow-2xl">
        <h2 id="myName" class="text-2xl font-black mb-6">تحميل...</h2>
        <div class="bg-white/5 w-full p-8 rounded-[2.5rem] border border-white/10 text-center mb-6">
            <p class="text-xs text-gray-500 font-bold mb-1 uppercase tracking-widest">إجمالي المحفظة</p>
            <p id="myBal" class="text-5xl font-black text-green-400 tracking-tighter">$0.0000</p>
        </div>
        <button class="w-full bg-green-600 py-4 rounded-2xl font-black text-lg shadow-xl shadow-green-600/20">سحب الأموال 💸</button>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="cursor-pointer text-2xl">🏠</div>
        <div onclick="switchTab('publish')" class="bg-red-600 px-6 py-1 rounded-xl font-black text-2xl shadow-lg">+</div>
        <div onclick="switchTab('profile')" class="cursor-pointer text-2xl opacity-50">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124", storageBucket: "tik-ton-92124.firebasestorage.app",
            messagingSenderId: "885830196454", appId: "1:885830196454:web:a18a778644558e0a8ec9ec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "dev_user", first_name: "الحداد👑", photo_url: "" };
        const uID = String(user.id);

        let balance = 0, players = {}, swiper, allVideos = [];

        async function loadContent() {
            const snap = await db.collection("shared_videos").orderBy("createdAt", "desc").get();
            allVideos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderHome();
            updateStats();
        }

        function renderHome() {
            const wrapper = document.getElementById('videoWrapper');
            wrapper.innerHTML = '';
            allVideos.forEach((v, i) => {
                wrapper.innerHTML += `
                    <div class="swiper-slide">
                        <div id="player-${i}" class="video-wrapper"></div>
                        <div class="action-btns">
                            <img src="${v.ownerImg || 'https://via.placeholder.com/150'}" class="owner-avatar" onclick="openUserProfile('${v.ownerId}', '${v.ownerName}', '${v.ownerImg}')">
                            <div class="flex flex-col items-center"><span>❤️</span><span class="text-[10px] font-bold">${Math.floor(Math.random()*500)}</span></div>
                            <div class="flex flex-col items-center"><span>💬</span><span class="text-[10px] font-bold">${Math.floor(Math.random()*50)}</span></div>
                        </div>
                        <div class="absolute bottom-24 right-6 text-right z-[100] pointer-events-none">
                            <h3 class="text-xl font-black tracking-tight">@${v.ownerName || 'مستخدم'}</h3>
                            <p class="text-sm text-gray-300 opacity-80">شاهد الفيديو للربح 💰</p>
                        </div>
                    </div>`;
            });

            swiper = new Swiper(".mySwiper", {
                direction: "vertical",
                on: { slideChange: () => { stopAll(); playActive(swiper.activeIndex); } }
            });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1, rel: 0 },
                    events: {
                        onStateChange: (e) => {
                            if(e.data === YT.PlayerState.PLAYING && !e.target.done) {
                                setTimeout(() => {
                                    if(e.target.getPlayerState() === YT.PlayerState.PLAYING) {
                                        e.target.done = true;
                                        addBalance(0.0005);
                                    }
                                }, 10000); // 10 ثواني مشاهدة فعلية
                            }
                        }
                    }
                });
            });
        }

        function stopAll() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); }
        function playActive(i) { if(players[i]) players[i].playVideo(); }

        async function addBalance(amt) {
            balance += amt;
            const bTxt = `$${balance.toFixed(4)}`;
            document.getElementById('mainBal').innerText = bTxt;
            document.getElementById('myBal').innerText = bTxt;
            await db.collection("users").doc(uID).set({ balance: balance, name: user.first_name, photo: user.photo_url }, { merge: true });
        }

        async function openUserProfile(targetId, name, img) {
            document.getElementById('uProfName').innerText = name;
            document.getElementById('uProfImg').src = img || 'https://via.placeholder.com/150';
            
            const grid = document.getElementById('uVidGrid');
            grid.innerHTML = '';
            const userVids = allVideos.filter(v => v.ownerId === targetId);
            document.getElementById('uVidCount').innerText = userVids.length;

            userVids.forEach(v => {
                grid.innerHTML += `
                    <div class="grid-item" onclick="playThisVideo('${v.videoId}')">
                        <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover opacity-60">
                        <div class="absolute bottom-1 left-1 text-[8px] font-bold">▶ ${Math.floor(Math.random()*1000)}</div>
                    </div>`;
            });
            switchTab('userProfile');
        }

        function playThisVideo(vidId) {
            const index = allVideos.findIndex(v => v.videoId === vidId);
            if(index !== -1) {
                switchTab('home');
                swiper.slideTo(index);
            }
        }

        function updateStats() {
            const myVids = allVideos.filter(v => v.ownerId === uID).length;
            document.getElementById('statViews').innerText = (myVids * 142); // رقم وهمي للتوضيح
            document.getElementById('statEarn').innerText = `$${(myVids * 0.05).toFixed(2)}`;
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'home') document.getElementById('homePage').classList.add('active-page');
            if(t === 'publish') document.getElementById('publishPage').classList.add('active-page');
            if(t === 'profile') document.getElementById('myAccountPage').classList.add('active-page');
            if(t === 'userProfile') document.getElementById('userProfilePage').classList.add('active-page');
            if(t !== 'home') stopAll(); else playActive(swiper.activeIndex);
        }

        async function handlePublish() {
            const url = document.getElementById('ytInput').value;
            const vidId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(!vidId) return alert('الرابط خطأ');
            
            await db.collection("shared_videos").add({
                videoId: vidId, createdAt: new Date(),
                ownerId: uID, ownerName: user.first_name, ownerImg: user.photo_url
            });
            alert('تم البث! 🎉');
            location.reload();
        }

        window.onload = async () => {
            document.getElementById('myName').innerText = user.first_name;
            document.getElementById('myPhoto').src = user.photo_url || 'https://via.placeholder.com/150';
            await loadContent();
            const d = await db.collection("users").doc(uID).get();
            if(d.exists) { balance = d.data().balance || 0; document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`; document.getElementById('myBal').innerText = `$${balance.toFixed(4)}`; }
        };
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
