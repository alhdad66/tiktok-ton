<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - عبود</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; background: #000; 
            font-family: 'Cairo', sans-serif; color: white; overflow: hidden; 
        }

        /* حاوية الفيديو - تأكد أنها تستقبل اللمس */
        .video-container {
            position: absolute; top: 15%; left: 0; width: 100%; height: 60%;
            z-index: 5; /* خلف طبقة الأزرار ولكن مسموح لمسها */
        }
        
        iframe { 
            width: 100% !important; height: 100% !important; 
            pointer-events: auto !important; /* تفعيل اللمس */
        }

        /* طبقة الأزرار - التعديل الجوهري */
        .interaction-layer {
            position: absolute; inset: 0; z-index: 20; 
            pointer-events: none; /* لا تمنع اللمس عما خلفها */
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        /* السماح باللمس فقط للعناصر التفاعلية داخل الطبقة */
        .interactive-element {
            pointer-events: auto !important;
        }

        .side-bar {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #000; display: flex; justify-content: space-around;
            align-items: center; z-index: 1000; border-top: 1px solid #111;
        }

        .page {
            position: fixed; inset: 0; background: #000; z-index: 500;
            display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px;
        }
        .active-page { display: flex !important; }

        .red-badge {
            background: rgba(220, 38, 38, 0.2); border: 1px solid rgba(220, 38, 38, 0.5);
            padding: 6px 14px; border-radius: 50px; display: flex; align-items: center; gap: 6px;
        }

        .notif-badge {
            position: absolute; top: -5px; right: -5px; background: #fff;
            color: #dc2626; width: 18px; height: 18px; border-radius: 50%;
            font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center;
        }

        .reward-pop {
            position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
            color: #ef4444; font-weight: 900; font-size: 2rem; z-index: 3000;
            animation: floatUp 2s forwards; pointer-events: none;
        }
        @keyframes floatUp { 0% { opacity:0; transform: translate(-50%, 20px); } 20% { opacity:1; } 100% { opacity:0; transform: translate(-50%, -100px); } }
    </style>
</head>
<body>

    <!-- الجزء العلوي: الرصيد والتنبيهات باللون الأحمر -->
    <div class="fixed top-10 left-6 right-6 z-[1500] flex justify-between items-center pointer-events-none">
        <div class="red-badge interactive-element">
            <span id="mainBal" class="text-red-500 font-black text-lg">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
        </div>

        <div id="videoTimer" class="red-badge hidden !bg-red-600">
            <span id="timerText" class="text-white font-black text-xs">10s</span>
        </div>

        <div onclick="switchTab('notifs')" class="relative interactive-element cursor-pointer p-2 bg-zinc-900 rounded-full">
            <span class="text-xl">🔔</span>
            <div id="notifBadge" class="notif-badge hidden">0</div>
        </div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active-page !p-0">
        <div class="swiper mySwiper w-full h-full">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- صفحة الإشعارات -->
    <div id="notifsPage" class="page p-6 pt-24">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="switchTab('home')" class="bg-zinc-900 px-4 py-2 rounded-xl text-sm font-bold">رجوع</button>
            <h2 class="text-2xl font-black italic">الإشعارات 🔔</h2>
        </div>
        <div id="notifList" class="space-y-4"></div>
    </div>

    <!-- صفحة التحكم -->
    <div id="statsPage" class="page p-6 pt-28">
        <h2 class="text-3xl font-black italic text-center mb-10 text-red-500">لوحة التحكم</h2>
        <div class="bg-zinc-900/50 p-8 rounded-[2rem] border border-white/5">
            <input id="ytInput" type="text" placeholder="رابط يوتيوب..." class="w-full bg-black border border-white/10 p-5 rounded-2xl mb-4 text-center">
            <button onclick="handlePublish()" class="w-full bg-red-600 py-4 rounded-2xl font-black">نشر الفيديو</button>
        </div>
        <div id="myVideosList" class="mt-8 space-y-3"></div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <div onclick="switchTab('profile_self')" class="interactive-element text-3xl opacity-40">👤</div>
        <div onclick="switchTab('stats')" class="interactive-element bg-red-600 w-16 h-12 rounded-2xl flex items-center justify-center text-3xl font-black">+</div>
        <div onclick="switchTab('home')" class="interactive-element text-3xl">🏠</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "88583019");
        const userName = tg.initDataUnsafe?.user?.first_name || "عبود";
        const userImg = tg.initDataUnsafe?.user?.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";

        let allVideos = [], swiper, players = {}, currentTimer = null;
        let myLikes = [], watchedVids = [];

        async function init() {
            const userRef = db.collection("users").doc(uID);
            userRef.onSnapshot(d => {
                if(d.exists) {
                    const data = d.data();
                    document.getElementById('mainBal').innerText = `$${(data.balance || 0).toFixed(4)}`;
                    myLikes = data.likedVids || [];
                    watchedVids = data.watchedVids || [];
                }
            });

            db.collection("users").doc(uID).collection("notifs").where("seen", "==", false).onSnapshot(snap => {
                const b = document.getElementById('notifBadge');
                if(snap.size > 0) { b.innerText = snap.size; b.classList.remove('hidden'); }
                else { b.classList.add('hidden'); }
            });

            const snap = await db.collection("shared_videos").orderBy("createdAt", "desc").get();
            allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderHome();
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                const isLiked = myLikes.includes(v.id);
                wrap.innerHTML += `
                    <div class="swiper-slide bg-black">
                        <div class="video-container"><div id="player-${i}"></div></div>
                        <div class="interaction-layer">
                            <div class="side-bar">
                                <div class="interactive-element">
                                    <img src="${v.ownerImg}" class="w-14 h-14 rounded-full border-2 border-red-600 object-cover">
                                </div>
                                <div onclick="handleLike('${v.id}', '${v.ownerId}')" class="interactive-element text-center cursor-pointer">
                                    <span id="heart-${v.id}" class="text-4xl" style="filter: ${isLiked ? 'grayscale(0)' : 'grayscale(1)'}">❤️</span>
                                    <p id="count-${v.id}" class="text-sm font-black mt-1 text-white">${v.likes || 0}</p>
                                </div>
                                <div class="interactive-element text-3xl">🚀</div>
                            </div>
                            <div class="p-6 mb-20 text-right">
                                <h3 class="text-xl font-black">@${v.ownerName}</h3>
                            </div>
                        </div>
                    </div>`;
            });

            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", 
                on: { slideChange: () => { stopAll(); playIdx(swiper.activeIndex); } } 
            });
            setTimeout(initPlayers, 500);
            playIdx(0);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 0, controls: 1, modestbranding: 1, playsinline: 1 },
                    events: { 'onStateChange': (e) => { if(e.data == 1 && i == swiper.activeIndex) startTimer(i); } }
                });
            });
        }

        function playIdx(idx) { if(players[idx]?.playVideo) players[idx].playVideo(); }

        function stopAll() {
            Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo());
            clearInterval(currentTimer);
            document.getElementById('videoTimer').classList.add('hidden');
        }

        function startTimer(idx) {
            clearInterval(currentTimer);
            const v = allVideos[idx];
            if(!v || v.ownerId === uID || watchedVids.includes(v.id)) return;
            
            const badge = document.getElementById('videoTimer');
            badge.classList.remove('hidden');
            let sec = 10;
            document.getElementById('timerText').innerText = sec + "s";
            currentTimer = setInterval(async () => {
                sec--;
                document.getElementById('timerText').innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer);
                    badge.classList.add('hidden');
                    showReward();
                    await db.collection("users").doc(uID).update({ 
                        balance: firebase.firestore.FieldValue.increment(0.0005),
                        watchedVids: firebase.firestore.FieldValue.arrayUnion(v.id)
                    });
                }
            }, 1000);
        }

        async function handleLike(vidId, ownerId) {
            const isLiked = myLikes.includes(vidId);
            const heart = document.getElementById(`heart-${vidId}`);
            const countText = document.getElementById(`count-${vidId}`);
            let count = parseInt(countText.innerText);

            if(isLiked) {
                heart.style.filter = "grayscale(1)";
                countText.innerText = Math.max(0, count - 1);
                myLikes = myLikes.filter(id => id !== vidId);
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vidId) });
            } else {
                heart.style.filter = "grayscale(0)";
                countText.innerText = count + 1;
                myLikes.push(vidId);
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vidId) });
            }
        }

        async function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'profile_self') { alert("صفحة الملف قيد الصيانة"); return; }
            document.getElementById(t + 'Page').classList.add('active-page');
            stopAll();
            if(t === 'home') playIdx(swiper.activeIndex);
        }

        function showReward() { const p = document.createElement('div'); p.className='reward-pop'; p.innerText='+$0.0005'; document.body.appendChild(p); setTimeout(()=>p.remove(),2000); }
        window.onload = init;
    </script>
</body>
        </html>
