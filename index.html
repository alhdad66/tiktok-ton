<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فقرينر - التواصل الاجتماعي</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- Firebase Legacy SDK for compatibility -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --primary: #ff3b3b; --accent: #00f2ea; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow: hidden; margin: 0; }
        
        .v-card { position: relative; height: 100vh; width: 100vw; background: #111; display: flex; align-items: center; justify-content: center; }
        .yt-frame { width: 100vw !important; height: 56.25vw !important; pointer-events: none; z-index: 1; }

        /* Floating UI */
        .side-bar { position: absolute; right: 12px; bottom: 180px; z-index: 100; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .icon-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .icon-btn.active { color: var(--primary); transform: scale(1.1); }
        .follow-tag { background: var(--accent); color: black; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: -10px; font-weight: bold; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.95); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 3000; }
        .nav-link { opacity: 0.5; display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-link.active { opacity: 1; color: var(--accent); }
        .add-btn { background: white; color: black; width: 45px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-left: 3px solid var(--accent); border-right: 3px solid var(--primary); }

        /* Overlay Pages */
        .page-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page-overlay.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .glass { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 12px; border-bottom: 2px solid transparent; opacity: 0.6; }
        .tab-btn.active { border-color: var(--accent); opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <!-- Header Balance -->
    <div class="fixed top-10 left-5 z-[2500] flex items-center gap-2 bg-black/40 backdrop-blur-md p-2 rounded-full border border-white/10">
        <div class="w-6 h-6 bg-yellow-500 rounded-full flex items-center justify-center text-[10px] text-black font-bold">💰</div>
        <span id="headerBal" class="font-bold text-green-400">$0.0000</span>
    </div>

    <!-- Video Feed -->
    <div id="homePage" class="h-full w-full">
        <div class="swiper mySwiper h-full">
            <div class="swiper-wrapper" id="videoFeed">
                <!-- Loader -->
                <div class="swiper-slide flex items-center justify-center">
                    <p class="animate-pulse">جاري تحميل الفيديوهات...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Friends Page -->
    <div id="friendsPage" class="page-overlay">
        <h2 class="text-3xl font-black mb-6 mt-10">الأصدقاء 👥</h2>
        <div class="glass mb-4 text-center py-6">
            <p class="text-xs opacity-50 mb-2 font-bold uppercase">رابط الإحالة الخاص بك</p>
            <div id="refLink" class="bg-black/50 p-3 rounded-lg border border-white/5 text-[10px] mb-4 break-all">...</div>
            <button onclick="copyRef()" class="w-full bg-white text-black py-3 rounded-xl font-bold">نسخ الرابط 📋</button>
        </div>
        <div class="glass flex justify-between items-center">
            <span>عدد المدعوين:</span>
            <span id="friendCount" class="text-2xl font-black text-accent">0</span>
        </div>
    </div>

    <!-- Profile Page -->
    <div id="profilePage" class="page-overlay">
        <div class="flex flex-col items-center mt-10 mb-6">
            <div id="p-avatar" class="w-20 h-20 bg-gradient-to-tr from-accent to-primary rounded-full flex items-center justify-center text-3xl font-bold mb-2">?</div>
            <h3 id="p-name" class="text-xl font-bold">...</h3>
            <p class="text-xs opacity-50">@<span id="p-uid">0000</span></p>
            
            <div class="flex gap-8 mt-4 text-center">
                <div><p id="cnt-followers" class="font-bold">0</p><p class="text-[10px] opacity-50">متابع</p></div>
                <div><p id="cnt-following" class="font-bold">0</p><p class="text-[10px] opacity-50">أتابع</p></div>
                <div><p id="cnt-likes" class="font-bold">0</p><p class="text-[10px] opacity-50">إعجابات</p></div>
            </div>
        </div>

        <div class="flex border-b border-white/10 mb-4">
            <div onclick="setProfileTab('myvids')" id="tab-myvids" class="tab-btn active">فيديوهاتي</div>
            <div onclick="setProfileTab('likes')" id="tab-likes" class="tab-btn">الإعجابات</div>
            <div onclick="setProfileTab('social')" id="tab-social" class="tab-btn">العلاقات</div>
        </div>

        <div id="profileContent" class="space-y-3"></div>
    </div>

    <!-- Publish Page -->
    <div id="publishPage" class="page-overlay">
        <h2 class="text-2xl font-black mb-6 mt-10">نشر جديد 🎬</h2>
        <div class="glass">
            <label class="text-xs opacity-50 block mb-2">رابط يوتيوب (Shorts أو فيديو عادي)</label>
            <input id="ytInput" type="text" placeholder="https://youtube.com/..." class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 outline-none">
            <button onclick="publishVideo()" id="pubBtn" class="w-full bg-white text-black py-4 rounded-xl font-black">نشر الآن</button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div onclick="showPage('home')" class="nav-link active" id="n-home">🏠<span class="mt-1 text-[10px]">الرئيسية</span></div>
        <div onclick="showPage('friends')" class="nav-link" id="n-friends">👥<span class="mt-1 text-[10px]">الأصدقاء</span></div>
        <div onclick="showPage('publish')" class="add-btn">+</div>
        <div onclick="showPage('profile')" class="nav-link" id="n-profile">👤<span class="mt-1 text-[10px]">الملف</span></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // --- Initialization ---
        const firebaseConfig = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;

        const uID = String(tg.initDataUnsafe?.user?.id || "998877");
        const uName = tg.initDataUnsafe?.user?.first_name || "Guest User";
        let userLocal = {}, swiper, players = {}, currentVideos = [];
        let profileTab = 'myvids';

        async function init() {
            document.getElementById('refLink').innerText = `https://t.me/YourBotName?start=${uID}`;
            
            db.collection("users").doc(uID).onSnapshot(doc => {
                if(doc.exists) {
                    userLocal = doc.data();
                    renderUI();
                } else {
                    db.collection("users").doc(uID).set({
                        name: uName, balance: 0, views: 0, 
                        friendsCount: 0, likes: [], following: [], followers: 0,
                        createdAt: new Date()
                    });
                }
            });
            loadGlobalFeed();
        }

        function renderUI() {
            document.getElementById('headerBal').innerText = `$${(userLocal.balance || 0).toFixed(4)}`;
            document.getElementById('p-name').innerText = userLocal.name;
            document.getElementById('p-avatar').innerText = userLocal.name[0];
            document.getElementById('p-uid').innerText = uID;
            document.getElementById('friendCount').innerText = userLocal.friendsCount || 0;
            
            document.getElementById('cnt-followers').innerText = userLocal.followers || 0;
            document.getElementById('cnt-following').innerText = (userLocal.following || []).length;
            document.getElementById('cnt-likes').innerText = (userLocal.likes || []).length;
        }

        // --- Feed Logic ---
        async function loadGlobalFeed() {
            const snap = await db.collection("shared_videos").orderBy("createdAt", "desc").limit(20).get();
            currentVideos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            const feed = document.getElementById('videoFeed');
            if(currentVideos.length === 0) {
                feed.innerHTML = `<div class="swiper-slide flex items-center justify-center text-gray-500">لا توجد فيديوهات حالياً</div>`;
                return;
            }

            feed.innerHTML = currentVideos.map((v, i) => `
                <div class="swiper-slide">
                    <div class="v-card"><div id="player-${i}" class="yt-frame"></div></div>
                    <div class="side-bar">
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden bg-white/10 mb-2">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=${v.ownerName}">
                            </div>
                            <button onclick="toggleFollow('${v.ownerId}', '${v.ownerName}')" id="f-btn-${v.ownerId}" class="follow-tag">
                                ${ (userLocal.following || []).includes(v.ownerId) ? '✓' : '+' }
                            </button>
                        </div>
                        <button onclick="toggleLike('${v.id}')" id="l-btn-${v.id}" class="icon-btn ${(userLocal.likes || []).includes(v.id) ? 'active' : ''}">
                            ❤️
                        </button>
                        <button onclick="copyRef()" class="icon-btn">↗️</button>
                    </div>
                    <div class="absolute left-5 bottom-24 z-50 pointer-events-none">
                        <h4 class="font-black text-lg">@${v.ownerName}</h4>
                        <p class="text-xs opacity-70">مشاهدة الفيديوهات تزيد رصيدك</p>
                    </div>
                </div>
            `).join('');

            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", 
                on: { slideChange: () => { stopAll(); playIdx(swiper.activeIndex); } } 
            });
            initPlayers();
        }

        function initPlayers() {
            currentVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 0, controls: 0, playsinline: 1, modestbranding: 1, loop: 1 },
                    events: { 'onStateChange': (e) => { if(e.data == 1) trackEarning(v.id); } }
                });
            });
            setTimeout(() => playIdx(0), 1500);
        }

        function playIdx(i) { if(players[i] && players[i].playVideo) players[i].playVideo(); }
        function stopAll() { Object.values(players).forEach(p => { if(p.pauseVideo) p.pauseVideo(); }); }

        let earnInterval;
        function trackEarning(vid) {
            clearInterval(earnInterval);
            earnInterval = setInterval(() => {
                db.collection("users").doc(uID).update({
                    balance: firebase.firestore.FieldValue.increment(0.0001)
                });
            }, 10000); // 0.0001 every 10 seconds
        }

        // --- Social Logic ---
        async function toggleLike(vid) {
            const isLiked = (userLocal.likes || []).includes(vid);
            const method = isLiked ? 'arrayRemove' : 'arrayUnion';
            await db.collection("users").doc(uID).update({ likes: firebase.firestore.FieldValue[method](vid) });
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function toggleFollow(targetUID, targetName) {
            if(targetUID === uID) return;
            const isFollowing = (userLocal.following || []).includes(targetUID);
            const method = isFollowing ? 'arrayRemove' : 'arrayUnion';
            const increment = isFollowing ? -1 : 1;
            
            await db.collection("users").doc(uID).update({ following: firebase.firestore.FieldValue[method](targetUID) });
            await db.collection("users").doc(targetUID).update({ followers: firebase.firestore.FieldValue.increment(increment) });
            
            tg.showScanQrPopup({ text: isFollowing ? `إلغاء متابعة ${targetName}` : `متابعة ${targetName}` });
            setTimeout(() => tg.closeScanQrPopup(), 800);
        }

        // --- Profile Management ---
        function setProfileTab(t) {
            profileTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            renderProfileContent();
        }

        async function renderProfileContent() {
            const container = document.getElementById('profileContent');
            container.innerHTML = `<p class="text-center opacity-30 py-10">جاري التحميل...</p>`;

            if(profileTab === 'myvids') {
                const snap = await db.collection("shared_videos").where("ownerId", "==", uID).get();
                if(snap.empty) container.innerHTML = `<p class="text-center opacity-30 py-10">لم تنشر فيديوهات بعد</p>`;
                else container.innerHTML = snap.docs.map(doc => `
                    <div class="glass flex justify-between items-center">
                        <div class="text-xs">
                            <p class="font-bold">فيديو ID: ${doc.data().videoId}</p>
                            <p class="opacity-50">المشاهدات: ${doc.data().globalViews || 0}</p>
                        </div>
                        <button onclick="deleteVid('${doc.id}')" class="text-red-500">حذف 🗑️</button>
                    </div>
                `).join('');
            } else if(profileTab === 'likes') {
                if(!userLocal.likes?.length) container.innerHTML = `<p class="text-center opacity-30 py-10">لا توجد إعجابات</p>`;
                else {
                    container.innerHTML = "";
                    for(let lid of userLocal.likes) {
                        const v = await db.collection("shared_videos").doc(lid).get();
                        if(v.exists) container.innerHTML += `
                            <div class="glass flex justify-between items-center">
                                <span class="text-xs">بواسطة: ${v.data().ownerName}</span>
                                <button onclick="toggleLike('${lid}')" class="text-primary">إلغاء ❤️</button>
                            </div>
                        `;
                    }
                }
            } else if(profileTab === 'social') {
                if(!userLocal.following?.length) container.innerHTML = `<p class="text-center opacity-30 py-10">لا تتابع أحداً</p>`;
                else {
                    container.innerHTML = `<h4 class="text-xs opacity-50 mb-2">من أتابعهم:</h4>`;
                    for(let fuid of userLocal.following) {
                        const u = await db.collection("users").doc(fuid).get();
                        if(u.exists) container.innerHTML += `
                            <div class="glass flex justify-between items-center">
                                <span>${u.data().name}</span>
                                <button onclick="toggleFollow('${fuid}', '${u.data().name}')" class="text-xs bg-white/10 px-3 py-1 rounded-full">إلغاء المتابعة</button>
                            </div>
                        `;
                    }
                }
            }
        }

        // --- Navigation ---
        function showPage(p) {
            document.querySelectorAll('.page-overlay').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            if(p === 'home') {
                playIdx(swiper.activeIndex);
            } else {
                stopAll();
                document.getElementById(p + 'Page').classList.add('active');
                if(p === 'profile') renderProfileContent();
            }
            document.getElementById('n-'+ (p==='home'?'home':p)).classList.add('active');
        }

        async function publishVideo() {
            const url = document.getElementById('ytInput').value;
            const vId = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/)?.[1];
            if(!vId) return tg.showAlert("رابط يوتيوب غير صالح!");
            
            document.getElementById('pubBtn').innerText = "جاري المعالجة...";
            await db.collection("shared_videos").add({
                videoId: vId, ownerId: uID, ownerName: uName, globalViews: 0, createdAt: new Date()
            });
            tg.showAlert("تم نشر الفيديو بنجاح!");
            showPage('home');
            loadGlobalFeed();
        }

        async function deleteVid(id) {
            await db.collection("shared_videos").doc(id).delete();
            renderProfileContent();
        }

        function copyRef() {
            const el = document.createElement('textarea');
            el.value = document.getElementById('refLink').innerText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showScanQrPopup({ text: "تم نسخ رابط الإحالة!" });
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
