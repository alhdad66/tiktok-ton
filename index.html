<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fogrener - Debug Mode</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .swiper { height: 100vh; width: 100vw; z-index: 10; }
        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        .touch-mask { position: absolute; inset: 0; z-index: 20; background: transparent; }
        
        /* Navigation */
        .bottom-tabs { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .tab { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 11px; }
        .tab.active { color: #fff; }
        .btn-add { background: #fff; width: 45px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; position: relative; }

        /* Full Pages */
        .sub-page { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .sub-page.active { display: flex; }

        /* Debug Console - الفكرة الجهنمية */
        #debug-console { 
            position: fixed; bottom: 80px; left: 10px; right: 10px; 
            height: 150px; background: rgba(0,0,0,0.9); border: 1px solid #333;
            border-radius: 12px; z-index: 5000; font-family: monospace; 
            font-size: 10px; color: #0f0; padding: 10px; overflow-y: auto;
            display: none; pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- Debug Console -->
    <div id="debug-console">
        <div class="flex justify-between border-b border-zinc-800 mb-2 pb-1">
            <span>LOGS / الأخطاء</span>
            <span onclick="document.getElementById('debug-console').style.display='none'" class="text-red-500">إغلاق</span>
        </div>
        <div id="logs"></div>
    </div>

    <!-- Top UI -->
    <div class="fixed top-10 left-5 right-5 flex justify-between items-center z-[100] pointer-events-none">
        <div class="interactive bg-black/60 p-2 rounded-full clickable" 
             onclick="log('جاري التحديث...'); location.reload()" 
             oncontextmenu="event.preventDefault(); toggleDebug()">
            🔄
        </div>
        <div class="interactive bg-black/60 px-4 py-2 rounded-full border border-white/10 flex items-center gap-2 clickable" onclick="openPage('wallet')">
            <span id="bal-top" class="text-green-400 font-black">0.0000</span>💰
        </div>
    </div>

    <!-- Feed -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="video-feed">
            <div class="swiper-slide flex items-center justify-center">تحميل البيانات...</div>
        </div>
    </div>

    <!-- Navbar -->
    <div class="bottom-tabs">
        <div class="tab active clickable" id="btn-home" onclick="closeAll()"><span>🏠</span><span>الرئيسية</span></div>
        <div class="tab clickable" id="btn-friends" onclick="openPage('friends')"><span>👥</span><span>الأصدقاء</span></div>
        <div class="btn-add clickable" onclick="openPage('add')">+</div>
        <div class="tab clickable" id="btn-wallet" onclick="openPage('wallet')"><span>💰</span><span>الأرباح</span></div>
        <div class="tab clickable" id="btn-profile" onclick="openPage('profile')"><span>👤</span><span>الملف</span></div>
    </div>

    <!-- Profile Page -->
    <div id="page-profile" class="sub-page">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">ملفي</h2>
            <span class="text-3xl clickable" onclick="closeAll()">✕</span>
        </div>
        <div class="flex items-center gap-4 mb-6">
            <div id="prof-img" class="w-20 h-20 rounded-full border-2 border-red-500 overflow-hidden bg-zinc-900"></div>
            <div>
                <h3 id="prof-name" class="text-xl font-bold">...</h3>
                <p id="prof-uid" class="text-xs text-zinc-500"></p>
            </div>
        </div>
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
            <p class="text-xs text-zinc-400">إجمالي الأرباح</p>
            <h2 id="prof-bal" class="text-3xl font-black text-green-400">$0.0000</h2>
        </div>
    </div>

    <!-- Add Page -->
    <div id="page-add" class="sub-page">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black">نشر فيديو</h2><span onclick="closeAll()">✕</span></div>
        <input type="text" id="v-input" placeholder="رابط يوتيوب..." class="w-full bg-zinc-900 p-4 rounded-xl mb-4 border border-zinc-800">
        <button onclick="uploadVideo()" class="w-full bg-[#fe2c55] py-4 rounded-xl font-bold">نشر</button>
    </div>

    <!-- Wallet Page -->
    <div id="page-wallet" class="sub-page text-center">
        <div class="flex justify-between items-center mb-8 text-right"><h2 class="text-2xl font-black">المحفظة</h2><span onclick="closeAll()">✕</span></div>
        <h1 class="text-5xl font-black text-green-400 my-10" id="w-bal-val">$0.0000</h1>
        <button class="w-full bg-white text-black py-4 rounded-xl font-bold" onclick="alert('السحب متاح قريباً')">سحب الرصيد</button>
    </div>

    <!-- Friends Page -->
    <div id="page-friends" class="sub-page">
        <div class="flex justify-between items-center mb-8 text-right"><h2 class="text-2xl font-black">دعوة الأصدقاء</h2><span onclick="closeAll()">✕</span></div>
        <div id="ref-link" class="bg-zinc-900 p-4 rounded-xl text-xs break-all mb-4 text-blue-400">...</div>
        <button onclick="copyRef()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">نسخ الرابط</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // دالة الـ Log للفكرة الجهنمية
        function log(msg, type = 'info') {
            const l = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-500' : (type === 'success' ? 'text-green-500' : 'text-blue-400');
            l.innerHTML = `<div class="mb-1"><span class="text-zinc-600">[${time}]</span> <span class="${color}">${msg}</span></div>` + l.innerHTML;
            if(type === 'error') document.getElementById('debug-console').style.display = 'block';
        }

        function toggleDebug() {
            const c = document.getElementById('debug-console');
            c.style.display = c.style.display === 'none' ? 'block' : 'none';
        }

        // تهيئة البيانات
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const tg = window.Telegram.WebApp;

        // الاسم والصورة فوراً
        const tgU = tg.initDataUnsafe?.user;
        const uName = tgU?.first_name || "مستخدم فقرينر";
        const uPhoto = tgU?.photo_url || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${tgU?.id || '1'}`;
        
        document.getElementById('prof-name').innerText = uName;
        document.getElementById('prof-img').innerHTML = `<img src="${uPhoto}" class="w-full h-full object-cover">`;
        log(`مرحباً ${uName}، جاري الاتصال بالخادم...`);

        let user = null, swiper, players = {}, videos = [];

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    log("جاري الدخول عبر التوكن...");
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    log("الدخول كضيف...");
                    await auth.signInAnonymously();
                }
            } catch (e) {
                log("خطأ في الدخول: " + e.message, 'error');
                await auth.signInAnonymously();
            }
        }

        auth.onAuthStateChanged(u => {
            if (u) {
                user = u;
                log("تم الاتصال بنجاح. ID: " + u.uid.substring(0,8), 'success');
                document.getElementById('prof-uid').innerText = `ID: ${u.uid.substring(0,12)}`;
                document.getElementById('ref-link').innerText = `https://t.me/FogrenerBot?start=${u.uid}`;
                syncData();
                loadVids();
            }
        });

        function syncData() {
            const p = `/artifacts/${appId}/users/${user.uid}/profile/vDEBUG_FINAL`;
            db.doc(p).onSnapshot(doc => {
                if (doc.exists) {
                    const b = (doc.data().balance || 0).toFixed(4);
                    document.getElementById('bal-top').innerText = b;
                    document.getElementById('w-bal-val').innerText = `$${b}`;
                    document.getElementById('prof-bal').innerText = `$${b}`;
                } else {
                    log("إنشاء ملف مستخدم جديد...");
                    db.doc(p).set({ balance: 0, created: new Date() });
                }
            }, (e) => log("خطأ Firestore: " + e.message, 'error'));
        }

        async function loadVids() {
            log("جاري جلب الفيديوهات...");
            const snap = await db.collection(`/artifacts/${appId}/public/data/vDEBUG_VIDS`).get();
            videos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            if (videos.length === 0) {
                document.getElementById('video-feed').innerHTML = `<div class="swiper-slide flex items-center justify-center text-zinc-600">لا توجد فيديوهات</div>`;
                return;
            }

            document.getElementById('video-feed').innerHTML = videos.map((v, i) => `
                <div class="swiper-slide">
                    <div class="video-box relative h-full w-full flex items-center justify-center">
                        <div id="player-${i}"></div>
                        <div class="touch-mask" onclick="toggleV(${i})"></div>
                        <div class="absolute bottom-[100px] left-5 pointer-events-none z-50">
                            <h3 class="font-bold text-xl">@${v.author}</h3>
                        </div>
                    </div>
                </div>
            `).join('');

            initSwiper();
        }

        function initSwiper() {
            swiper = new Swiper(".mySwiper", {
                direction: "vertical",
                on: { slideChange: () => { stopAll(); play(swiper.activeIndex); } }
            });
            videos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 0, controls: 0, modestbranding: 1, playsinline: 1 }
                });
            });
            setTimeout(() => play(0), 1000);
            log("تم تجهيز واجهة الفيديوهات", 'success');
        }

        function openPage(id) {
            stopAll();
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`btn-${id}`)?.classList.add('active');
            log(`فتح صفحة: ${id}`);
        }

        function closeAll() {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('btn-home').classList.add('active');
            if(swiper) play(swiper.activeIndex);
        }

        async function uploadVideo() {
            const url = document.getElementById('v-input').value;
            const id = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if (!id) return log("رابط يوتيوب غير صالح!", 'error');
            await db.collection(`/artifacts/${appId}/public/data/vDEBUG_VIDS`).add({ videoId: id, author: uName, time: new Date() });
            log("تم النشر بنجاح!", 'success');
            location.reload();
        }

        function toggleV(i) {
            const s = players[i]?.getPlayerState?.();
            if (s === 1) players[i].pauseVideo(); else players[i].playVideo();
        }
        function stopAll() { Object.values(players).forEach(p => p.pauseVideo?.()); }
        function play(i) { players[i]?.playVideo?.(); }

        function copyRef() {
            const l = document.getElementById('ref-link').innerText;
            const el = document.createElement('textarea'); el.value = l;
            document.body.appendChild(el); el.select(); document.execCommand('copy');
            document.body.removeChild(el); log("تم نسخ الرابط", 'success');
        }

        window.onload = init;
    </script>
</body>
</html>
