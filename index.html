<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فقرينر - النسخة الأصلية</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; }
        .swiper { height: 100vh; width: 100vw; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        .yt-placeholder { width: 100%; height: 100%; pointer-events: none; }
        
        /* Side Icons */
        .side-bar {
            position: absolute;
            right: 12px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }
        .icon-group { text-align: center; }
        .icon-circle { 
            width: 45px; height: 45px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* Bottom Nav */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #111;
            z-index: 20;
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #777; }
        .nav-btn.active { color: #fff; }
        .add-icon { background: #fff; color: #000; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 18px; }

        /* Overlay Pages */
        .page {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: none;
            padding: 20px;
        }
        .page.active { display: block; }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <div class="fixed top-4 left-0 right-0 z-50 flex justify-center">
        <div class="bg-black/40 backdrop-blur px-4 py-1 rounded-full border border-white/10 flex items-center gap-2">
            <span class="text-yellow-500">💰</span>
            <span id="top-balance" class="font-bold">0.0000</span>
        </div>
    </div>

    <!-- Main Swiper Feed -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="feed-container">
            <!-- Videos inject here -->
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="nav-bar">
        <div class="nav-btn active" onclick="showPage('home')"><span>🏠</span><span>الرئيسية</span></div>
        <div class="nav-btn" onclick="alert('قريباً')"><span>👥</span><span>الأصدقاء</span></div>
        <div class="add-icon" onclick="showPage('add')">+</div>
        <div class="nav-btn" onclick="showPage('wallet')"><span>💰</span><span>المحفظة</span></div>
        <div class="nav-btn" onclick="showPage('profile')"><span>👤</span><span>الملف</span></div>
    </div>

    <!-- Wallet Page -->
    <div id="page-wallet" class="page">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold">المحفظة</h1>
            <button onclick="closePages()" class="text-2xl">✕</button>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl text-center">
            <p class="text-gray-400 mb-2">رصيدك الحالي</p>
            <h2 class="text-5xl font-black text-green-500 mb-8" id="wallet-balance">$0.0000</h2>
            <button onclick="alert('سيتم السحب قريباً')" class="w-full bg-white text-black py-4 rounded-xl font-bold">سحب الأرباح</button>
        </div>
    </div>

    <!-- Add Video Page -->
    <div id="page-add" class="page">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold">نشر فيديو جديد</h1>
            <button onclick="closePages()" class="text-2xl">✕</button>
        </div>
        <input type="text" id="video-url" placeholder="رابط يوتيوب هنا..." class="w-full bg-zinc-900 p-4 rounded-xl border border-white/10 mb-4 outline-none">
        <button onclick="publishVideo()" id="pub-btn" class="w-full bg-red-600 py-4 rounded-xl font-bold">نشر الآن</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const tg = window.Telegram.WebApp;

        let currentUser = null;
        let players = {};
        let swiper;

        // Auth Logic (Rule 3)
        async function startApp() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                initDataSync();
                loadFeed();
            }
        });

        function initDataSync() {
            const userPath = `/artifacts/${appId}/users/${currentUser.uid}/profile/main`;
            db.doc(userPath).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    const b = (data.balance || 0).toFixed(4);
                    document.getElementById('top-balance').innerText = b;
                    document.getElementById('wallet-balance').innerText = `$${b}`;
                } else {
                    db.doc(userPath).set({ balance: 0, likes: 0, videos: 0 });
                }
            });
        }

        async function loadFeed() {
            const publicPath = `/artifacts/${appId}/public/data/videos`;
            const snap = await db.collection(publicPath).get();
            const videos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            const container = document.getElementById('feed-container');
            if (videos.length === 0) {
                container.innerHTML = `<div class="swiper-slide flex items-center justify-center">لا توجد فيديوهات حالياً</div>`;
                return;
            }

            container.innerHTML = videos.map((v, i) => `
                <div class="swiper-slide">
                    <div class="video-container">
                        <div id="player-${i}" class="yt-placeholder"></div>
                        <div class="side-bar">
                            <div class="icon-group" onclick="likeVideo('${v.id}')">
                                <div class="icon-circle text-red-500">❤️</div>
                                <span class="text-xs font-bold">${v.likes || 0}</span>
                            </div>
                            <div class="icon-group">
                                <div class="icon-circle">💬</div>
                                <span class="text-xs font-bold">0</span>
                            </div>
                            <div class="icon-group">
                                <div class="icon-circle">🚀</div>
                                <span class="text-xs font-bold">مشاركة</span>
                            </div>
                        </div>
                        <div class="absolute bottom-[80px] left-4 z-10">
                            <h3 class="font-bold">@${v.author || 'User'}</h3>
                            <p class="text-sm opacity-80">شاهد الفيديو لتربح النقاط!</p>
                        </div>
                    </div>
                </div>
            `).join('');

            initSwiper(videos);
        }

        function initSwiper(vids) {
            swiper = new Swiper(".mySwiper", {
                direction: "vertical",
                on: {
                    slideChange: () => {
                        Object.values(players).forEach(p => p.pauseVideo?.());
                        players[swiper.activeIndex]?.playVideo();
                    }
                }
            });

            vids.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 0, controls: 0, modestbranding: 1, playsinline: 1 },
                    events: { 'onStateChange': (e) => handleEarn(e) }
                });
            });
            setTimeout(() => players[0]?.playVideo(), 1500);
        }

        let earnInterval = null;
        function handleEarn(e) {
            if (e.data === YT.PlayerState.PLAYING) {
                earnInterval = setInterval(() => {
                    const userPath = `/artifacts/${appId}/users/${currentUser.uid}/profile/main`;
                    db.doc(userPath).update({ balance: firebase.firestore.FieldValue.increment(0.0001) });
                }, 5000);
            } else {
                clearInterval(earnInterval);
            }
        }

        async function publishVideo() {
            const url = document.getElementById('video-url').value;
            const vidId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if (!vidId) return alert("الرابط خطأ");

            document.getElementById('pub-btn').innerText = "جاري النشر...";
            const publicPath = `/artifacts/${appId}/public/data/videos`;
            await db.collection(publicPath).add({
                videoId: vidId,
                author: tg.initDataUnsafe?.user?.first_name || "مستخدم",
                likes: 0,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            location.reload();
        }

        function likeVideo(id) {
            const publicPath = `/artifacts/${appId}/public/data/videos/${id}`;
            db.doc(publicPath).update({ likes: firebase.firestore.FieldValue.increment(1) });
            tg.HapticFeedback.impactOccurred('light');
        }

        function showPage(p) {
            Object.values(players).forEach(pl => pl.pauseVideo?.());
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            if (p !== 'home') document.getElementById(`page-${p}`).classList.add('active');
        }

        function closePages() {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            players[swiper.activeIndex]?.playVideo();
        }

        window.onload = startApp;
    </script>
</body>
</html>
