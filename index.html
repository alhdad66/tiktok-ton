<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عبود برو - Creator Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .nav-btn { transition: all 0.3s; color: #555; }
        .nav-btn.active { color: #dc2626; transform: scale(1.1); }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); }
        .page { height: 100vh; overflow-y: auto; padding-bottom: 120px; display: none; }
        .page.active { display: block; }
        .publish-btn { background: #dc2626; width: 60px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .studio-card { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <!-- التوب بار: تاج، رصيد، إشعارات -->
    <div class="fixed top-0 left-0 right-0 h-16 flex justify-between items-center px-4 z-[6000] pointer-events-none">
        <div class="flex items-center gap-2 pointer-events-auto">
            <button onclick="switchTab('admin')" id="crownBtn" class="text-2xl hidden">👑</button>
            <button onclick="switchTab('notifs')" class="relative text-xl p-2 bg-zinc-900/50 rounded-full border border-white/5">
                🔔<div id="notifBadge" class="absolute -top-1 -right-1 bg-red-600 text-[8px] w-4 h-4 rounded-full hidden flex items-center justify-center font-black">0</div>
            </button>
        </div>
        <div class="pointer-events-auto bg-zinc-900/80 px-4 py-1.5 rounded-full border border-white/5 backdrop-blur-md">
            <span id="topBalance" class="text-red-500 font-black text-sm">$0.0000</span>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="homePage" class="page active"><div class="swiper"><div class="swiper-wrapper" id="videoWrapper"></div></div></div>
    
    <div id="tasksPage" class="page p-6 pt-24"><h2 class="text-3xl font-black mb-8 text-red-600 italic">المهام 📋</h2><div id="tasksList" class="space-y-4"></div></div>
    
    <div id="notifsPage" class="page p-6 pt-24"><h2 class="text-2xl font-black mb-6 px-2 text-right">الإشعارات</h2><div id="notifList" class="space-y-3 px-2"></div></div>

    <div id="profilePage" class="page p-6 pt-24 text-center">
        <div class="w-24 h-24 rounded-full border-2 border-red-600 p-1 mx-auto mb-4"><img id="userImg" src="" class="w-full h-full rounded-full object-cover"></div>
        <h2 id="userNameDisp" class="text-xl font-black italic mb-6">...</h2>
        <div class="studio-card p-6 mb-4">
            <p class="text-[10px] text-zinc-500 font-bold uppercase mb-1">الرصيد الكلي</p>
            <p id="profileBalance" class="text-3xl font-black text-red-600">$0.0000</p>
        </div>
        <button onclick="openModal('withdrawModal')" class="w-full bg-red-600 py-4 rounded-2xl font-black shadow-lg">سحب الأرباح 💸</button>
    </div>

    <!-- لوحة التحكم للآدمن -->
    <div id="adminPage" class="page p-6 pt-24 text-right">
        <h2 class="text-3xl font-black mb-8 text-red-600 italic">لوحة الإدارة 👑</h2>
        <div id="adminWithdrawalsList" class="mb-8 space-y-3"></div>
        <div class="studio-card p-6 mb-8 border-red-600/20">
            <h3 class="font-black mb-4 text-red-500">إضافة مهمة</h3>
            <input id="taskTitle" type="text" placeholder="العنوان" class="w-full bg-black border border-white/10 p-4 rounded-xl text-xs mb-2 text-right">
            <input id="taskLink" type="text" placeholder="الرابط" class="w-full bg-black border border-white/10 p-4 rounded-xl text-xs mb-2 text-right text-white">
            <input id="taskReward" type="number" step="0.0001" placeholder="المكافأة $" class="w-full bg-black border border-white/10 p-4 rounded-xl text-xs mb-4 text-right">
            <button onclick="addNewTask()" class="w-full bg-red-600 py-3 rounded-xl font-black">حفظ المهمة</button>
        </div>
        <div id="adminUsersList" class="space-y-4"></div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="fixed bottom-0 left-0 right-0 h-20 glass flex justify-around items-center z-[5000]">
        <button onclick="switchTab('home')" class="nav-btn active text-2xl">🏠</button>
        <button onclick="switchTab('tasks')" class="nav-btn text-2xl">📋</button>
        <button onclick="openStudio()" class="publish-btn">+</button>
        <button onclick="switchTab('profile')" class="nav-btn text-2xl">👤</button>
    </div>

    <!-- نافذة استوديو المنشئ (التي طلبتها) -->
    <div id="studioModal" class="fixed inset-0 bg-black z-[10000] hidden overflow-y-auto pb-24">
        <div class="p-6 pt-12">
            <div class="flex justify-between items-center mb-8">
                <button onclick="closeModal('studioModal')" class="text-zinc-500 text-sm font-bold italic">إغلاق</button>
                <h2 class="text-2xl font-black text-red-600 italic">مركز المنشئ 🎥</h2>
            </div>

            <!-- 1. قسم النشر -->
            <div class="studio-card p-6 mb-6">
                <h3 class="text-sm font-black mb-4 text-right">نشر فيديو يوتيوب</h3>
                <div class="flex gap-2">
                    <button onclick="publishVideo()" class="bg-red-600 px-6 rounded-xl font-black text-sm">نشر</button>
                    <input id="videoLinkInput" type="text" placeholder="رابط الفيديو..." class="flex-1 bg-black border border-white/10 p-4 rounded-xl text-xs text-right text-white outline-none focus:border-red-600">
                </div>
            </div>

            <!-- 2. قسم الإحصائيات (الرسم البياني) -->
            <div class="studio-card p-6 mb-6 text-right">
                <h3 class="text-sm font-black mb-4">إحصائيات الأداء</h3>
                <div class="h-40 w-full mb-4">
                    <canvas id="viewsChart"></canvas>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-zinc-500 font-bold mb-1 uppercase">إجمالي المشاهدات</p>
                        <p id="totalViewsStat" class="text-xl font-black text-red-500">0</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-zinc-500 font-bold mb-1 uppercase">فيديوهاتك</p>
                        <p id="totalVidsStat" class="text-xl font-black text-white">0</p>
                    </div>
                </div>
            </div>

            <!-- 3. قسم إدارة الفيديوهات (الحذف والتعديل) -->
            <h3 class="text-sm font-black mb-4 text-right px-2">إدارة فيديوهاتك</h3>
            <div id="studioVidsList" class="space-y-3"></div>
        </div>
    </div>

    <!-- نافذة السحب -->
    <div id="withdrawModal" class="fixed inset-0 bg-black/95 z-[10000] hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10">
            <h3 class="text-xl font-black mb-6 text-right italic text-red-600">طلب سحب 💸</h3>
            <input id="withdrawWallet" type="text" placeholder="رقم الهاتف / المحفظة" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-3 text-right">
            <input id="withdrawAmount" type="number" placeholder="المبلغ (Min 10$)" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-6 text-right">
            <button onclick="submitWithdraw()" class="w-full bg-red-600 py-4 rounded-2xl font-black shadow-lg">تأكيد</button>
            <button onclick="closeModal('withdrawModal')" class="w-full py-3 text-zinc-600 text-xs mt-2 text-center">إلغاء</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBwWz2qN-S_G4XFp89W64V-L38iN1_p7S0",
            authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124",
            storageBucket: "tik-ton-92124.appspot.com",
            messagingSenderId: "367332766324",
            appId: "1:367332766324:web:0f41334ec40ef03063806e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const tgUser = tg.initDataUnsafe?.user || {};
        const uID = String(tgUser.id || "7416599626");
        const adminID = "7416599626";

        let balance = 0, allVideos = [], swiper, players = {}, currentTimer = null;
        let watchedVids = [], myVideos = [], viewsChart = null;

        async function init() {
            const userRef = db.collection("users").doc(uID);
            userRef.onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    balance = data.balance || 0;
                    watchedVids = data.watchedVids || [];
                    const bStr = `$${balance.toFixed(4)}`;
                    document.getElementById('topBalance').innerText = bStr;
                    document.getElementById('profileBalance').innerText = bStr;
                    document.getElementById('userNameDisp').innerText = data.name;
                    document.getElementById('userImg').src = data.img || "";
                }
            });

            if(uID === adminID) document.getElementById('crownBtn').classList.remove('hidden');

            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                myVideos = allVideos.filter(v => v.ownerId === uID);
                renderHome();
                if(document.getElementById('studioModal').style.display === 'block') updateStudioUI();
            });
            loadNotifs();
            loadAdminTools();
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            wrap.innerHTML = allVideos.map((v, i) => `
                <div class="swiper-slide relative">
                    <div id="player-${i}" class="w-full h-full pointer-events-none"></div>
                    <div class="absolute right-6 bottom-40 flex flex-col items-center gap-6 z-20">
                        <img src="${v.ownerImg}" class="w-12 h-12 rounded-full border-2 border-red-600 object-cover">
                        <button class="text-3xl">❤️</button>
                    </div>
                </div>`).join('');
            if(swiper) swiper.destroy();
            swiper = new Swiper(".swiper", { direction: "vertical", on: { slideChange: () => { stopAll(); startTimer(swiper.activeIndex); } } });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, playsinline: 1 },
                    events: { onStateChange: (e) => { if(e.data === 1 && i === swiper.activeIndex) startTimer(i); } }
                });
            });
        }

        function startTimer(i) {
            if(currentTimer) clearInterval(currentTimer);
            let sec = 0;
            currentTimer = setInterval(async () => {
                sec++;
                if(sec >= 15) {
                    clearInterval(currentTimer);
                    const vid = allVideos[i];
                    if(!watchedVids.includes(vid.id)) {
                        await db.collection("users").doc(uID).update({
                            balance: firebase.firestore.FieldValue.increment(0.0005),
                            watchedVids: firebase.firestore.FieldValue.arrayUnion(vid.id)
                        });
                        await db.collection("shared_videos").doc(vid.id).update({ views: firebase.firestore.FieldValue.increment(1) });
                    }
                }
            }, 1000);
        }

        function stopAll() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); }

        function openStudio() {
            document.getElementById('studioModal').style.display = 'block';
            updateStudioUI();
            stopAll();
        }

        function updateStudioUI() {
            const list = document.getElementById('studioVidsList');
            list.innerHTML = '';
            let totalVViews = 0;
            const chartData = [];

            myVideos.forEach(v => {
                totalVViews += (v.views || 0);
                chartData.push(v.views || 0);
                list.innerHTML += `
                    <div class="studio-card p-4 flex items-center justify-between border-none bg-zinc-900/40">
                        <button onclick="deleteVideo('${v.id}')" class="text-red-500 bg-red-500/10 p-2 rounded-xl text-sm italic">حذف</button>
                        <div class="flex-1 px-4 text-right">
                            <p class="text-xs font-black text-white">المشاهدات: ${v.views || 0}</p>
                            <p class="text-[8px] text-zinc-500">${v.videoId}</p>
                        </div>
                        <img src="https://img.youtube.com/vi/${v.videoId}/default.jpg" class="w-16 h-10 rounded-lg object-cover">
                    </div>`;
            });

            document.getElementById('totalViewsStat').innerText = totalVViews;
            document.getElementById('totalVidsStat').innerText = myVideos.length;
            renderChart(chartData);
        }

        function renderChart(data) {
            const ctx = document.getElementById('viewsChart').getContext('2d');
            if(viewsChart) viewsChart.destroy();
            viewsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i + 1),
                    datasets: [{
                        label: 'المشاهدات',
                        data: data,
                        borderColor: '#dc2626',
                        backgroundColor: 'rgba(220, 38, 38, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false },
                        y: { display: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', font: { size: 8 } } }
                    }
                }
            });
        }

        async function publishVideo() {
            const url = document.getElementById('videoLinkInput').value;
            const vId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            if(!vId || vId.length < 5) return alert("الرابط غير صحيح!");
            await db.collection("shared_videos").add({
                videoId: vId, ownerId: uID, ownerImg: tgUser.photo_url || "", 
                likes: 0, views: 0, createdAt: new Date()
            });
            document.getElementById('videoLinkInput').value = '';
            alert("تم النشر بنجاح!");
        }

        async function deleteVideo(id) {
            if(confirm("حذف الفيديو؟")) {
                await db.collection("shared_videos").doc(id).delete();
                alert("تم الحذف.");
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t + 'Page').classList.add('active');
            if(event) event.currentTarget.classList.add('active');
            stopAll();
        }

        function loadNotifs() {
            db.collection("users").doc(uID).collection("notifs").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('notifList');
                const badge = document.getElementById('notifBadge');
                list.innerHTML = '';
                if(snap.size > 0) { badge.innerText = snap.size; badge.classList.remove('hidden'); }
                else badge.classList.add('hidden');
                snap.forEach(d => list.innerHTML += `<div class="bg-zinc-900/60 p-4 rounded-2xl border-r-4 border-red-600 text-[10px] font-bold text-right">${d.data().message}</div>`);
            });
        }

        async function submitWithdraw() {
            const wallet = document.getElementById('withdrawWallet').value;
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            if(!wallet || isNaN(amount) || amount < 10 || amount > balance) return alert("خطأ في البيانات أو الرصيد");
            await db.collection("withdrawals").add({ uID, userName: tgUser.first_name, amount, wallet, status: 'pending', createdAt: new Date() });
            await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(-amount) });
            alert("تم إرسال الطلب!");
            closeModal('withdrawModal');
        }

        function loadAdminTools() {
            db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
                const list = document.getElementById('adminWithdrawalsList');
                list.innerHTML = '<h3 class="font-black text-red-500 mb-4 text-xs italic underline">طلبات السحب</h3>';
                snap.forEach(d => {
                    const w = d.data();
                    list.innerHTML += `<div class="studio-card p-4 space-y-3">
                        <div class="flex justify-between text-[11px] font-black italic"><span>$${w.amount}</span><span>${w.userName}</span></div>
                        <div class="flex gap-2">
                            <button onclick="adminAction('${d.id}', '${w.uID}', 'rejected')" class="flex-1 bg-zinc-800 py-2 rounded-xl text-[10px] font-bold">رفض</button>
                            <button onclick="adminAction('${d.id}', '${w.uID}', 'completed')" class="flex-1 bg-red-600 py-2 rounded-xl text-[10px] font-black">دفع ✅</button>
                        </div>
                    </div>`;
                });
            });
        }

        async function adminAction(dId, uId, status) {
            await db.collection("withdrawals").doc(dId).update({ status });
            const msg = status === 'completed' ? "✅ تم قبول طلب سحبك!" : "❌ تم رفض طلب سحبك.";
            await db.collection("users").doc(uId).collection("notifs").add({ message: msg, createdAt: new Date() });
            alert("تم!");
        }

        function openModal(m) { document.getElementById(m).classList.remove('hidden'); }
        function closeModal(m) { document.getElementById(m).classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
