<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - عبود برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .nav-btn { transition: all 0.3s; filter: drop-shadow(0 0 5px rgba(220,38,38,0.2)); }
        .nav-btn.active { color: #dc2626; transform: scale(1.2); filter: drop-shadow(0 0 10px rgba(220,38,38,0.8)); }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        .video-card { position: relative; width: 100%; height: 100%; background: #000; }
    </style>
</head>
<body>

    <div id="homePage" class="page active"><div class="swiper"><div class="swiper-wrapper" id="videoWrapper"></div></div></div>
    
    <div id="tasksPage" class="page hidden p-6 pt-24"><h2 class="text-3xl font-black mb-8 text-red-600 italic">المهام اليومية</h2><div id="tasksList" class="space-y-4"></div></div>
    
    <div id="profilePage" class="page hidden p-6 pt-24 text-center">
        <div class="relative inline-block mb-6"><div class="w-32 h-32 rounded-full border-4 border-red-600 p-1 mx-auto"><img id="userImg" src="" class="w-full h-full rounded-full object-cover bg-zinc-800"></div><div class="absolute bottom-0 right-0 bg-red-600 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Premium</div></div>
        <h2 id="userName" class="text-2xl font-black mb-1 italic">...</h2>
        <div class="flex justify-center gap-8 my-8 bg-zinc-900/50 py-6 rounded-[2.5rem] border border-white/5">
            <div><p class="text-[10px] text-zinc-500 font-bold mb-1 uppercase">الرصيد الحالي</p><p id="userBalance" class="text-2xl font-black text-red-600 tracking-tighter">$0.0000</p></div>
            <div class="w-[1px] bg-white/5"></div>
            <div><p class="text-[10px] text-zinc-500 font-bold mb-1 uppercase">فيديوهاتك</p><p id="userVidsCount" class="text-2xl font-black tracking-tighter">0</p></div>
        </div>
        <button onclick="openWithdrawModal()" class="w-full bg-red-600 py-5 rounded-[2rem] font-black text-sm shadow-xl shadow-red-600/20 mb-4 transition-transform active:scale-95">سحب الأرباح 💸</button>
        <div id="myVideosList" class="space-y-3 mt-8"></div>
    </div>

    <div id="adminPage" class="page hidden p-6 pt-24 text-right overflow-y-auto pb-32">
        <h2 class="text-3xl font-black mb-8 text-red-600 italic">لوحة التحكم الملكية 👑</h2>
        
        <div class="mb-10 text-right bg-zinc-900/40 p-4 rounded-3xl border border-white/5">
            <h3 class="text-lg font-black mb-4 italic text-red-500">💸 طلبات السحب المستلمة</h3>
            <div id="adminWithdrawalsList" class="space-y-3"></div>
        </div>

        <div class="bg-zinc-900/40 p-6 rounded-3xl border border-red-600/20 mb-10 text-right">
            <h3 class="text-lg font-black mb-4 italic text-red-500">✨ إضافة مهمة جديدة</h3>
            <div class="space-y-3">
                <input id="taskTitle" type="text" placeholder="اسم المهمة" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <input id="taskLink" type="text" placeholder="الرابط (يوتيوب/تيليجرام)" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <input id="taskReward" type="number" step="0.0001" placeholder="المكافأة $" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-right">
                <button onclick="addNewTask()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-sm mt-2">نشر المهمة الآن</button>
            </div>
        </div>

        <div class
<div id="notifsPage" class="page hidden p-6 pt-24">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">التنبيهات 🔔</h2>
            <button onclick="clearNotifs()" class="text-[10px] bg-red-600/20 text-red-500 px-3 py-1 rounded-full font-bold">مسح الكل</button>
        </div>
        <div id="notifList" class="space-y-3 pb-20"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 h-20 glass flex justify-around items-center z-[20000] px-4">
        <button onclick="switchTab('home')" class="nav-btn active text-2xl">🏠</button>
        <button onclick="switchTab('tasks')" class="nav-btn text-2xl">📋</button>
        <button onclick="switchTab('admin')" id="adminNavBtn" class="nav-btn text-2xl hidden">👑</button>
        <button onclick="switchTab('notifs')" class="nav-btn text-2xl relative">🔔<div id="notifBadge" class="absolute -top-1 -right-1 bg-white text-red-600 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-black hidden">0</div></button>
        <button onclick="switchTab('profile_self')" class="nav-btn text-2xl">👤</button>
    </div>

    <div id="withdrawModal" class="fixed inset-0 bg-black/95 z-[30000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10 text-right">
            <h3 class="text-xl font-black mb-2">طلب سحب 💰</h3>
            <p id="minLimitLabel" class="text-xs text-zinc-500 mb-6 font-bold text-red-500">الحد الأدنى للسحب هو 10$</p>
            <input id="withdrawWallet" type="text" placeholder="عنوان المحفظة أو رقم الهاتف" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-3 text-right">
            <input id="withdrawAmount" type="number" placeholder="المبلغ المراد سحبه" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-4 text-right">
            <div class="flex gap-2">
                <button onclick="closeWithdrawModal()" class="flex-1 bg-zinc-800 py-4 rounded-2xl font-black text-xs">إلغاء</button>
                <button onclick="submitWithdraw()" class="flex-1 bg-red-600 py-4 rounded-2xl font-black text-xs">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // ضع الـ Config الخاص بك هنا (تأكد من بقاء بياناتك كما هي)
        const config = { apiKey: "AIzaSy...", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const tgUser = tg.initDataUnsafe?.user || {};
        const uID = String(tgUser.id || "7416599626"); // معرفك كآدمن افتراضي
        const userName = tgUser.first_name || "مستخدم عبود";
        const userImg = tgUser.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";
        const adminID = "7416599626";

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer = null;
        let myLikes = [], watchedVids = [], myFollowing = [], completedTasks = [], minWithdrawLimit = 10;
        let activeProfileID = null;

        async function init() {
            const userRef = db.collection("users").doc(uID);
            const userDoc = await userRef.get();
            
            if(!userDoc.exists) { 
                await userRef.set({ name: userName, img: userImg, balance: 0.0, likedVids: [], watchedVids: [], following: [], completedTasks: [], isBanned: false, createdAt: new Date() });
            }

            // مراقبة الرصيد والإعدادات
            userRef.onSnapshot(d => {
                if(d.exists) {
                    balance = d.data().balance || 0;
                    document.getElementById('userBalance').innerText = `$${balance.toFixed(4)}`;
                    myLikes = d.data().likedVids || [];
                    watchedVids = d.data().watchedVids || [];
                }
            });

            // سحب إعدادات الحد الأدنى
            db.collection("settings").doc("general").onSnapshot(d => {
                if(d.exists) {
                    minWithdrawLimit = d.data().minLimit || 10;
                    document.getElementById('minLimitLabel').innerText = `الحد الأدنى للسحب هو ${minWithdrawLimit}$`;
                }
            });

            if(uID === adminID) { 
                document.getElementById('adminNavBtn').classList.remove('hidden');
                loadUsersForAdmin();
                loadWithdrawalsForAdmin();
            }

            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderHome();
            });

            loadNotifs();
        }
        // --- نظام الإشعارات المتقدم ---
        function loadNotifs() {
            db.collection("users").doc(uID).collection("notifs").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('notifList');
                if(!list) return;
                list.innerHTML = '';
                const badge = document.getElementById('notifBadge');
                if(snap.size > 0) {
                    badge.innerText = snap.size;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
                snap.forEach(doc => {
                    const n = doc.data();
                    list.innerHTML += `<div class="bg-zinc-900/60 p-4 rounded-2xl border-r-4 border-red-600 text-xs text-right font-black shadow-sm">${n.message}</div>`;
                });
            });
        }

        async function clearNotifs() {
            const batch = db.batch();
            const snap = await db.collection("users").doc(uID).collection("notifs").get();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }

        // --- نظام السحب المطور ---
        function openWithdrawModal() { document.getElementById('withdrawModal').classList.remove('hidden'); }
        function closeWithdrawModal() { document.getElementById('withdrawModal').classList.add('hidden'); }

        async function submitWithdraw() {
            const wallet = document.getElementById('withdrawWallet').value;
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            
            if(!wallet || isNaN(amount) || amount < minWithdrawLimit) { 
                alert(`تأكد من إدخال المحفظة وأن المبلغ لا يقل عن ${minWithdrawLimit}$`); 
                return; 
            }
            if(amount > balance) {
                alert("رصيدك الحالي غير كافٍ لسحب هذا المبلغ!");
                return;
            }

            await db.collection("withdrawals").add({ 
                uID, userName, balance: amount, wallet, status: 'pending', createdAt: new Date() 
            });
            
            await db.collection("users").doc(uID).update({ 
                balance: firebase.firestore.FieldValue.increment(-amount) 
            });

            alert("تم إرسال طلب السحب بنجاح! سيصلك إشعار عند التنفيذ."); 
            closeWithdrawModal();
        }

        // --- لوحة التحكم: العمليات ---
        async function updateSettings() {
            const newLimit = parseFloat(document.getElementById('minWithdrawInput').value);
            if(isNaN(newLimit) || newLimit <= 0) return;
            await db.collection("settings").doc("general").set({ minLimit: newLimit });
            alert("تم تحديث الحد الأدنى للسحب!");
        }

        async function actionWithdraw(id, status) { 
            const doc = await db.collection("withdrawals").doc(id).get();
            const wData = doc.data();
            const msg = status === 'completed' ? "✅ تم قبول طلب سحبك بنجاح!" : "❌ عذراً، تم رفض طلب سحبك.";

            await db.collection("withdrawals").doc(id).update({ status }); 
            
            // إرسال إشعار للمستخدم المذكور في طلب السحب
            await db.collection("users").doc(wData.uID).collection("notifs").add({ 
                message: msg, 
                createdAt: new Date() 
            });

            alert("تم تحديث الحالة وإشعار المستخدم."); 
        }

        function loadWithdrawalsForAdmin() {
            db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
                const list = document.getElementById('adminWithdrawalsList');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(doc => {
                    const w = doc.data();
                    list.innerHTML += `
                        <div class="bg-zinc-900/60 p-4 rounded-3xl border border-white/5 text-right">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-green-500 font-black">$${w.balance.toFixed(2)}</span>
                                <span class="text-xs font-black">${w.userName}</span>
                            </div>
                            <p class="text-[9px] text-zinc-500 break-all mb-3">${w.wallet}</p>
                            <div class="flex gap-2">
                                <button onclick="actionWithdraw('${doc.id}', 'rejected')" class="flex-1 bg-zinc-800 py-2 rounded-xl text-[10px] font-black italic">رفض</button>
                                <button onclick="actionWithdraw('${doc.id}', 'completed')" class="flex-1 bg-red-600 py-2 rounded-xl text-[10px] font-black italic">تم الدفع</button>
                            </div>
                        </div>`;
                });
            });
        }

        async function handleLike(vidId) {
            const isLiked = myLikes.includes(vidId);
            const userRef = db.collection("users").doc(uID);
            const vidRef = db.collection("shared_videos").doc(vidId);
            
            if (isLiked) {
                await userRef.update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vidId) });
                await vidRef.update({ likes: firebase.firestore.FieldValue.increment(-1) });
            } else {
                await userRef.update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vidId) });
                await vidRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
                
                // إشعار صاحب الفيديو
                const vidDoc = await vidRef.get();
                if(vidDoc.exists && vidDoc.data().ownerId !== uID) {
                    db.collection("users").doc(vidDoc.data().ownerId).collection("notifs").add({ 
                        message: `❤️ أعجب ${userName} بفيديو خاص بك`, 
                        createdAt: new Date() 
                    });
                }
            }
        }

        // --- الدوال المساعدة للتنقل والتشغيل ---
        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            if(t === 'profile_self') { openProfile(uID); return; }
            document.getElementById(t + 'Page').classList.remove('hidden');
            stopVideos();
            if(t === 'home' && swiper) players[swiper.activeIndex]?.playVideo();
        }

        function stopVideos() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            if(!wrap) return;
            wrap.innerHTML = allVideos.map((v, i) => `
                <div class="swiper-slide relative">
                    <div class="video-card"><div id="player-${i}"></div></div>
                    <div class="absolute right-5 bottom-32 flex flex-col gap-6 z-50">
                        <img src="${v.ownerImg}" class="w-12 h-12 rounded-full border-2 border-red-600 object-cover" onclick="openProfile('${v.ownerId}')">
                        <div onclick="handleLike('${v.id}')" class="text-center">
                            <span class="text-2xl ${myLikes.includes(v.id) ? 'text-red-600' : 'text-white/40'}">❤️</span>
                            <p class="text-[10px] font-bold">${v.likes || 0}</p>
                        </div>
                    </div>
                </div>`).join('');
            
            if(swiper) swiper.destroy();
            swiper = new Swiper(".swiper", { direction: "vertical", on: { slideChange: () => stopVideos() } });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, playsinline: 1 },
                    events: { 'onStateChange': (e) => { if(e.data === 1) startTimer(i); } }
                });
            });
        }

        window.onload = init;
    </script>
</body>
</html>
