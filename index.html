<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEPE ROYAL - Real Data Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyALHoUPIxgCMW9o3CQ-Q0BhPPnxKTppMds",
          authDomain: "pepe-d02d2.firebaseapp.com",
          projectId: "pepe-d02d2",
          storageBucket: "pepe-d02d2.firebasestorage.app",
          messagingSenderId: "599166065199",
          appId: "1:599166065199:web:0957e4b79846b2d44844da",
          measurementId: "G-SK3Z514R9T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "pepe_royal_v1"; 
        
        // معرف المسؤول الحقيقي (حسابك)
        const ADMIN_ID = 7416599626;

        window.state = {
            user: null,
            clicks: 0,
            target: 10,
            balance: 0,
            username: "جاري التحميل...",
            tgHandle: "@...",
            photo: "",
            myRefCode: ""
        };

        async function init() {
            try {
                const tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.state.user = user;
                        setupSync(user.uid);
                    }
                });
            } catch (e) { console.error("Auth Error:", e); }
        }

        async function setupSync(uid) {
            const tg = window.Telegram.WebApp;
            const tgUser = tg.initDataUnsafe?.user;
            
            // في حال وجود بيانات تليجرام، نستخدمها كمصدر أولي
            const initialName = tgUser?.first_name || "مستخدم جديد";
            const initialHandle = tgUser?.username ? `@${tgUser.username}` : "@PEPE_USER";
            const currentTgId = tgUser?.id ? Number(tgUser.id) : null;

            const userRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data');

            // مراقبة البيانات الحقيقية من الداتابيز
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    
                    if (data.isBanned) {
                        document.body.innerHTML = "<div class='h-screen flex flex-col items-center justify-center bg-[#0d0d0d] text-red-500 font-black p-10 text-center'><i class='fas fa-ban text-6xl mb-4'></i><br>تم حظر حسابك نهائياً.</div>";
                        return;
                    }

                    // تحديث الـ State من الداتابيز (المعلومات الحقيقية)
                    window.state.balance = data.balance || 0;
                    window.state.username = data.username || initialName;
                    window.state.tgHandle = data.tgHandle ? `@${data.tgHandle}` : initialHandle;
                    window.state.myRefCode = data.myRefCode || "";
                    window.state.photo = tgUser?.photo_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;

                    // التحقق من صلاحية المسؤول بالـ ID الحقيقي
                    const savedId = Number(data.id);
                    if (savedId === ADMIN_ID || currentTgId === ADMIN_ID) {
                        document.getElementById('nav-admin').classList.remove('hidden');
                    }

                    updateUI();
                } else {
                    // إنشاء حساب جديد في الداتابيز لأول مرة
                    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                    setDoc(userRef, {
                        balance: 0,
                        id: tgUser?.id || 0,
                        username: initialName,
                        tgHandle: tgUser?.username || "",
                        isBanned: false,
                        myRefCode: code,
                        referralsCount: 0,
                        joinedAt: new Date().toISOString()
                    });
                }
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        function updateUI() {
            document.getElementById('bal-home').innerText = window.state.balance.toLocaleString();
            document.getElementById('bal-points').innerText = window.state.balance.toLocaleString();
            document.getElementById('user-name').innerText = window.state.username;
            document.getElementById('user-handle').innerText = window.state.tgHandle;
            document.getElementById('user-pic').src = window.state.photo;
            document.getElementById('ref-link').innerText = `https://t.me/PEPE_ROYAL_BOT?start=${window.state.myRefCode}`;
        }

        // خاصية الطوارئ لفتح لوحة الإدارة يدوياً بالـ ID
        window.manualAdminCheck = () => {
            const id = prompt("أدخل معرف المسؤول (ID):");
            if (Number(id) === ADMIN_ID) {
                document.getElementById('nav-admin').classList.remove('hidden');
                alert("أهلاً بك أيها الملك! تم تفعيل لوحة التحكم.");
            }
        };

        window.copyRef = () => {
            const link = document.getElementById('ref-link').innerText;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            window.Telegram.WebApp.showPopup({ message: "تم نسخ رابط الدعوة بنجاح! 🎁" });
        };

        window.adminAction = async (type) => {
            const tid = document.getElementById('adm-id').value;
            const val = parseInt(document.getElementById('adm-val').value) || 0;
            if(!tid) return alert("يرجى إدخال ID المستخدم");

            try {
                const usersSnap = await getDocs(collection(db, 'artifacts', appId, 'users'));
                let targetUid = null;

                for (const uDoc of usersSnap.docs) {
                    const p = await getDoc(doc(db, 'artifacts', appId, 'users', uDoc.id, 'profile', 'data'));
                    if(p.exists() && String(p.data().id) === String(tid)) {
                        targetUid = uDoc.id;
                        break;
                    }
                }

                if(!targetUid) return alert("عذراً، لم يتم العثور على هذا المستخدم.");

                const ref = doc(db, 'artifacts', appId, 'users', targetUid, 'profile', 'data');
                if(type === 'add') await updateDoc(ref, { balance: increment(val) });
                if(type === 'ban') await updateDoc(ref, { isBanned: true });
                if(type === 'unban') await updateDoc(ref, { isBanned: false });
                alert("تم تنفيذ طلبك بنجاح ✅");
            } catch (err) {
                alert("حدث خطأ أثناء التنفيذ.");
            }
        };

        window.onload = () => {
            init();
            setupLogic();
        };

        function setupLogic() {
            const tg = window.Telegram.WebApp;
            const coin = document.getElementById('coin-img');
            const bar = document.getElementById('progress-bar');
            const claimBtn = document.getElementById('claim-btn');

            coin.onclick = () => {
                if (window.state.clicks < 10) {
                    window.state.clicks++;
                    bar.style.width = (window.state.clicks * 10) + "%";
                    document.getElementById('click-count').innerText = `${window.state.clicks} / 10`;
                    
                    if (window.state.clicks >= 10) {
                        claimBtn.classList.remove('hidden');
                        coin.classList.add('opacity-30', 'grayscale', 'pointer-events-none');
                    }
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }
            };

            claimBtn.onclick = async () => {
                tg.openLink("https://www.google.com"); 
                document.getElementById('ad-overlay').classList.remove('hidden');
                let s = 8;
                const t = setInterval(async () => {
                    s--;
                    document.getElementById('timer').innerText = s;
                    if(s <= 0) {
                        clearInterval(t);
                        document.getElementById('ad-overlay').classList.add('hidden');
                        
                        const r = doc(db, 'artifacts', appId, 'users', window.state.user.uid, 'profile', 'data');
                        await updateDoc(r, { balance: increment(5000) });
                        
                        window.state.clicks = 0;
                        bar.style.width = "0%";
                        document.getElementById('click-count').innerText = `0 / 10`;
                        claimBtn.classList.add('hidden');
                        coin.classList.remove('opacity-30', 'grayscale', 'pointer-events-none');
                    }
                }, 1000);
            };

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    const view = btn.dataset.view;
                    document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
                    document.getElementById(view).classList.remove('hidden');
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-40'));
                    btn.classList.remove('opacity-40');
                };
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #080808; color: #fff; margin: 0; overflow: hidden; user-select: none; }
        .main-card { background: linear-gradient(145deg, #16a34a, #15803d); box-shadow: 0 15px 35px rgba(22, 163, 74, 0.4); }
        .action-card { background: #121212; border: 1px solid #1f1f1f; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border-top: 1px solid #1a1a1a; }
        .page-view { height: calc(100vh - 110px); overflow-y: auto; padding-bottom: 40px; }
        .neon-text { text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        input { background: #000; border: 1px solid #222; padding: 18px; border-radius: 20px; width: 100%; color: #fff; outline: none; }
        .coin-shadow { filter: drop-shadow(0 0 30px rgba(34, 197, 94, 0.2)); }
    </style>
</head>
<body>

    <!-- الصفحة الرئيسية -->
    <div id="home" class="page-view p-6">
        <!-- هيدر المستخدم الحقيقي -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <button onclick="manualAdminCheck()" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-gray-500 border border-white/5">
                    <i class="fas fa-crown text-sm"></i>
                </button>
                <div class="text-right">
                    <p id="user-handle" class="text-green-500 text-[10px] font-bold tracking-widest">@...</p>
                    <h3 id="user-name" class="font-black text-xl leading-none">جاري التحميل...</h3>
                </div>
            </div>
            <div class="w-14 h-14 bg-gray-900 rounded-2xl p-0.5 border border-white/10 overflow-hidden">
                <img id="user-pic" src="" class="w-full h-full object-cover rounded-[14px]" alt="P">
            </div>
        </div>

        <!-- الرصيد الحقيقي -->
        <div class="main-card rounded-[40px] p-8 text-center relative overflow-hidden mb-8">
            <p class="text-white/50 text-[10px] font-bold uppercase tracking-widest mb-2">Total Balance</p>
            <div class="flex items-center justify-center gap-2 mb-4">
                <span id="bal-home" class="text-5xl font-black font-mono">0</span>
                <span class="text-xl font-bold opacity-40">$</span>
            </div>
            <div class="inline-flex items-center gap-2 bg-black/30 px-6 py-2 rounded-full border border-white/5">
                <span id="bal-points" class="text-lg font-bold font-mono">0</span>
                <i class="fas fa-gem text-blue-400 text-xs"></i>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="action-card p-6 rounded-[30px] text-center">
                <i class="fas fa-bolt text-yellow-500 text-xl mb-2"></i>
                <p class="text-[10px] font-bold opacity-60 uppercase">المهام</p>
            </div>
            <div class="action-card p-6 rounded-[30px] text-center">
                <i class="fas fa-wallet text-blue-500 text-xl mb-2"></i>
                <p class="text-[10px] font-bold opacity-60 uppercase">المحفظة</p>
            </div>
        </div>
    </div>

    <!-- صفحة النقر -->
    <div id="mine" class="page-view hidden flex flex-col items-center justify-center p-8">
        <h2 id="click-count" class="text-6xl font-black font-mono neon-text mb-12">0 / 10</h2>
        <div class="relative active:scale-95 transition-transform">
            <img id="coin-img" src="https://g.top4top.io/s_3747ccek80.jpg" class="w-72 h-72 rounded-full border-[10px] border-white/5 coin-shadow" alt="C">
        </div>
        <div class="w-full max-w-xs mt-12">
            <div class="h-3 w-full bg-white/5 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="h-full w-0 bg-green-500 transition-all duration-300"></div>
            </div>
            <button id="claim-btn" class="hidden w-full py-5 bg-green-500 text-black font-black rounded-2xl shadow-xl uppercase">أحصل على المكافأة</button>
        </div>
    </div>

    <!-- صفحة الإحالة -->
    <div id="refer" class="page-view hidden p-8 text-center flex flex-col justify-center">
        <i class="fas fa-users text-6xl text-green-500/20 mb-6"></i>
        <h2 class="text-3xl font-black mb-2">إدعو أصدقائك</h2>
        <p class="text-gray-500 text-sm mb-8">انسخ الرابط وشاركه مع الجميع لتربح 25,000 نقطة</p>
        <div id="ref-link" class="bg-black border border-white/5 p-5 rounded-2xl text-[10px] font-mono text-green-500 mb-4 break-all">...</div>
        <button onclick="copyRef()" class="w-full py-5 bg-green-500 text-black font-black rounded-2xl">نسخ الرابط</button>
    </div>

    <!-- لوحة الإدارة -->
    <div id="admin" class="page-view hidden p-8">
        <h2 class="text-2xl font-black text-yellow-500 mb-6">لوحة التحكم الملكية</h2>
        <div class="space-y-4">
            <input type="number" id="adm-id" placeholder="ID المستخدم (الرقم)">
            <input type="number" id="adm-val" placeholder="كمية النقاط">
            <button onclick="adminAction('add')" class="w-full bg-green-600 py-5 rounded-2xl font-black">إضافة رصيد</button>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="adminAction('ban')" class="bg-red-600/20 text-red-500 py-4 rounded-2xl font-bold">حظر</button>
                <button onclick="adminAction('unban')" class="bg-gray-800 py-4 rounded-2xl font-bold text-gray-400">إلغاء حظر</button>
            </div>
        </div>
    </div>

    <!-- شريط التنقل -->
    <nav class="fixed bottom-0 left-0 right-0 h-24 bottom-nav flex justify-around items-center px-6 z-50">
        <button data-view="home" class="nav-btn flex flex-col items-center gap-1">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[8px] font-bold uppercase">الرئيسية</span>
        </button>
        <button data-view="mine" class="nav-btn opacity-40 flex flex-col items-center gap-1">
            <i class="fas fa-hammer text-xl"></i>
            <span class="text-[8px] font-bold uppercase">تعدين</span>
        </button>
        <button data-view="refer" class="nav-btn opacity-40 flex flex-col items-center gap-1">
            <i class="fas fa-gift text-xl"></i>
            <span class="text-[8px] font-bold uppercase">هدايا</span>
        </button>
        <button id="nav-admin" data-view="admin" class="nav-btn hidden opacity-40 flex flex-col items-center gap-1 text-yellow-500">
            <i class="fas fa-crown text-xl"></i>
            <span class="text-[8px] font-bold uppercase">الإدارة</span>
        </button>
    </nav>

    <!-- انتظار المكافأة -->
    <div id="ad-overlay" class="fixed inset-0 z-[200] bg-black/98 hidden flex flex-col items-center justify-center">
        <div id="timer" class="text-7xl font-black text-green-500 font-mono mb-4 shadow-lg">8</div>
        <p class="text-gray-500 font-bold uppercase tracking-[0.5em] text-[10px]">جاري التحقق...</p>
    </div>

</body>
</html>
