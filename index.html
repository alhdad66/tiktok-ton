<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة عبود برو - الشاملة بذكاء Gemini</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 10000; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .active-page { display: flex !important; }
        .timer-badge { position: absolute; top: 120px; left: 20px; background: #dc2626; padding: 8px 18px; border-radius: 50px; z-index: 9000; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 20px rgba(220, 38, 38, 0.5); }
        .reward-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #22c55e; color: white; padding: 15px 30px; border-radius: 20px; font-weight: 900; z-index: 100000; animation: popIn 0.5s ease-out forwards; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .admin-tab { border-bottom: 3px solid transparent; opacity: 0.4; padding: 12px 0; transition: 0.3s; cursor: pointer; font-weight: 900; font-size: 0.75rem; white-space: nowrap; }
        .admin-tab.active { border-bottom: 3px solid #dc2626; opacity: 1; color: #dc2626; }
        .video-card { background: #111; border-radius: 20px; border: 1px solid #222; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .w-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 30000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .w-box { background: #111; width: 100%; max-width: 380px; border-radius: 30px; border: 1px solid #222; padding: 30px; }
        .gemini-btn { background: linear-gradient(45deg, #1a73e8, #8e24aa); border: none; transition: 0.3s; color: white; }
    </style>
</head>
<body>

    <div id="bannedScreen" class="fixed inset-0 bg-black z-[99999] hidden flex flex-col items-center justify-center text-center p-10 text-white">
        <h1 class="text-6xl mb-4">🚫</h1>
        <h2 class="text-3xl font-black text-red-600 mb-2">لقد تم حظرك!</h2>
    </div>

    <!-- الرصيد العلوي -->
    <div class="fixed top-8 left-6 right-6 z-[11000] flex justify-between items-center pointer-events-none">
        <div class="bg-zinc-900/95 px-5 py-2.5 rounded-full border border-white/5 pointer-events-auto flex items-center gap-3">
            <span id="mainBal" class="text-red-500 font-black text-lg">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
        </div>
        <div class="flex gap-2 pointer-events-auto">
            <button onclick="geminiAnalyzeStatus()" class="gemini-btn p-2 rounded-full shadow-lg shadow-blue-500/20">✨</button>
            <div id="adminBtn" onclick="switchTab('admin')" class="hidden bg-zinc-900/95 p-3 rounded-full border border-white/5 cursor-pointer shadow-lg shadow-red-600/20">
                <span class="text-xl font-black">👑</span>
            </div>
        </div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active-page !p-0">
        <div id="videoTimer" class="timer-badge hidden">
            <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
            <span id="timerText" class="font-black text-sm text-white">10s</span>
        </div>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- المهام + المساعد الذكي -->
    <div id="tasksPage" class="page p-6 pt-24 text-right">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-black italic">المهام 📋</h2>
            <button onclick="toggleGeminiChat()" class="gemini-btn px-4 py-2 rounded-2xl font-black text-xs">✨ مساعد عبود</button>
        </div>
        <div id="geminiChat" class="hidden bg-zinc-900 border border-blue-500/30 rounded-3xl p-4 mb-6 flex flex-col h-64">
            <div id="chatMessages" class="flex-1 overflow-y-auto space-y-2 mb-4 text-[10px]"></div>
            <div class="flex gap-2">
                <input id="chatInput" type="text" placeholder="اسأل أي شيء..." class="flex-1 bg-black p-3 rounded-xl text-[10px] outline-none border border-white/10">
                <button onclick="sendGeminiMessage()" class="gemini-btn p-3 rounded-xl">🚀</button>
            </div>
        </div>
        <div id="userTasksList" class="space-y-3 pb-10"></div>
    </div>

    <!-- النشر والإحصائيات -->
    <div id="statsPage" class="page p-6 pt-24 text-right">
        <h2 class="text-2xl font-black mb-6 text-white">شارك واربح 🚀</h2>
        <div class="bg-zinc-900/40 p-5 rounded-[2.5rem] border border-white/5 mb-6">
            <canvas id="tradingChart" style="max-height: 150px;"></canvas>
            <p id="aiAdvice" class="text-[9px] text-blue-400 mt-2 italic text-center">✨ جاري تحليل أدائك بواسطة الذكاء الاصطناعي...</p>
        </div>
        <div class="bg-red-600/10 p-6 rounded-[2.5rem] border border-red-600/20 mb-6">
            <p class="text-[10px] font-black mb-3 text-red-500">انشر فيديو يوتيوب جديد</p>
            <div class="flex gap-2">
                <input id="ytInput" type="text" placeholder="ضع رابط الفيديو هنا..." class="flex-1 bg-black/50 border border-white/10 p-4 rounded-2xl text-xs outline-none focus:border-red-600 text-white">
                <button onclick="handlePublish()" class="bg-red-600 px-6 rounded-2xl font-black text-xs">نشر</button>
            </div>
            <button onclick="geminiGenerateTitle()" class="mt-3 w-full gemini-btn py-2 rounded-xl text-[10px] font-black">✨ اقتراح عنوان جذاب بالفيديو</button>
        </div>
        <div id="myVideosList" class="space-y-3 pb-10"></div>
    </div>

    <!-- الإشعارات -->
    <div id="notifsPage" class="page p-6 pt-24 text-right">
        <h2 class="text-3xl font-black mb-6 italic text-red-600">الإشعارات 🔔</h2>
        <div id="notifsList" class="space-y-3"></div>
    </div>

    <!-- الملف الشخصي -->
    <div id="profilePage" class="page !p-0">
        <div class="pt-24 pb-10 text-center bg-gradient-to-b from-red-900/20 to-black">
            <div class="w-24 h-24 mx-auto mb-4 p-1 border-2 border-red-600 rounded-full overflow-hidden">
                <img id="uProfImg" src="https://i.ibb.co/vz6V0vD/default-user.png" class="w-full h-full object-cover">
            </div>
            <h2 id="uProfName" class="text-2xl font-black italic">...</h2>
            <div class="px-10 mt-6">
                <button id="withdrawBtn" onclick="openWithdrawModal()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs hidden shadow-xl">سحب الأرباح 💸</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-0.5 mt-0.5 pb-20" id="profileGrid"></div>
    </div>

    <!-- لوحة التحكم (الأدمن) -->
    <div id="adminPage" class="page !p-0">
        <div class="pt-24 px-6">
            <div class="flex border-b border-white/10 mb-6 overflow-x-auto gap-4 no-scrollbar">
                <div onclick="setAdminTab('users')" id="admTabUsers" class="admin-tab active flex-1 text-center font-black">👤 المستخدمين</div>
                <div onclick="setAdminTab('vids')" id="admTabVids" class="admin-tab flex-1 text-center font-black">🎬 الفيديوهات</div>
                <div onclick="setAdminTab('fin')" id="admTabFin" class="admin-tab flex-1 text-center font-black">⚙️ الإعدادات</div>
            </div>
            <div id="adminUsersSection" class="space-y-4 pb-20">
                <input id="userSearch" oninput="filterUsers()" type="text" placeholder="بحث..." class="w-full bg-zinc-900 p-4 rounded-2xl text-xs text-right outline-none text-white border border-white/5">
                <div id="adminUsersList" class="space-y-3"></div>
            </div>
            <div id="adminVidsSection" class="hidden space-y-4 pb-20"><div id="adminAllVidsList" class="space-y-3"></div></div>
            <div id="adminFinancialSection" class="hidden space-y-4 pb-20">
                <div class="bg-zinc-900/40 p-5 rounded-3xl border border-red-600/20 text-right">
                    <h3 class="text-sm font-black mb-4 text-red-500">إضافة طريقة سحب</h3>
                    <input id="newMethodName" type="text" placeholder="الاسم" class="w-full bg-black p-3 rounded-xl text-xs mb-2 text-right">
                    <input id="newMethodMin" type="number" placeholder="الحد الأدنى" class="w-full bg-black p-3 rounded-xl text-xs mb-4 text-right">
                    <button onclick="addMethod()" class="w-full bg-red-600 py-3 rounded-xl font-black text-xs">إضافة</button>
                    <div id="adminMethodsList" class="mt-4 space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة السحب -->
    <div id="withdrawModal" class="w-modal text-right">
        <div id="w-step-1" class="w-box">
            <h3 class="text-xl font-black mb-4 text-white">اختر وسيلة السحب 💰</h3>
            <div id="userMethodsList" class="space-y-3 mb-6"></div>
            <button onclick="closeWithdrawModal()" class="w-full bg-zinc-800 py-4 rounded-2xl font-black text-xs text-white">إلغاء</button>
        </div>
        <div id="w-step-2" class="w-box hidden">
            <h3 id="selMethodName" class="text-xl font-black mb-4 text-red-500">...</h3>
            <input id="wAmount" type="number" placeholder="المبلغ $" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-3 text-right text-white">
            <input id="wWallet" type="text" placeholder="رقم المحفظة" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-6 text-right text-white">
            <div class="flex gap-2">
                <button onclick="backToMethods()" class="flex-1 bg-zinc-800 py-4 rounded-2xl font-black text-xs">رجوع</button>
                <button onclick="submitWithdraw()" class="flex-1 bg-red-600 py-4 rounded-2xl font-black text-xs">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- شريط التنقل -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl p-2 cursor-pointer opacity-60">🏠</div>
        <div onclick="switchTab('tasks')" class="text-2xl p-2 cursor-pointer opacity-60">📋</div>
        <div onclick="switchTab('stats')" class="bg-red-600 w-14 h-10 rounded-2xl flex items-center justify-center font-black text-2xl">+</div>
        <div onclick="switchTab('notifs')" class="text-2xl p-2 cursor-pointer opacity-60">🔔</div>
        <div onclick="switchTab('profile_self')" class="text-2xl p-2 cursor-pointer opacity-60">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const apiKey = ""; // API Key used by Gemini
        const firebaseConfig = {
            apiKey: "AIzaSyBwWz2qN-S_G4XFp89W64V-L38iN1_p7S0",
            authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124",
            storageBucket: "tik-ton-92124.appspot.com",
            messagingSenderId: "367332766324",
            appId: "1:367332766324:web:0f41334ec40ef03063806e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "7416599626");
        const userName = tg.initDataUnsafe?.user?.first_name || "عبود برو";
        const userImg = tg.initDataUnsafe?.user?.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";
        const adminID = "7416599626";

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer = null;
        let watchedVids = [], completedTasks = [], allUsers = [], withdrawMethods = [];

        // --- Gemini Wrapper ---
        async function callGemini(prompt, system = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "خطأ في الاتصال.";
            } catch (e) { return "حدث خطأ."; }
        }

        async function init() {
            const userRef = db.collection("users").doc(uID);
            await userRef.set({ name: userName, img: userImg, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
            userRef.onSnapshot(d => {
                if(d.exists) {
                    balance = d.data().balance || 0;
                    watchedVids = d.data().watchedVids || [];
                    completedTasks = d.data().completedTasks || [];
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                    if(d.data().isBanned) document.getElementById('bannedScreen').classList.remove('hidden');
                }
            });
            if(uID === adminID) document.getElementById('adminBtn').classList.remove('hidden');
            
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(s => {
                allVideos = s.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderHome(); renderMyVideos();
            });
            db.collection("withdraw_methods").onSnapshot(s => {
                withdrawMethods = s.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderMethods();
            });
            loadTasks(); renderChart();
        }

        function switchTab(t) {
            stopVideos();
            const pages = ['home', 'tasks', 'stats', 'notifs', 'profile', 'admin'];
            pages.forEach(p => document.getElementById(p + 'Page').classList.remove('active-page'));
            
            if(t === 'profile_self') { openProfile(uID); return; }
            if(t === 'admin' && uID === adminID) {
                document.getElementById('adminPage').classList.add('active-page');
                loadAdminData();
                return;
            }
            const target = document.getElementById(t + 'Page');
            if(target) target.classList.add('active-page');
            if(t === 'home') startVideo(swiper?.activeIndex || 0);
        }

        // --- Admin Functions ---
        function setAdminTab(tab) {
            const sections = ['adminUsersSection', 'adminVidsSection', 'adminFinancialSection'];
            sections.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            
            if(tab === 'users') { document.getElementById('adminUsersSection').classList.remove('hidden'); document.getElementById('admTabUsers').classList.add('active'); }
            if(tab === 'vids') { document.getElementById('adminVidsSection').classList.remove('hidden'); document.getElementById('admTabVids').classList.add('active'); renderAdminVids(); }
            if(tab === 'fin') { document.getElementById('adminFinancialSection').classList.remove('hidden'); document.getElementById('admTabFin').classList.add('active'); }
        }

        function loadAdminData() {
            db.collection("users").limit(50).get().then(snap => {
                allUsers = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                filterUsers();
            });
        }

        function filterUsers() {
            const list = document.getElementById('adminUsersList');
            if(!list) return;
            list.innerHTML = '';
            allUsers.forEach(u => {
                list.innerHTML += `<div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center">
                    <button onclick="toggleBan('${u.id}', ${u.isBanned})" class="bg-white/5 p-2 rounded-lg text-[10px]">${u.isBanned?'فك حظر':'حظر'}</button>
                    <div class="text-right">
                        <p class="text-xs font-black">${u.name}</p>
                        <p class="text-[9px] text-red-500">$${(u.balance||0).toFixed(4)}</p>
                    </div>
                </div>`;
            });
        }

        async function toggleBan(id, s) { await db.collection("users").doc(id).update({ isBanned: !s }); loadAdminData(); }

        // --- Video Core ---
        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            if(!wrap) return;
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                wrap.innerHTML += `<div class="swiper-slide relative"><div id="player-${i}" class="w-full h-full"></div></div>`;
            });
            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { direction: "vertical", on: { slideChange: () => { stopVideos(); startVideo(swiper.activeIndex); } } });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 0, controls: 0, modestbranding: 1, rel: 0, playsinline: 1 },
                    events: { 'onStateChange': (e) => { if(e.data == 1 && i === swiper.activeIndex) startCountdown(i); } }
                });
            });
        }

        function startCountdown(idx) {
            clearInterval(currentTimer);
            const v = allVideos[idx];
            if(!v || v.ownerId === uID || watchedVids.includes(v.id)) return;
            const timerEl = document.getElementById('videoTimer');
            const timerText = document.getElementById('timerText');
            timerEl.classList.remove('hidden');
            let sec = 10;
            currentTimer = setInterval(async () => {
                sec--; timerText.innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer); timerEl.classList.add('hidden');
                    await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(0.0005), watchedVids: firebase.firestore.FieldValue.arrayUnion(v.id) });
                    showRewardPopup(0.0005);
                }
            }, 1000);
        }

        // --- UI & Gemini Chat ---
        async function sendGeminiMessage() {
            const input = document.getElementById('chatInput');
            const box = document.getElementById('chatMessages');
            const msg = input.value; if(!msg) return;
            box.innerHTML += `<div class="text-right text-white opacity-60">أنت: ${msg}</div>`;
            input.value = '';
            const res = await callGemini(msg, "You are helpful assistant for Aboud Pro app.");
            box.innerHTML += `<div class="text-right text-blue-400">عبود: ${res}</div>`;
        }

        function toggleGeminiChat() { document.getElementById('geminiChat').classList.toggle('hidden'); }
        function openProfile(id) {
            switchTab('profile');
            db.collection("users").doc(id).get().then(doc => {
                const u = doc.data();
                document.getElementById('uProfName').innerText = u.name;
                document.getElementById('uProfImg').src = u.img;
                document.getElementById('withdrawBtn').classList.toggle('hidden', id !== uID);
                const grid = document.getElementById('profileGrid'); grid.innerHTML = '';
                allVideos.filter(v => v.ownerId === id).forEach(v => {
                    grid.innerHTML += `<div class="aspect-square"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`;
                });
            });
        }

        function stopVideos() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); clearInterval(currentTimer); document.getElementById('videoTimer').classList.add('hidden'); }
        function startVideo(idx) { if(players[idx]?.playVideo) players[idx].playVideo(); }
        function openWithdrawModal() { document.getElementById('withdrawModal').style.display = 'flex'; }
        function closeWithdrawModal() { document.getElementById('withdrawModal').style.display = 'none'; }
        function backToMethods() { document.getElementById('w-step-1').classList.remove('hidden'); document.getElementById('w-step-2').classList.add('hidden'); }
        function showRewardPopup(val) {
            const p = document.createElement('div'); p.className = 'reward-popup'; p.innerText = `+$${val.toFixed(4)}`;
            document.body.appendChild(p); setTimeout(() => p.remove(), 2000);
        }
        function renderChart() {
            const ctx = document.getElementById('tradingChart').getContext('2d');
            new Chart(ctx, { type: 'line', data: { labels: ['','','','',''], datasets: [{ data: [10, 20, 15, 25, 22], borderColor: '#dc2626', fill: true, backgroundColor: 'rgba(220,38,38,0.1)', pointRadius: 0 }] }, options: { scales: { x:{display:false}, y:{display:false} }, plugins: { legend: {display:false} } } });
        }
        async function handlePublish() {
            const val = document.getElementById('ytInput').value;
            const vidId = val.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(vidId) { await db.collection("shared_videos").add({ videoId: vidId, ownerId: uID, ownerName: userName, ownerImg: userImg, views: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); alert("تم!"); switchTab('home'); }
        }
        function loadTasks() {} // Placeholder
        function renderMethods() {} // Placeholder
        function renderMyVideos() {} // Placeholder
        function renderAdminVids() {} // Placeholder

        window.onload = init;
        function onYouTubeIframeAPIReady() {}
    </script>
</body>
</html>
