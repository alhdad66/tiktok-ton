<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEPE ROYAL - Pro Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, increment, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyALHoUPIxgCMW9o3CQ-Q0BhPPnxKTppMds",
          authDomain: "pepe-d02d2.firebaseapp.com",
          projectId: "pepe-d02d2",
          storageBucket: "pepe-d02d2.firebasestorage.app",
          messagingSenderId: "599166065199",
          appId: "1:599166065199:web:0957e4b79846b2d44844da",
          measurementId: "G-SK3Z514R9T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "pepe_royal_v1"; 
        const ADMIN_ID = 7416599626;

        window.state = {
            user: null,
            clicks: 0,
            target: 10,
            reward: 5000,
            refReward: 25000,
            referralCode: ""
        };

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.state.user = user;
                        setupSync(user.uid);
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function setupSync(uid) {
            const tg = window.Telegram.WebApp;
            const tgUser = tg.initDataUnsafe?.user;
            const userRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data');

            if (tgUser && tgUser.id === ADMIN_ID) {
                document.getElementById('nav-admin').classList.remove('hidden');
            }

            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.isBanned) {
                        document.body.innerHTML = "<div class='h-screen flex items-center justify-center bg-[#050805] text-red-500 font-black p-10 text-center'>حسابك محظور.</div>";
                        return;
                    }
                    window.state.referralCode = data.myRefCode || "";
                    document.getElementById('bal-top').innerText = (data.balance || 0).toLocaleString();
                    document.getElementById('bal-wallet').innerText = (data.balance || 0).toLocaleString();
                    document.getElementById('ref-link').innerText = `https://t.me/YOUR_BOT?start=${data.myRefCode}`;
                    document.getElementById('ref-count').innerText = data.referralsCount || 0;
                } else {
                    const myCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                    setDoc(userRef, {
                        balance: 0,
                        id: tgUser?.id || 0,
                        username: tgUser?.username || "Guest",
                        isBanned: false,
                        myRefCode: myCode,
                        referralsCount: 0,
                        joinedAt: new Date().toISOString()
                    });
                }
            });
        }

        window.copyRef = () => {
            const link = document.getElementById('ref-link').innerText;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            window.Telegram.WebApp.showPopup({ message: "تم نسخ رابط الإحالة! 🔗" });
        };

        window.runAdminAction = async (type) => {
            const targetId = document.getElementById('adm-id').value;
            const val = parseInt(document.getElementById('adm-val').value) || 0;
            const snap = await getDocs(collection(db, 'artifacts', appId, 'users'));
            let foundUid = null;
            for (const d of snap.docs) {
                const p = await getDoc(doc(db, 'artifacts', appId, 'users', d.id, 'profile', 'data'));
                if(p.exists() && p.data().id == targetId) { foundUid = d.id; break; }
            }
            if(!foundUid) return alert("خطأ");
            const ref = doc(db, 'artifacts', appId, 'users', foundUid, 'profile', 'data');
            if(type === 'add') await updateDoc(ref, { balance: increment(val) });
            if(type === 'ban') await updateDoc(ref, { isBanned: true });
            if(type === 'unban') await updateDoc(ref, { isBanned: false });
            alert("تم");
        };

        window.onload = () => { init(); logic(); };

        function logic() {
            const tg = window.Telegram.WebApp;
            const coin = document.getElementById('coin');
            const bar = document.getElementById('bar');
            const btn = document.getElementById('claim');

            coin.onclick = (e) => {
                if (window.state.clicks < window.state.target) {
                    window.state.clicks++;
                    bar.style.width = (window.state.clicks * 10) + "%";
                    
                    // تأثير بصري عند اللمس
                    const rect = coin.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const ripple = document.createElement('span');
                    ripple.style.left = `${x}px`; ripple.style.top = `${y}px`;
                    ripple.className = "absolute w-4 h-4 bg-green-400 rounded-full animate-ping pointer-events-none";
                    coin.parentElement.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 500);

                    if (window.state.clicks >= 10) {
                        btn.classList.remove('hidden');
                        coin.style.filter = "grayscale(1) brightness(0.5)";
                    }
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                }
            };

            btn.onclick = () => {
                tg.openLink("https://www.google.com"); 
                document.getElementById('ad-wait').classList.remove('hidden');
                let s = 8;
                const t = setInterval(async () => {
                    s--;
                    document.getElementById('timer').innerText = s;
                    if(s <= 0) {
                        clearInterval(t);
                        document.getElementById('ad-wait').classList.add('hidden');
                        const r = doc(db, 'artifacts', appId, 'users', window.state.user.uid, 'profile', 'data');
                        await updateDoc(r, { balance: increment(window.state.reward) });
                        window.state.clicks = 0;
                        bar.style.width = "0%";
                        btn.classList.add('hidden');
                        coin.style.filter = "none";
                        tg.showPopup({ message: "تم كسب 5,000 PEPE!" });
                    }
                }, 1000);
            };

            document.querySelectorAll('.nav-item').forEach(n => {
                n.onclick = () => {
                    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
                    document.getElementById(n.dataset.view).classList.remove('hidden');
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.add('opacity-40'));
                    n.classList.remove('opacity-40');
                };
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at top, #0a1a0a 0%, #050805 100%); color: white; user-select: none; margin: 0; overflow: hidden; }
        .page { height: 100vh; padding-bottom: 120px; display: flex; flex-direction: column; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .green-glow { text-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        .coin-shadow { filter: drop-shadow(0 0 30px rgba(34, 197, 94, 0.2)); }
        input { background: rgba(0,0,0,0.5); border: 1px solid #1a1a1a; padding: 14px; border-radius: 18px; width: 100%; margin-bottom: 12px; color: white; outline: none; }
        .nav-active { opacity: 1 !important; color: #22c55e; }
    </style>
</head>
<body class="h-screen">

    <header class="p-5 flex justify-between items-center z-50 relative">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Cloud Status: <span class="text-green-500">Live</span></span>
        </div>
        <div class="glass px-5 py-2 rounded-2xl border border-green-500/20 shadow-lg">
            <span id="bal-top" class="text-2xl font-black font-mono green-glow">0</span>
            <span class="text-[10px] text-green-500 font-bold mr-1">PEPE</span>
        </div>
    </header>

    <main class="relative flex-1">
        <!-- Mine Page -->
        <section id="mine" class="page items-center justify-center p-6 gap-8">
            <div class="text-center">
                <h1 class="text-5xl font-black italic tracking-tighter mb-1">PEPE ROYAL</h1>
                <div class="h-[2px] w-20 bg-green-500 mx-auto rounded-full"></div>
            </div>
            
            <div class="relative group">
                <div class="absolute inset-0 bg-green-500/20 blur-[100px] rounded-full scale-150 transition-all group-active:bg-green-500/40"></div>
                <img src="https://g.top4top.io/s_3747ccek80.jpg" id="coin" class="w-72 h-72 rounded-full border-[6px] border-green-500/10 coin-shadow relative z-10 cursor-pointer transition-transform active:scale-95 duration-75" alt="Pepe">
            </div>

            <div class="w-full max-w-xs space-y-3">
                <div class="flex justify-between items-end px-1">
                    <span class="text-[10px] font-black text-gray-500 uppercase">Power Reserve</span>
                    <span id="counter" class="text-xs font-black text-green-500 font-mono">Tap to start</span>
                </div>
                <div class="h-4 w-full bg-black/50 rounded-full p-1 border border-white/5 shadow-inner">
                    <div id="bar" class="h-full w-0 bg-gradient-to-r from-green-600 to-green-400 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.5)] transition-all duration-300"></div>
                </div>
            </div>

            <button id="claim" class="hidden w-full max-w-xs py-5 bg-green-500 text-black font-black rounded-[25px] shadow-[0_10px_30px_rgba(34,197,94,0.3)] animate-bounce text-lg uppercase">
                Claim Reward +5K
            </button>
        </section>

        <!-- Wallet Page -->
        <section id="wallet" class="page hidden p-8 pt-12 items-center">
            <div class="w-full glass p-10 rounded-[50px] text-center shadow-2xl">
                <div class="w-20 h-20 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-wallet text-3xl text-green-500"></i>
                </div>
                <p class="text-xs text-gray-500 font-bold mb-2 uppercase tracking-widest">Total Earnings</p>
                <h2 id="bal-wallet" class="text-6xl font-black font-mono mb-10 green-glow">0</h2>
                <div class="grid grid-cols-1 gap-3">
                    <button class="w-full py-5 bg-white/5 border border-white/10 rounded-3xl font-black text-gray-400 cursor-not-allowed">WITHDRAW (SOON)</button>
                </div>
            </div>
        </section>

        <!-- Friends Page (الاحالة) -->
        <section id="friends" class="page hidden p-8 pt-12">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black mb-2">دعوة الأصدقاء</h2>
                <p class="text-sm text-gray-500">اكسب 25,000 PEPE عن كل صديق ينضم عبر رابطك!</p>
            </div>

            <div class="glass p-6 rounded-[35px] mb-6">
                <div class="flex justify-between items-center mb-6 px-2">
                    <span class="text-xs font-bold text-gray-400">إجمالي الأصدقاء</span>
                    <span id="ref-count" class="text-2xl font-black text-green-500 font-mono">0</span>
                </div>
                <div class="bg-black/50 p-4 rounded-2xl border border-white/5 break-all text-[10px] text-green-400 font-mono mb-4" id="ref-link">
                    Loading referral link...
                </div>
                <button onclick="copyRef()" class="w-full py-4 bg-green-500 text-black font-black rounded-2xl shadow-lg">نسخ رابط الدعوة</button>
            </div>

            <div class="space-y-3">
                <div class="glass p-5 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-500"><i class="fas fa-user-plus"></i></div>
                        <div><p class="text-sm font-black">دعوة 10 أصدقاء</p><p class="text-[10px] text-gray-500">مكافأة 250,000</p></div>
                    </div>
                    <i class="fas fa-lock text-gray-700"></i>
                </div>
            </div>
        </section>

        <!-- Admin Page -->
        <section id="admin" class="page hidden p-8 pt-12">
            <h2 class="text-2xl font-black text-yellow-500 mb-6 flex items-center gap-3">
                <i class="fas fa-crown"></i> Control Panel
            </h2>
            <div class="glass p-8 rounded-[40px] space-y-4">
                <input type="number" id="adm-id" placeholder="User Telegram ID">
                <input type="number" id="adm-val" placeholder="Amount to Add">
                <button onclick="runAdminAction('add')" class="w-full bg-green-600 py-4 rounded-2xl font-black shadow-lg">تحديث الرصيد</button>
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="runAdminAction('ban')" class="bg-red-900/40 border border-red-500/20 py-4 rounded-2xl font-black text-red-500 uppercase text-xs">Ban</button>
                    <button onclick="runAdminAction('unban')" class="bg-gray-800 py-4 rounded-2xl font-black text-gray-400 uppercase text-xs">Unban</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Navbar -->
    <nav class="fixed bottom-8 left-8 right-8 glass rounded-[40px] p-2 flex justify-around items-center z-50 border border-white/10 shadow-2xl">
        <button data-view="mine" class="nav-item p-4 text-xl"><i class="fas fa-bolt"></i></button>
        <button data-view="friends" class="nav-item p-4 opacity-40 text-xl"><i class="fas fa-users"></i></button>
        <button data-view="wallet" class="nav-item p-4 opacity-40 text-xl"><i class="fas fa-wallet"></i></button>
        <button id="nav-admin" data-view="admin" class="nav-item hidden opacity-40 p-4 text-xl text-yellow-500"><i class="fas fa-shield-alt"></i></button>
    </nav>

    <!-- Overlay Loader -->
    <div id="ad-wait" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl hidden flex flex-col items-center justify-center p-12">
        <div class="relative">
            <div class="w-24 h-24 border-4 border-green-500/20 border-t-green-500 rounded-full animate-spin"></div>
            <div id="timer" class="absolute inset-0 flex items-center justify-center text-3xl font-black text-green-500 font-mono">8</div>
        </div>
        <p class="mt-10 text-xs font-black text-gray-500 tracking-[0.3em] uppercase">Securing Pepe Assets</p>
    </div>

</body>
</html>
