<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة عبود</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #000; 
            font-family: 'Cairo', sans-serif; 
            color: white; 
            overflow: hidden; 
        }

        /* تنسيق الفيديو الأساسي */
        .swiper { width: 100%; height: 100vh; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        
        /* القائمة السفلية الأصلية */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.95); 
            display: flex; justify-content: space-around; items-center;
            padding: 10px 0 25px 0; z-index: 10000; 
            border-top: 0.1px solid #222;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { opacity: 1; }
        .nav-icon { width: 24px; height: 24px; }
        
        /* زر النشر الأصلي (المربع الأبيض) */
        .publish-btn { 
            background: white; color: black; 
            width: 45px; height: 30px; 
            border-radius: 8px; display: flex; 
            align-items: center; justify-content: center; 
            font-size: 24px; font-weight: bold;
            margin-top: -5px;
        }

        /* الصفحات */
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 90px; }
        .active-page { display: flex !important; }

        /* الملف الشخصي الأصلي */
        .profile-header { padding: 60px 20px 20px; text-align: center; border-bottom: 0.1px solid #222; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 15px; border: 2px solid #333; object-fit: cover; }
        .stats-row { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .stat-item { text-align: center; }
        .stat-value { font-weight: 900; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: #888; }
        
        /* الشبكة Grid */
        .video-grid { display: grid; grid-template-cols: repeat(3, 1fr); gap: 1px; background: #000; }
        .grid-item { aspect-ratio: 9/16; background: #111; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* المهام */
        .task-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .task-info h4 { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .task-reward { color: #facd05; font-size: 13px; font-weight: bold; }
        .task-action { background: #fff; color: #000; padding: 6px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; }

        /* منبثقة الأدمن */
        .admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 25px; display: none; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 10px; color: white; outline: none; }
    </style>
</head>
<body>

    <!-- الهيدر العلوي للرصيد -->
    <div class="fixed top-0 left-0 right-0 p-4 z-[11000] flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
        <div class="bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
            <span id="balanceTxt" class="text-[#facd05] font-bold text-sm">$0.0000</span>
        </div>
        <div id="adminTrigger" onclick="toggleAdmin(true)" class="hidden text-xl opacity-30">⚙️</div>
    </div>

    <!-- 1. الصفحة الرئيسية (تيك توك ستايل) -->
    <div id="homePage" class="page active-page !p-0">
        <div class="swiper videoSwiper">
            <div class="swiper-wrapper" id="mainFeed"></div>
        </div>
    </div>

    <!-- 2. صفحة المهام -->
    <div id="tasksPage" class="page p-5 pt-20">
        <h2 class="text-xl font-black mb-1">المهام اليومية</h2>
        <p class="text-zinc-500 text-xs mb-6">نفذ المهام واكسب رصيد حقيقي</p>
        <div id="tasksList"></div>
    </div>

    <!-- 3. صفحة النشر -->
    <div id="publishPage" class="page p-6 pt-24">
        <div class="bg-[#111] p-6 rounded-3xl border border-white/5">
            <h2 class="text-center font-bold mb-6">نشر فيديو يوتيوب شورتس</h2>
            <input id="ytLink" type="text" placeholder="ضع رابط الفيديو هنا...">
            <p class="text-[10px] text-zinc-500 mb-6 text-center">سيتم خصم $10 من رصيدك مقابل النشر</p>
            <button onclick="handlePublish()" class="w-full bg-white text-black py-3 rounded-xl font-black">نشر الآن</button>
        </div>
    </div>

    <!-- 4. الملف الشخصي (النسخة الأصلية) -->
    <div id="profilePage" class="page !p-0">
        <div class="profile-header">
            <img id="uAvatar" src="https://via.placeholder.com/100" class="avatar">
            <h3 id="uName" class="font-bold text-lg">...</h3>
            <p id="uTag" class="text-zinc-500 text-xs mt-1">@user_id</p>
            
            <div class="stats-row">
                <div class="stat-item"><span id="vidCount" class="stat-value">0</span><span class="stat-label">فيديو</span></div>
                <div class="stat-item"><span class="stat-value">0</span><span class="stat-label">متابع</span></div>
                <div class="stat-item"><span class="stat-value">0</span><span class="stat-label">تسجيل إعجاب</span></div>
            </div>
        </div>
        <!-- تبويبات الملف الشخصي -->
        <div class="flex border-b border-white/5">
            <div class="flex-1 text-center py-3 border-b-2 border-white">🎥</div>
            <div class="flex-1 text-center py-3 opacity-30">❤️</div>
        </div>
        <div id="myVideos" class="video-grid"></div>
    </div>

    <!-- لوحة تحكم الأدمن -->
    <div id="adminPanel" class="admin-panel overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">إدارة المهام 👑</h2>
            <button onclick="toggleAdmin(false)" class="text-2xl">✕</button>
        </div>
        <div class="space-y-3 bg-[#111] p-4 rounded-2xl mb-6">
            <input id="taskT" type="text" placeholder="عنوان المهمة (مثلاً: اشترك في قناة عبود)">
            <input id="taskL" type="text" placeholder="رابط القناة أو الفيديو">
            <div class="flex gap-2">
                <input id="taskR" type="number" step="0.01" placeholder="المكافأة $">
                <input id="taskM" type="number" placeholder="أقصى عدد">
            </div>
            <button onclick="addNewTask()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">حفظ المهمة</button>
        </div>
        <hr class="border-white/10 mb-6">
        <div id="adminTasksView" class="space-y-3"></div>
    </div>

    <!-- القائمة السفلية الأصلية -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" id="nav-home" class="nav-item active">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">الرئيسية</span>
        </div>
        <div onclick="switchTab('tasks')" id="nav-tasks" class="nav-item">
            <span class="text-xl">📋</span>
            <span class="text-[10px]">المهام</span>
        </div>
        <div onclick="switchTab('publish')" class="nav-item !opacity-100">
            <div class="publish-btn">+</div>
        </div>
        <div onclick="switchTab('profile')" id="nav-profile" class="nav-item">
            <span class="text-xl">👤</span>
            <span class="text-[10px]">الملف الشخصي</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const fbConfig = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "7416599626");
        const isAdmin = (uID === "7416599626");

        let userData = { balance: 0, completedTasks: [], liked: [] };
        let allVideos = [];
        let swiper;

        // 1. تشغيل البيانات
        async function init() {
            if(isAdmin) document.getElementById('adminTrigger').classList.remove('hidden');

            // مراقبة المستخدم
            db.collection("users").doc(uID).onSnapshot(doc => {
                if(doc.exists) {
                    userData = doc.data();
                    document.getElementById('balanceTxt').innerText = `$${(userData.balance || 0).toFixed(4)}`;
                } else {
                    db.collection("users").doc(uID).set({
                        name: tg.initDataUnsafe?.user?.first_name || "Guest",
                        balance: 0.1,
                        completedTasks: [],
                        liked: []
                    });
                }
            });

            // مراقبة الفيديوهات
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(s => {
                allVideos = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderHome();
                if(document.getElementById('profilePage').classList.contains('active-page')) renderProfile();
            });

            // مراقبة المهام
            db.collection("tasks").onSnapshot(s => {
                const tasks = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderTasksList(tasks);
                if(isAdmin) renderAdminTasks(tasks);
            });
        }

        // 2. عرض الفيديوهات (الرئيسية)
        function renderHome() {
            const feed = document.getElementById('mainFeed');
            feed.innerHTML = allVideos.map((v, i) => `
                <div class="swiper-slide">
                    <div class="video-container">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${v.ytId}?autoplay=0&controls=0&loop=1&playlist=${v.ytId}&rel=0" frameborder="0"></iframe>
                        <div class="absolute right-4 bottom-24 flex flex-col items-center gap-5 z-50">
                            <img src="${v.ownerImg || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full border-2 border-white">
                            <div onclick="likeVideo('${v.id}')" class="text-center">
                                <span class="text-3xl">${userData.liked?.includes(v.id) ? '❤️' : '🤍'}</span>
                                <p class="text-[10px] mt-1 font-bold">${v.likes || 0}</p>
                            </div>
                        </div>
                        <div class="absolute bottom-24 left-4 z-50">
                            <p class="font-bold text-sm">@${v.ownerName}</p>
                            <p class="text-xs text-zinc-300 mt-1">مشاهدة ممتعة 🎬</p>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if(swiper) swiper.destroy();
            swiper = new Swiper(".videoSwiper", { direction: "vertical", mousewheel: true });
        }

        // 3. عرض المهام
        function renderTasksList(tasks) {
            const container = document.getElementById('tasksList');
            container.innerHTML = tasks.filter(t => t.status !== 'paused').map(t => {
                const isDone = userData.completedTasks?.includes(t.id);
                return `
                <div class="task-card">
                    <div class="task-info">
                        <h4>${t.title}</h4>
                        <p class="task-reward">+$${t.reward}</p>
                    </div>
                    ${isDone ? '<span class="text-zinc-600 text-xs font-bold">مكتملة ✅</span>' : 
                    `<button onclick="doTask('${t.id}', '${t.link}')" class="task-action">بدء</button>`}
                </div>`;
            }).join('');
        }

        async function doTask(id, link) {
            window.open(link, '_blank');
            if(confirm("هل أتممت المهمة؟")) {
                const task = (await db.collection("tasks").doc(id).get()).data();
                await db.collection("users").doc(uID).update({
                    balance: firebase.firestore.FieldValue.increment(task.reward),
                    completedTasks: firebase.firestore.FieldValue.arrayUnion(id)
                });
                await db.collection("tasks").doc(id).update({ completions: firebase.firestore.FieldValue.increment(1) });
            }
        }

        // 4. الملف الشخصي
        function renderProfile() {
            document.getElementById('uAvatar').src = tg.initDataUnsafe?.user?.photo_url || 'https://via.placeholder.com/100';
            document.getElementById('uName').innerText = userData.name || "مستخدم";
            document.getElementById('uTag').innerText = `@${uID}`;
            
            const myVids = allVideos.filter(v => v.ownerId === uID);
            document.getElementById('vidCount').innerText = myVids.length;
            
            document.getElementById('myVideos').innerHTML = myVids.map(v => `
                <div class="grid-item">
                    <img src="https://img.youtube.com/vi/${v.ytId}/0.jpg">
                </div>
            `).join('');
        }

        // التنقل بين التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(tab + 'Page').classList.add('active-page');
            if(tab !== 'publish') document.getElementById('nav-' + tab).classList.add('active');
            
            if(tab === 'profile') renderProfile();
        }

        // وظائف النشر
        async function handlePublish() {
            const url = document.getElementById('ytLink').value;
            const ytId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop()?.split('?')[0];
            
            if(!ytId) return alert("الرابط خطأ!");
            if(userData.balance < 10) return alert("رصيدك غير كافي (تحتاج $10)");

            await db.collection("shared_videos").add({
                ytId,
                ownerId: uID,
                ownerName: userData.name,
                ownerImg: tg.initDataUnsafe?.user?.photo_url || "",
                likes: 0,
                createdAt: new Date()
            });

            await db.collection("users").doc(uID).update({
                balance: firebase.firestore.FieldValue.increment(-10)
            });

            alert("تم النشر بنجاح!");
            switchTab('home');
        }

        // وظائف الأدمن
        function toggleAdmin(show) { document.getElementById('adminPanel').style.display = show ? 'block' : 'none'; }
        
        async function addNewTask() {
            const t = document.getElementById('taskT').value;
            const l = document.getElementById('taskL').value;
            const r = parseFloat(document.getElementById('taskR').value);
            const m = parseInt(document.getElementById('taskM').value);
            if(!t || !l) return;
            await db.collection("tasks").add({ title: t, link: l, reward: r, limit: m, completions: 0, status: 'active' });
            alert("تم الحفظ");
        }

        function renderAdminTasks(tasks) {
            const v = document.getElementById('adminTasksView');
            v.innerHTML = tasks.map(t => `
                <div class="bg-zinc-900 p-3 rounded-xl flex justify-between items-center text-[11px]">
                    <div>
                        <p class="font-bold">${t.title}</p>
                        <p class="text-zinc-500">${t.completions}/${t.limit} - $${t.reward}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="toggleTStatus('${t.id}', '${t.status}')" class="bg-zinc-800 p-2 rounded">${t.status === 'active' ? '⏸️' : '▶️'}</button>
                        <button onclick="deleteT('${t.id}')" class="bg-red-900/30 p-2 rounded">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleTStatus(id, s) { await db.collection("tasks").doc(id).update({ status: s === 'active' ? 'paused' : 'active' }); }
        async function deleteT(id) { if(confirm("حذف؟")) await db.collection("tasks").doc(id).delete(); }

        window.onload = init;
    </script>
</body>
</html>
