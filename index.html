<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tik Ton Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; z-index: 10; }
        .swiper-slide { position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-wrapper { width: 100%; height: 80vh; pointer-events: none; z-index: 5; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; z-index: 9999; border-top: 1px solid #222; }
        .action-btns { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 100; }
        .owner-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ef4444; cursor: pointer; pointer-events: auto; object-cover: cover; }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .active-page { display: flex !important; }
        .balance-chip { position: fixed; top: 20px; left: 20px; z-index: 10000; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- التوازن العلوي ثابت -->
    <div class="balance-chip">
        <span id="mainBal" class="text-green-400 font-black text-lg">$0.0000</span>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="homePage" class="page active-page">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- صفحة النشر -->
    <div id="publishPage" class="page p-6">
        <h2 class="text-3xl font-black mt-12 mb-6 text-red-500">مركز النشر 🚀</h2>
        <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
            <input id="ytInput" type="text" placeholder="ضع رابط الفيديو هنا..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-white mb-4 text-left outline-none">
            <button onclick="handlePublish()" class="w-full bg-red-600 py-4 rounded-xl font-black text-xl shadow-lg active:scale-95 transition-all">نشر الآن</button>
        </div>
        <button onclick="switchTab('home')" class="mt-6 text-gray-500 w-full">رجوع</button>
    </div>

    <!-- صفحة الملف الشخصي لناشر الفيديو -->
    <div id="viewUserPage" class="page items-center justify-center p-6">
        <div class="bg-white/5 border border-white/10 p-10 rounded-[3rem] w-full max-w-xs text-center">
            <img id="viewUserImg" src="" class="w-24 h-24 rounded-full border-4 border-red-600 mx-auto mb-4">
            <h3 id="viewUserName" class="text-2xl font-black mb-6 text-white tracking-tight">...</h3>
            <button onclick="switchTab('home')" class="w-full py-4 bg-white/10 rounded-2xl font-bold">إغلاق</button>
        </div>
    </div>

    <!-- حسابي -->
    <div id="profilePage" class="page items-center justify-center p-6 text-center">
        <img id="tgPhoto" src="" class="w-24 h-24 rounded-full border-4 border-red-600 mb-4 mx-auto">
        <h2 id="tgName" class="text-2xl font-black text-white mb-6 tracking-tight">...</h2>
        <div class="bg-green-500/10 p-8 rounded-[2rem] w-full border border-green-500/20">
             <p class="text-xs text-gray-400 uppercase font-bold mb-1">الرصيد الحالي</p>
             <p id="profBal" class="text-5xl font-black text-green-400 tracking-tighter">$0.0000</p>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <button onclick="switchTab('home')" class="text-2xl">🏠</button>
        <button onclick="switchTab('publish')" class="bg-red-600 px-6 py-1 rounded-xl font-black text-2xl">+</button>
        <button onclick="switchTab('profile')" class="text-2xl opacity-50">👤</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com",
            projectId: "tik-ton-92124", storageBucket: "tik-ton-92124.firebasestorage.app",
            messagingSenderId: "885830196454", appId: "1:885830196454:web:a18a778644558e0a8ec9ec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        tg.expand();
        const userData = tg.initDataUnsafe?.user || { id: "test_dev", first_name: "مستخدم", photo_url: "https://via.placeholder.com/150" };
        const uID = String(userData.id);

        let balance = 0, players = {}, swiper, videos = [];

        async function loadData() {
            const snap = await db.collection("shared_videos").orderBy("createdAt", "desc").limit(20).get();
            videos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            if(videos.length === 0) videos = [{videoId: "dQw4w9WgXcQ", ownerName: "الحداد", ownerImg: "https://via.placeholder.com/150"}];
            render();
        }

        function render() {
            const wrapper = document.getElementById('videoWrapper');
            wrapper.innerHTML = '';
            videos.forEach((v, i) => {
                wrapper.innerHTML += `
                <div class="swiper-slide">
                    <div id="player-${i}" class="video-wrapper"></div>
                    <div class="action-btns">
                        <img src="${v.ownerImg || 'https://via.placeholder.com/50'}" class="owner-img" onclick="viewUser('${v.ownerName}', '${v.ownerImg}')">
                        <span class="text-2xl">❤️</span>
                        <span class="text-2xl font-bold">💬</span>
                    </div>
                    <div class="absolute bottom-24 right-6 text-right z-50">
                        <h3 class="font-black text-lg">@${v.ownerName || 'Unknown'}</h3>
                        <p class="text-xs text-gray-400">شاهد الفيديو للربح 💰</p>
                    </div>
                </div>`;
            });

            swiper = new Swiper(".mySwiper", {
                direction: "vertical",
                on: { slideChange: () => { stopAll(); playCurrent(swiper.activeIndex); } }
            });
            setTimeout(initPlayers, 500);
        }

        function initPlayers() {
            videos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1 },
                    events: {
                        onStateChange: (e) => {
                            if(e.data === YT.PlayerState.PLAYING && !e.target.isRewarded) {
                                setTimeout(() => {
                                    if(e.target.getPlayerState() === YT.PlayerState.PLAYING) {
                                        e.target.isRewarded = true;
                                        addMoney(0.0005);
                                    }
                                }, 10000);
                            }
                        }
                    }
                });
            });
        }

        function stopAll() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); }
        function playCurrent(i) { if(players[i]) players[i].playVideo(); }

        async function addMoney(amt) {
            balance += amt;
            updateUI();
            await db.collection("users").doc(uID).set({ balance: balance, name: userData.first_name, photo: userData.photo_url }, { merge: true });
        }

        function updateUI() {
            const txt = `$${balance.toFixed(4)}`;
            document.getElementById('mainBal').innerText = txt;
            document.getElementById('profBal').innerText = txt;
        }

        function viewUser(name, img) {
            document.getElementById('viewUserName').innerText = name || "Unknown";
            document.getElementById('viewUserImg').src = img || "https://via.placeholder.com/150";
            switchTab('viewUser');
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'home') document.getElementById('homePage').classList.add('active-page');
            if(t === 'publish') document.getElementById('publishPage').classList.add('active-page');
            if(t === 'profile') document.getElementById('profilePage').classList.add('active-page');
            if(t === 'viewUser') document.getElementById('viewUserPage').classList.add('active-page');
            if(t !== 'home') stopAll(); else playCurrent(swiper.activeIndex);
        }

        async function handlePublish() {
            const url = document.getElementById('ytInput').value;
            const vidId = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(!vidId) return alert('الرابط غير صحيح');
            
            await db.collection("shared_videos").add({
                videoId: vidId,
                createdAt: new Date(),
                ownerId: uID,
                ownerName: userData.first_name,
                ownerImg: userData.photo_url
            });
            alert('تم النشر!');
            location.reload();
        }

        window.onload = async () => {
            document.getElementById('tgName').innerText = userData.first_name;
            document.getElementById('tgPhoto').src = userData.photo_url || 'https://via.placeholder.com/150';
            await loadData();
            const d = await db.collection("users").doc(uID).get();
            if(d.exists) { balance = d.data().balance || 0; updateUI(); }
        };
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
