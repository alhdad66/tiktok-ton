<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - النسخة الاحترافية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; z-index: 1; }
        
        .interaction-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .interactive-element { pointer-events: auto; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.95); display: flex; justify-content: space-around; padding: 15px 0; z-index: 10000; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: flex !important; }
        
        .timer-badge { position: absolute; top: 110px; left: 20px; background: rgba(220, 38, 38, 0.9); padding: 8px 15px; border-radius: 50px; z-index: 1000; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #dc2626; font-size: 9px; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #dc2626; }
        
        .profile-tab { border-bottom: 3px solid transparent; opacity: 0.4; padding: 12px 0; transition: 0.3s; cursor: pointer; font-weight: 900; font-size: 0.8rem; }
        .profile-tab.active { border-bottom: 3px solid #dc2626; opacity: 1; color: #dc2626; }
        
        .reward-popup { position: fixed; left: 50%; top: 50%; color: #4ade80; font-weight: 900; font-size: 2.5rem; z-index: 20000; pointer-events: none; animation: floatUp 2s forwards; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { opacity:0; transform: translate(-50%, 20px); } 20% { opacity:1; transform: translate(-50%, -20px); } 100% { opacity:0; transform: translate(-50%, -120px); } }
        
        /* YouTube-like scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- التوازن العلوي (أحمر يوتيوب) -->
    <div class="fixed top-8 left-6 right-6 z-[11000] flex justify-between items-center pointer-events-none">
        <div class="bg-zinc-900/95 px-5 py-2.5 rounded-full border border-white/5 pointer-events-auto flex items-center gap-3 shadow-2xl">
            <span id="mainBal" class="text-red-500 font-black text-lg tracking-tight">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_#dc2626]"></div>
        </div>
        <div onclick="switchTab('notifs')" class="bg-zinc-900/95 p-3 rounded-full border border-white/5 pointer-events-auto cursor-pointer relative shadow-2xl">
            <span class="text-xl">🔔</span>
            <div id="notifBadge" class="notif-badge hidden">0</div>
        </div>
    </div>

    <!-- خلاصة الفيديوهات -->
    <div id="homePage" class="page active-page !p-0">
        <div id="videoTimer" class="timer-badge hidden">
            <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
            <span id="timerText" class="font-black text-xs text-white">10s</span>
        </div>
        <div class="swiper mySwiper"><div class="swiper-wrapper" id="videoWrapper"></div></div>
    </div>

    <!-- الإحصائيات (النمط الأحمر) -->
    <div id="statsPage" class="page p-6 pt-24">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-red-600/20">📊</div>
            <div>
                <h2 class="text-2xl font-black italic">لوحة التحكم</h2>
                <p class="text-zinc-500 text-[10px] font-bold">إحصائيات فورية من يوتيوب</p>
            </div>
        </div>

        <div class="bg-zinc-900/40 p-5 rounded-[2.5rem] border border-white/5 mb-6">
            <canvas id="tradingChart" style="max-height: 180px;"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900/60 p-5 rounded-3xl border border-white/5">
                <p class="text-[9px] text-zinc-500 uppercase font-black mb-1">المشاهدات</p>
                <h4 id="totalViews" class="text-2xl font-black text-red-500">0</h4>
            </div>
            <div class="bg-zinc-900/60 p-5 rounded-3xl border border-white/5">
                <p class="text-[9px] text-zinc-500 uppercase font-black mb-1">التفاعل</p>
                <h4 id="totalLikes" class="text-2xl font-black text-red-500">0</h4>
            </div>
        </div>

        <div class="bg-red-600/5 p-6 rounded-[2.5rem] border border-red-600/20 mb-24">
            <p class="text-xs font-black text-red-500 mb-4 flex items-center gap-2"><span>🎬</span> ابدأ بث جديد</p>
            <div class="flex gap-2">
                <input id="ytInput" type="text" placeholder="انسخ رابط الفيديو هنا..." class="flex-1 bg-black/50 border border-white/10 p-4 rounded-2xl text-xs outline-none focus:border-red-600 transition-all">
                <button onclick="handlePublish()" class="bg-red-600 px-6 rounded-2xl font-black text-sm active:scale-95 transition-all shadow-lg shadow-red-600/20">بث</button>
            </div>
        </div>
        <div id="myVideosList" class="space-y-3 pb-10"></div>
    </div>

    <!-- البروفايل المطور -->
    <div id="profilePage" class="page !p-0">
        <div class="pt-24 pb-10 text-center bg-gradient-to-b from-red-900/20 to-black">
            <div class="w-24 h-24 mx-auto mb-4 relative p-1 border-2 border-red-600 rounded-full">
                <img id="uProfImg" src="" class="w-full h-full rounded-full object-cover shadow-2xl">
            </div>
            <h2 id="uProfName" class="text-2xl font-black italic">...</h2>
            <div class="flex justify-center gap-10 my-6">
                <div class="text-center"><p id="uVidsCount" class="text-xl font-black">0</p><p class="text-[9px] text-zinc-500 uppercase">فيديو</p></div>
                <div class="text-center"><p class="text-xl font-black">1.4K</p><p class="text-[9px] text-zinc-500 uppercase">متابع</p></div>
            </div>
            <div class="flex justify-center px-10 gap-2 mb-8">
                <button id="followBtn" onclick="toggleFollow()" class="flex-1 bg-red-600 py-3 rounded-2xl font-black text-xs active:scale-95 shadow-lg shadow-red-600/10">متابعة</button>
                <button onclick="switchTab('home')" class="w-12 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center">✕</button>
            </div>
        </div>
        <div class="flex border-b border-white/5">
            <div id="tabMyVids" onclick="setProfileTab('my')" class="profile-tab active flex-1 text-center">فيديوهاتي</div>
            <div id="tabLikedVids" onclick="setProfileTab('liked')" class="profile-tab flex-1 text-center">المعجب بها</div>
        </div>
        <div class="grid grid-cols-3 gap-0.5 mt-0.5" id="profileGrid"></div>
    </div>

    <!-- صفحة الإشعارات -->
    <div id="notifsPage" class="page p-6 pt-24">
        <h2 class="text-2xl font-black mb-8 flex items-center gap-3">🔔 التنبيهات</h2>
        <div id="notifList" class="space-y-3"></div>
    </div>

    <!-- بار التنقل (الأحمر) -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl opacity-40 hover:opacity-100 p-2 transition-all cursor-pointer">🏠</div>
        <div onclick="switchTab('stats')" class="bg-red-600 w-16 h-10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg shadow-red-600/30 active:scale-90 transition-transform">+</div>
        <div onclick="switchTab('profile_self')" class="text-2xl opacity-40 hover:opacity-100 p-2 transition-all cursor-pointer">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const tgUser = tg.initDataUnsafe?.user || {};
        const uID = String(tgUser.id || "88583019"); // Default to guest if not telegram
        const userName = tgUser.first_name || "مستخدم مجهول";
        const userImg = tgUser.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer = null;
        let myLikes = [], watchedVids = [], myFollowing = [], profileMode = 'my', activeProfileID = null;

        async function init() {
            const userRef = db.collection("users").doc(uID);
            const userDoc = await userRef.get();
            
            if(!userDoc.exists) { 
                await userRef.set({ name: userName, img: userImg, balance: 0, likedVids: [], watchedVids: [], following: [] }); 
            } else {
                const data = userDoc.data();
                myLikes = data.likedVids || [];
                watchedVids = data.watchedVids || [];
                myFollowing = data.following || [];
            }

            // Real-time updates for user data
            userRef.onSnapshot(d => {
                if(d.exists) {
                    balance = d.data().balance || 0;
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                    myLikes = d.data().likedVids || [];
                    watchedVids = d.data().watchedVids || [];
                    myFollowing = d.data().following || [];
                }
            });

            // Notification count
            db.collection("users").doc(uID).collection("notifs").where("seen", "==", false).onSnapshot(snap => {
                const badge = document.getElementById('notifBadge');
                if(snap.size > 0) { badge.innerText = snap.size; badge.classList.remove('hidden'); }
                else { badge.classList.add('hidden'); }
            });

            // Load Global Videos
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderHome();
                updateStats();
                renderChart();
            });

            loadNotifs();
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            const currentIdx = swiper ? swiper.activeIndex : 0;
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                const isLiked = myLikes.includes(v.id);
                wrap.innerHTML += `
                    <div class="swiper-slide relative bg-black">
                        <div id="player-${i}" class="w-full h-full pointer-events-none"></div>
                        <div class="interaction-layer">
                            <div class="absolute right-5 bottom-36 flex flex-col items-center gap-7">
                                <div class="relative">
                                    <img src="${v.ownerImg || userImg}" class="interactive-element w-14 h-14 rounded-full border-2 border-red-600 object-cover shadow-xl" onclick="openProfile('${v.ownerId}')">
                                    <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-red-600 text-[8px] px-1 rounded-sm font-black uppercase">LIVE</div>
                                </div>
                                <div onclick="handleLike('${v.id}', '${v.ownerId}', this)" class="interactive-element text-center cursor-pointer transition-transform active:scale-150">
                                    <span class="text-3xl drop-shadow-lg transition-all" style="filter: ${isLiked ? 'grayscale(0) drop-shadow(0 0 10px #dc2626)' : 'grayscale(1)'}">❤️</span>
                                    <p class="text-xs font-black mt-1">${v.likes || 0}</p>
                                </div>
                                <div class="interactive-element text-center opacity-70">
                                    <span class="text-3xl">✈️</span>
                                    <p class="text-[10px] font-bold">شارك</p>
                                </div>
                            </div>
                            <div class="absolute bottom-28 right-8 text-right pointer-events-none">
                                <h3 class="text-xl font-black drop-shadow-md">@${v.ownerName}</h3>
                                <p class="text-[10px] text-zinc-400 font-bold mt-1">بث مباشر الآن على المنصة 🎬</p>
                            </div>
                        </div>
                    </div>`;
            });

            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", 
                initialSlide: currentIdx, 
                on: { slideChange: () => { stopVideos(); startTimer(swiper.activeIndex); } } 
            });
            setTimeout(initPlayers, 500);
            startTimer(currentIdx);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === swiper.activeIndex ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1, rel: 0, loop: 1 }
                });
            });
        }

        function startTimer(idx) {
            clearInterval(currentTimer);
            const v = allVideos[idx];
            const badge = document.getElementById('videoTimer');
            
            // Check if already watched or if it's user's own video
            const hasWatched = watchedVids.includes(v?.id);
            if(!v || v.ownerId === uID || hasWatched) { 
                badge.classList.add('hidden'); 
                if(players[idx]?.playVideo) players[idx].playVideo();
                return; 
            }
            
            badge.classList.remove('hidden');
            let sec = 10;
            document.getElementById('timerText').innerText = sec + "s";
            
            currentTimer = setInterval(async () => {
                sec--;
                document.getElementById('timerText').innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer);
                    badge.classList.add('hidden');
                    // Reward
                    const popup = document.createElement('div'); popup.className = 'reward-popup'; popup.innerText = '+$0.0005';
                    document.body.appendChild(popup); setTimeout(() => popup.remove(), 2000);
                    
                    await db.collection("users").doc(uID).update({ 
                        balance: firebase.firestore.FieldValue.increment(0.0005),
                        watchedVids: firebase.firestore.FieldValue.arrayUnion(v.id)
                    });
                    await db.collection("shared_videos").doc(v.id).update({ views: firebase.firestore.FieldValue.increment(1) });
                }
            }, 1000);
            if(players[idx]?.playVideo) players[idx].playVideo();
        }

        async function handleLike(vidId, ownerId, el) {
            const isLiked = myLikes.includes(vidId);
            const p = el.querySelector('p');
            const icon = el.querySelector('span');
            
            // UI Update First (Instant feel)
            if(isLiked) {
                p.innerText = Math.max(0, parseInt(p.innerText) - 1);
                icon.style.filter = "grayscale(1)";
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vidId) });
            } else {
                p.innerText = parseInt(p.innerText) + 1;
                icon.style.filter = "grayscale(0) drop-shadow(0 0 10px #dc2626)";
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vidId) });
                if(ownerId !== uID) {
                    db.collection("users").doc(ownerId).collection("notifs").add({
                        message: `🔥 أعجب @${userName} بمحتواك!`,
                        seen: false, createdAt: new Date()
                    });
                }
            }
        }

        function updateStats() {
            const mine = allVideos.filter(v => v.ownerId === uID);
            let views = 0, likes = 0;
            mine.forEach(v => { views += (v.views || 0); likes += (v.likes || 0); });
            document.getElementById('totalViews').innerText = views;
            document.getElementById('totalLikes').innerText = likes;
            
            const list = document.getElementById('myVideosList');
            list.innerHTML = '';
            mine.forEach(vid => {
                list.innerHTML += `
                    <div class="bg-zinc-900/40 p-4 rounded-3xl border border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <img src="https://img.youtube.com/vi/${vid.videoId}/mqdefault.jpg" class="w-12 h-12 rounded-xl object-cover">
                            <p class="text-[10px] font-black uppercase text-zinc-400">👁️ ${vid.views} | ❤️ ${vid.likes}</p>
                        </div>
                        <button onclick="delVid('${vid.id}')" class="text-red-500 font-bold text-[9px] uppercase tracking-tighter bg-red-500/10 px-3 py-1.5 rounded-lg">إنهاء البث</button>
                    </div>`;
            });
        }

        async function delVid(id) { if(confirm("هل أنت متأكد من إنهاء هذا البث؟")) await db.collection("shared_videos").doc(id).delete(); }

        function renderChart() {
            const ctx = document.getElementById('tradingChart').getContext('2d');
            if(window.chartInstance) window.chartInstance.destroy();
            window.chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5', '6', '7'],
                    datasets: [{ data: [15, 60, 40, 100, 85, 140, 190], borderColor: '#dc2626', tension: 0.4, borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: 'rgba(220, 38, 38, 0.05)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { display: false } } } }
            });
        }

        async function openProfile(id) {
            activeProfileID = id;
            const doc = await db.collection("users").doc(id).get();
            const data = doc.exists ? doc.data() : { name: "مستخدم", img: userImg };
            document.getElementById('uProfName').innerText = data.name;
            document.getElementById('uProfImg').src = data.img || userImg;
            
            const btn = document.getElementById('followBtn');
            if(id === uID) btn.style.display = 'none';
            else {
                btn.style.display = 'block';
                const isFollowing = myFollowing.includes(id);
                btn.innerText = isFollowing ? "إلغاء المتابعة" : "متابعة";
                btn.className = isFollowing ? "flex-1 bg-zinc-800 py-3 rounded-2xl font-black text-xs" : "flex-1 bg-red-600 py-3 rounded-2xl font-black text-xs";
            }
            profileMode = 'my';
            setProfileTab('my');
            switchTab('profile');
        }

        function setProfileTab(m) {
            profileMode = m;
            document.getElementById('tabMyVids').className = `profile-tab flex-1 text-center ${m==='my'?'active':''}`;
            document.getElementById('tabLikedVids').className = `profile-tab flex-1 text-center ${m==='liked'?'active':''}`;
            updateProfileGrid();
        }

        function updateProfileGrid() {
            const grid = document.getElementById('profileGrid'); grid.innerHTML = '';
            let vids = (profileMode === 'my') ? allVideos.filter(v => v.ownerId === activeProfileID) : allVideos.filter(v => (activeProfileID === uID ? myLikes.includes(v.id) : false));
            
            vids.forEach(v => {
                grid.innerHTML += `<div class="aspect-[9/16] bg-zinc-900 border border-black overflow-hidden"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover transition-transform active:scale-110"></div>`;
            });
            document.getElementById('uVidsCount').innerText = vids.length;
        }

        async function toggleFollow() {
            const isFollowing = myFollowing.includes(activeProfileID);
            const userRef = db.collection("users").doc(uID);
            if(isFollowing) { await userRef.update({ following: firebase.firestore.FieldValue.arrayRemove(activeProfileID) }); } 
            else { 
                await userRef.update({ following: firebase.firestore.FieldValue.arrayUnion(activeProfileID) });
                db.collection("users").doc(activeProfileID).collection("notifs").add({
                    message: `👤 بدأ @${userName} بمتابعة قناتك!`,
                    seen: false, createdAt: new Date()
                });
            }
            openProfile(activeProfileID);
        }

        async function handlePublish() {
            const val = document.getElementById('ytInput').value;
            const vidId = val.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(vidId) {
                await db.collection("shared_videos").add({
                    videoId: vidId, ownerId: uID, ownerName: userName,
                    ownerImg: userImg, views: 0, likes: 0, createdAt: new Date()
                });
                document.getElementById('ytInput').value = '';
                alert("تم بدء البث بنجاح! 🚀");
            }
        }

        function loadNotifs() {
            db.collection("users").doc(uID).collection("notifs").orderBy("createdAt", "desc").limit(15).onSnapshot(snap => {
                const list = document.getElementById('notifList');
                list.innerHTML = snap.empty ? '<div class="text-center py-20 text-zinc-700 text-xs font-bold">لا توجد تنبيهات جديدة</div>' : '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="bg-zinc-900/60 p-5 rounded-2xl border-r-4 border-red-600 flex justify-between items-center shadow-lg"><p class="text-xs font-bold text-zinc-300">${d.message}</p></div>`;
                    if(!d.seen) db.collection("users").doc(uID).collection("notifs").doc(doc.id).update({seen: true});
                });
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'profile_self') { openProfile(uID); return; }
            document.getElementById(t + 'Page').classList.add('active-page');
            stopVideos();
            if(t === 'home') startTimer(swiper.activeIndex);
        }

        function stopVideos() { Object.values(players).forEach(p => { if(p.pauseVideo) p.pauseVideo(); }); clearInterval(currentTimer); }
        window.onload = init;
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
