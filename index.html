<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - النسخة النهائية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --primary: #dc2626; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Cairo', sans-serif; 
            color: white; overflow: hidden; 
        }

        /* تنسيق الفيديو ليملأ الشاشة */
        .video-wrapper {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        
        iframe {
            width: 100vw; height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .interaction-layer {
            position: absolute; inset: 0;
            z-index: 10; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 40%);
            pointer-events: none;
        }

        .interactive-element { pointer-events: auto; }

        /* شريط التنقل السفلي */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.9); height: 75px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item { opacity: 0.5; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        /* الصفحة */
        .page {
            position: fixed; inset: 0; background: #000;
            z-index: 500; display: none; flex-direction: column;
            overflow-y: auto; padding-bottom: 90px;
        }
        .active-page { display: flex !important; }

        /* الأوسمة العلوية */
        .top-badge {
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px; padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 8px;
        }

        .notif-dot {
            position: absolute; top: -2px; right: -2px;
            width: 16px; height: 16px; background: #fff;
            color: var(--primary); border-radius: 50%;
            font-size: 10px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--primary);
        }

        .reward-pop {
            position: fixed; top: 40%; left: 50%;
            transform: translateX(-50%); color: #4ade80;
            font-size: 2.5rem; font-weight: 900; z-index: 2000;
            animation: rewardAnim 2s forwards; pointer-events: none;
        }
        @keyframes rewardAnim {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; transform: translate(-50%, -20px); }
            100% { opacity: 0; transform: translate(-50%, -120px); }
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 5000; display: none; padding: 40px 20px;
        }
    </style>
</head>
<body>

    <!-- الجزء العلوي: الرصيد والتنبيهات -->
    <div class="fixed top-12 left-6 right-6 z-[1100] flex justify-between items-center pointer-events-none">
        <div class="top-badge pointer-events-auto">
            <span id="mainBal" class="text-green-500 font-black text-lg">$0.0000</span>
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
        
        <div id="videoTimer" class="top-badge pointer-events-auto hidden !bg-red-600/90 !border-none">
            <span id="timerText" class="text-white font-black text-xs">10s</span>
        </div>

        <div onclick="switchTab('notifs')" class="relative pointer-events-auto cursor-pointer p-2 bg-zinc-900/80 rounded-full">
            <span class="text-xl">🔔</span>
            <div id="notifBadge" class="notif-dot hidden">0</div>
        </div>
    </div>

    <!-- صفحة الفيديوهات -->
    <div id="homePage" class="page active-page !p-0">
        <div class="swiper mySwiper h-full w-full">
            <div class="swiper-wrapper" id="videoWrapper"></div>
        </div>
    </div>

    <!-- صفحة الإحصائيات وبث الفيديو -->
    <div id="statsPage" class="page p-6 pt-28">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic">مركز التحكم 📉</h1>
        </div>
        
        <div class="bg-zinc-900/60 p-8 rounded-[2.5rem] border border-white/5 mb-8">
            <h3 class="text-white font-bold mb-4 text-center">بث فيديو جديد</h3>
            <div class="space-y-4">
                <input id="ytInput" type="text" placeholder="رابط فيديو يوتيوب..." 
                       class="w-full bg-black/50 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 text-center">
                <button onclick="handlePublish()" 
                        class="w-full bg-red-600 py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform">
                    نشر الآن
                </button>
            </div>
        </div>
        
        <h3 class="font-bold mb-4 px-2">فيديوهاتي المسجلة</h3>
        <div id="myVideosList" class="space-y-3"></div>
    </div>

    <!-- صفحة البروفايل -->
    <div id="profilePage" class="page !p-0">
        <div class="pt-24 pb-12 text-center bg-gradient-to-b from-red-900/30 to-black">
            <img id="uProfImg" class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-red-600 object-cover shadow-2xl">
            <h2 id="uProfName" class="text-2xl font-black italic">...</h2>
            
            <div class="flex justify-center gap-10 my-8">
                <div class="text-center">
                    <p id="uVidsCount" class="text-2xl font-black text-red-600">0</p>
                    <p class="text-[10px] text-zinc-500 font-bold">فيديو</p>
                </div>
                <div class="text-center cursor-pointer interactive-element" onclick="openFollowList('followers')">
                    <p id="uFollsCount" class="text-2xl font-black">0</p>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">متابع</p>
                </div>
                <div class="text-center cursor-pointer interactive-element" onclick="openFollowList('following')">
                    <p id="uFollowingCount" class="text-2xl font-black">0</p>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">أتابعه</p>
                </div>
            </div>
            
            <div class="px-10">
                <button id="followBtn" onclick="toggleFollow()" class="w-full bg-white text-black py-3 rounded-2xl font-black text-sm">متابعة</button>
            </div>
        </div>
        
        <div class="flex bg-zinc-900/50 sticky top-0 z-50">
            <div id="tabMyVids" onclick="setProfileTab('my')" class="profile-tab flex-1 text-center active">منشوراتي</div>
            <div id="tabLikedVids" onclick="setProfileTab('liked')" class="profile-tab flex-1 text-center">أعجبني</div>
        </div>
        <div class="grid grid-cols-3 gap-0.5" id="profileGrid"></div>
    </div>

    <!-- صفحة الإشعارات -->
    <div id="notifsPage" class="page p-6 pt-24">
        <div class="flex items-center gap-4 mb-8">
            <div onclick="switchTab('home')" class="bg-zinc-900 p-3 rounded-full cursor-pointer">🔙</div>
            <h2 class="text-3xl font-black italic">الإشعارات 🔔</h2>
        </div>
        <div id="notifList" class="space-y-4"></div>
    </div>

    <!-- نافذة المتابعين -->
    <div id="followModal" class="modal">
        <div class="flex justify-between items-center mb-8">
            <h3 id="modalTitle" class="text-2xl font-black">القائمة</h3>
            <button onclick="closeModal()" class="text-3xl">✕</button>
        </div>
        <div id="modalContent" class="space-y-4"></div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <div id="nav-profile" onclick="switchTab('profile_self')" class="nav-item">👤</div>
        <div id="nav-stats" onclick="switchTab('stats')" class="bg-red-600 w-16 h-12 rounded-2xl flex items-center justify-center font-black text-2xl shadow-xl active:scale-90 transition-transform text-white">+</div>
        <div id="nav-home" onclick="switchTab('home')" class="nav-item active">🏠</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "88583019");
        const userName = tg.initDataUnsafe?.user?.first_name || "عبود";
        const userImg = tg.initDataUnsafe?.user?.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";

        let allVideos = [], swiper, players = {}, currentTimer = null;
        let myLikes = [], watchedVids = [], myFollowing = [], activeProfileID = null;

        async function init() {
            const userRef = db.collection("users").doc(uID);
            const userDoc = await userRef.get();
            if(!userDoc.exists) await userRef.set({ name: userName, img: userImg, balance: 0, likedVids: [], watchedVids: [], following: [], followersCount: 0 });

            userRef.onSnapshot(d => {
                if(d.exists) {
                    const data = d.data();
                    document.getElementById('mainBal').innerText = `$${(data.balance || 0).toFixed(4)}`;
                    myLikes = data.likedVids || [];
                    watchedVids = data.watchedVids || [];
                    myFollowing = data.following || [];
                    document.getElementById('uFollowingCount').innerText = myFollowing.length;
                }
            });

            db.collection("users").doc(uID).collection("notifs").where("seen", "==", false).onSnapshot(snap => {
                const b = document.getElementById('notifBadge');
                if(snap.size > 0) { b.innerText = snap.size; b.classList.remove('hidden'); }
                else { b.classList.add('hidden'); }
            });

            const snap = await db.collection("shared_videos").orderBy("createdAt", "desc").get();
            allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderHome();
            updateStats();
            loadNotifs();
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                const isLiked = myLikes.includes(v.id);
                wrap.innerHTML += `
                    <div class="swiper-slide bg-black overflow-hidden">
                        <div class="video-wrapper"><div id="player-${i}"></div></div>
                        <div class="interaction-layer">
                            <div class="flex justify-between items-end pb-8">
                                <div class="flex-1 text-right pl-20 pointer-events-none">
                                    <h3 class="text-xl font-black drop-shadow-lg">@${v.ownerName}</h3>
                                    <p class="text-sm opacity-80 mt-1 line-clamp-2">شكراً لمشاهدة هذا الفيديو ودعم المحتوى العربي ❤️</p>
                                </div>
                                <div class="flex flex-col items-center gap-6 pb-2">
                                    <div class="interactive-element relative">
                                        <img src="${v.ownerImg}" class="w-14 h-14 rounded-full border-2 border-red-600 object-cover shadow-lg" onclick="openProfile('${v.ownerId}')">
                                        <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-red-600 rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold">+</div>
                                    </div>
                                    <div onclick="handleLike('${v.id}', '${v.ownerId}', this)" class="interactive-element text-center cursor-pointer">
                                        <span id="heart-${v.id}" class="text-4xl transition-all" style="filter: ${isLiked ? 'grayscale(0) drop-shadow(0 0 10px #dc2626)' : 'grayscale(1)'}">❤️</span>
                                        <p id="count-${v.id}" class="text-sm font-black mt-1">${v.likes || 0}</p>
                                    </div>
                                    <div class="interactive-element text-3xl">💬</div>
                                    <div class="interactive-element text-3xl">🚀</div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", 
                on: { slideChange: () => { stopAll(); playIdx(swiper.activeIndex); } } 
            });
            setTimeout(initPlayers, 500);
            playIdx(0);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1, rel: 0, showinfo: 0 },
                    events: { 'onStateChange': (e) => { if(e.data == 1 && i == swiper.activeIndex) startTimer(i); } }
                });
            });
        }

        function playIdx(idx) {
            if(players[idx]?.playVideo) players[idx].playVideo();
        }

        function stopAll() {
            Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo());
            clearInterval(currentTimer);
            document.getElementById('videoTimer').classList.add('hidden');
        }

        function startTimer(idx) {
            clearInterval(currentTimer);
            const v = allVideos[idx];
            const badge = document.getElementById('videoTimer');
            if(!v || v.ownerId === uID || watchedVids.includes(v.id)) { badge.classList.add('hidden'); return; }
            
            badge.classList.remove('hidden');
            let sec = 10;
            document.getElementById('timerText').innerText = sec + "s";
            currentTimer = setInterval(async () => {
                sec--;
                document.getElementById('timerText').innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer);
                    badge.classList.add('hidden');
                    showReward();
                    await db.collection("users").doc(uID).update({ 
                        balance: firebase.firestore.FieldValue.increment(0.0005),
                        watchedVids: firebase.firestore.FieldValue.arrayUnion(v.id)
                    });
                }
            }, 1000);
        }

        async function handleLike(vidId, ownerId, el) {
            const isLiked = myLikes.includes(vidId);
            const heart = document.getElementById(`heart-${vidId}`);
            const countText = document.getElementById(`count-${vidId}`);
            let count = parseInt(countText.innerText);

            if(isLiked) {
                heart.style.filter = "grayscale(1)";
                countText.innerText = Math.max(0, count - 1);
                myLikes = myLikes.filter(id => id !== vidId);
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vidId) });
            } else {
                heart.style.filter = "grayscale(0) drop-shadow(0 0 10px #dc2626)";
                countText.innerText = count + 1;
                myLikes.push(vidId);
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vidId) });
                if(ownerId !== uID) {
                    db.collection("users").doc(ownerId).collection("notifs").add({ 
                        message: `❤️ أعجب @${userName} بفيديوهك!`, 
                        img: userImg, seen: false, createdAt: new Date() 
                    });
                }
            }
        }

        async function openProfile(id) {
            activeProfileID = id;
            const d = await db.collection("users").doc(id).get();
            const data = d.data() || { name: "مجهول", img: userImg, followersCount: 0 };
            document.getElementById('uProfName').innerText = data.name;
            document.getElementById('uProfImg').src = data.img;
            document.getElementById('uFollsCount').innerText = data.followersCount || 0;
            
            const b = document.getElementById('followBtn');
            b.style.display = (id === uID) ? 'none' : 'block';
            b.innerText = myFollowing.includes(id) ? "إلغاء المتابعة" : "متابعة";
            
            setProfileTab('my');
            switchTab('profile');
        }

        function setProfileTab(m) {
            document.getElementById('tabMyVids').className = `profile-tab flex-1 text-center py-4 font-bold ${m==='my'?'active border-b-2 border-red-600 text-red-600':''}`;
            document.getElementById('tabLikedVids').className = `profile-tab flex-1 text-center py-4 font-bold ${m==='liked'?'active border-b-2 border-red-600 text-red-600':''}`;
            const grid = document.getElementById('profileGrid'); grid.innerHTML = '';
            const vids = (m === 'my') ? allVideos.filter(v => v.ownerId === activeProfileID) : allVideos.filter(v => myLikes.includes(v.id));
            vids.forEach(v => {
                const gIdx = allVideos.findIndex(av => av.id === v.id);
                grid.innerHTML += `<div class="aspect-[9/16] bg-zinc-900 overflow-hidden cursor-pointer" onclick="goToVid(${gIdx})"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`;
            });
            document.getElementById('uVidsCount').innerText = vids.length;
        }

        function goToVid(idx) { switchTab('home'); swiper.slideTo(idx); }

        async function toggleFollow() {
            const isF = myFollowing.includes(activeProfileID);
            const uRef = db.collection("users").doc(uID);
            const tRef = db.collection("users").doc(activeProfileID);
            if(isF) {
                await uRef.update({ following: firebase.firestore.FieldValue.arrayRemove(activeProfileID) });
                await tRef.update({ followersCount: firebase.firestore.FieldValue.increment(-1) });
            } else {
                await uRef.update({ following: firebase.firestore.FieldValue.arrayUnion(activeProfileID) });
                await tRef.update({ followersCount: firebase.firestore.FieldValue.increment(1) });
                db.collection("users").doc(activeProfileID).collection("notifs").add({ 
                    message: `👤 بدأ @${userName} بمتابعتك!`, 
                    img: userImg, seen: false, createdAt: new Date() 
                });
            }
            openProfile(activeProfileID);
        }

        async function openFollowList(type) {
            const modal = document.getElementById('followModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            modal.style.display = 'block';
            content.innerHTML = '<p class="text-center py-4">جاري التحميل...</p>';
            
            if(type === 'following') {
                title.innerText = "أتابعهم";
                content.innerHTML = '';
                for(let id of myFollowing) {
                    const d = await db.collection("users").doc(id).get();
                    if(d.exists) {
                        content.innerHTML += `
                            <div class="flex items-center justify-between bg-zinc-900 p-4 rounded-[1.5rem]" onclick="closeModal(); openProfile('${id}')">
                                <div class="flex items-center gap-4">
                                    <img src="${d.data().img}" class="w-12 h-12 rounded-full object-cover"> 
                                    <p class="font-bold">@${d.data().name}</p>
                                </div>
                                <div class="text-red-500">👤</div>
                            </div>`;
                    }
                }
            }
        }

        function closeModal() { document.getElementById('followModal').style.display = 'none'; }
        function showReward() { const p = document.createElement('div'); p.className='reward-pop'; p.innerText='+$0.0005'; document.body.appendChild(p); setTimeout(()=>p.remove(),2000); }

        async function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if(t === 'profile_self') { openProfile(uID); document.getElementById('nav-profile').classList.add('active'); }
            else if(t === 'stats') { document.getElementById('statsPage').classList.add('active-page'); document.getElementById('nav-stats').classList.add('active'); }
            else if(t === 'home') { document.getElementById('homePage').classList.add('active-page'); document.getElementById('nav-home').classList.add('active'); }
            else { document.getElementById(t + 'Page').classList.add('active-page'); }

            if(t === 'notifs') { 
                const b = db.batch();
                const s = await db.collection("users").doc(uID).collection("notifs").where("seen","==",false).get();
                s.forEach(doc => b.update(doc.ref, {seen: true}));
                await b.commit();
            }
            
            stopAll();
            if(t === 'home') playIdx(swiper.activeIndex);
        }

        function loadNotifs() {
            db.collection("users").doc(uID).collection("notifs").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('notifList');
                list.innerHTML = snap.empty ? '<div class="text-center py-20 opacity-30">لا توجد إشعارات حالياً</div>' : '';
                snap.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="bg-zinc-900/60 p-5 rounded-[2rem] border border-white/5 flex items-center gap-4">
                            <img src="${data.img || userImg}" class="w-12 h-12 rounded-full object-cover border border-red-600">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-white">${data.message}</p>
                                <p class="text-[10px] text-zinc-500 mt-1">${new Date(data.createdAt?.toDate()).toLocaleTimeString('ar-EG')}</p>
                            </div>
                        </div>`;
                });
            });
        }

        async function handlePublish() {
            const v = document.getElementById('ytInput').value;
            const id = v.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(id) {
                await db.collection("shared_videos").add({ videoId: id, ownerId: uID, ownerName: userName, ownerImg: userImg, likes: 0, views: 0, createdAt: new Date() });
                document.getElementById('ytInput').value = '';
                alert("تم البث بنجاح!");
                switchTab('home');
            }
        }

        function updateStats() {
            const mine = allVideos.filter(v => v.ownerId === uID);
            const list = document.getElementById('myVideosList'); list.innerHTML = '';
            mine.forEach(v => {
                list.innerHTML += `
                    <div class="bg-zinc-900/80 p-4 rounded-3xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-3">
                            <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-16 h-10 rounded-xl object-cover">
                            <div><p class="text-[10px] font-bold">معرف: ${v.videoId}</p><p class="text-[10px] text-red-500">❤️ ${v.likes} إعجاب</p></div>
                        </div>
                        <button onclick="db.collection('shared_videos').doc('${v.id}').delete()" class="bg-red-900/20 text-red-500 px-4 py-2 rounded-xl text-xs font-bold">حذف</button>
                    </div>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
