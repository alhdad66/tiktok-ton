<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fogrener - Working Version</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        .swiper { height: 100vh; width: 100vw; }
        .video-slide { position: relative; height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        
        /* مشغل يوتيوب بحجم مناسب */
        iframe { width: 100%; height: 50vh; border: none; z-index: 10; }

        /* الأزرار العلوية */
        .header-ui { position: fixed; top: 30px; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-between; padding: 0 15px; pointer-events: none; }
        .chip { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }

        /* الأزرار الجانبية */
        .side-ui { position: absolute; right: 15px; bottom: 120px; z-index: 1000; display: flex; flex-direction: column; gap: 20px; text-align: center; }
        .icon-btn { font-size: 32px; cursor: pointer; text-shadow: 0 0 10px #000; }
        .liked { color: #fe2c55; }

        /* شريط التنقل السفلي */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .tab-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #555; font-weight: bold; }
        .tab-item.active { color: #fff; }
        
        .upload-btn { background: #fff; width: 45px; height: 28px; border-radius: 7px; color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; position: relative; }
        .upload-btn::before { content: ''; position: absolute; left: -4px; width: 10px; height: 100%; background: #25f4ee; border-radius: 7px; z-index: -1; }
        .upload-btn::after { content: ''; position: absolute; right: -4px; width: 10px; height: 100%; background: #fe2c55; border-radius: 7px; z-index: -1; }

        /* الصفحات */
        .full-page { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 20px; }
        .full-page.show { display: flex; }
        
        .balance-text { color: #4ade80; font-weight: 900; }
    </style>
</head>
<body>

    <!-- القائمة العلوية -->
    <div class="header-ui">
        <div class="chip text-2xl" onclick="alert('أهلاً بك في فقرينر!')">🔔</div>
        <div class="chip balance-text" onclick="showP('wallet')">
            <span id="h-bal">0.0000</span> 💰
        </div>
    </div>

    <!-- الفيديوهات -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="feed-items">
            <!-- الفيديوهات هنا -->
        </div>
    </div>

    <!-- الشريط السفلي -->
    <div class="tab-bar">
        <div class="tab-item active" id="t-home" onclick="hideP()"><span>🏠</span><span>الرئيسية</span></div>
        <div class="tab-item" id="t-friends" onclick="showP('friends')"><span>👥</span><span>الأصدقاء</span></div>
        <div class="upload-btn" onclick="showP('add')">+</div>
        <div class="tab-item" id="t-wallet" onclick="showP('wallet')"><span>📊</span><span>الأرباح</span></div>
        <div class="tab-item" id="t-profile" onclick="showP('profile')"><span>👤</span><span>الملف</span></div>
    </div>

    <!-- صفحة الأصدقاء -->
    <div id="p-friends" class="full-page">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">دعوة الأصدقاء</h2>
            <button class="text-3xl" onclick="hideP()">✕</button>
        </div>
        <div class="bg-zinc-900 p-6 rounded-2xl text-center">
            <p class="text-gray-400 mb-4">انسخ رابطك واربح 0.10$ عن كل صديق</p>
            <div id="share-link" class="bg-black p-4 rounded-lg text-blue-400 text-xs break-all mb-4">...</div>
            <button onclick="copyL()" class="w-full bg-[#fe2c55] py-4 rounded-xl font-black">نسخ الرابط</button>
        </div>
    </div>

    <!-- صفحة الأرباح -->
    <div id="p-wallet" class="full-page">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">أرباحي</h2>
            <button class="text-3xl" onclick="hideP()">✕</button>
        </div>
        <div class="bg-zinc-900 p-10 rounded-2xl text-center">
            <p class="text-gray-500 mb-2">الرصيد الكلي</p>
            <h1 class="text-5xl font-black text-green-400 mb-8" id="w-bal">$0.0000</h1>
            <button class="w-full bg-white text-black py-4 rounded-xl font-black" onclick="alert('الحد الأدنى للسحب 10$')">سحب الرصيد</button>
        </div>
    </div>

    <!-- صفحة الإضافة -->
    <div id="p-add" class="full-page">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">نشر فيديو</h2>
            <button class="text-3xl" onclick="hideP()">✕</button>
        </div>
        <div class="bg-zinc-900 p-6 rounded-2xl">
            <input type="text" id="yt-url" placeholder="ضع رابط يوتيوب هنا..." class="w-full bg-black p-4 rounded-xl mb-4 border border-zinc-800">
            <button onclick="saveV()" class="w-full bg-[#fe2c55] py-4 rounded-xl font-black">نشر الآن</button>
        </div>
    </div>

    <!-- صفحة الملف -->
    <div id="p-profile" class="full-page">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">ملفي الشخصي</h2>
            <button class="text-3xl" onclick="hideP()">✕</button>
        </div>
        <div class="flex items-center gap-4 mb-4">
            <div id="u-avatar" class="w-16 h-16 rounded-full bg-zinc-800"></div>
            <div>
                <h3 id="u-name" class="font-bold">...</h3>
                <p id="u-id" class="text-xs text-gray-600 font-mono"></p>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const tg = window.Telegram.WebApp;
        tg.expand();

        let user = null, swiper, players = {}, videos = [], likedIds = [];

        // دخول
        async function start() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }
        }

        auth.onAuthStateChanged(u => {
            if (u) {
                user = u;
                syncUser();
                getVideos();
                document.getElementById('share-link').innerText = `https://t.me/FogrenerBot?start=${u.uid}`;
            }
        });

        function syncUser() {
            const path = `/artifacts/${appId}/users/${user.uid}/profile/vFinalWork`;
            db.doc(path).onSnapshot(doc => {
                if (doc.exists) {
                    const d = doc.data();
                    const b = (d.balance || 0).toFixed(4);
                    document.getElementById('h-bal').innerText = b;
                    document.getElementById('w-bal').innerText = `$${b}`;
                    likedIds = d.likedVideos || [];
                    document.getElementById('u-name').innerText = tg.initDataUnsafe?.user?.first_name || "Guest";
                    document.getElementById('u-id').innerText = user.uid;
                    document.getElementById('u-avatar').innerHTML = `<img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${user.uid}" class="w-full h-full rounded-full">`;
                } else {
                    db.doc(path).set({ balance: 0, likedVideos: [] });
                }
            });
        }

        async function getVideos() {
            const snap = await db.collection(`/artifacts/${appId}/public/data/vFinalWork_Vids`).get();
            videos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            const feed = document.getElementById('feed-items');
            if (videos.length === 0) {
                feed.innerHTML = `<div class="swiper-slide flex items-center justify-center text-gray-500">انشر فيديو لتبدأ!</div>`;
                return;
            }

            feed.innerHTML = videos.map((v, i) => `
                <div class="swiper-slide">
                    <div class="video-slide">
                        <div id="player-${i}"></div>
                        <div class="side-ui">
                            <div class="icon-btn ${likedIds.includes(v.id) ? 'liked' : ''}" onclick="doLike('${v.id}')">❤️</div>
                            <div class="text-xs font-bold" id="c-${v.id}">${v.likes || 0}</div>
                            <div class="icon-btn mt-4" onclick="alert('انسخ رابط تليجرام لنشره!')">🚀</div>
                        </div>
                        <div class="absolute bottom-[90px] left-5 pointer-events-none">
                            <h3 class="font-black text-xl shadow-lg">@${v.author}</h3>
                        </div>
                    </div>
                </div>
            `).join('');

            initS();
        }

        function initS() {
            swiper = new Swiper(".mySwiper", {
                direction: "vertical",
                on: { slideChange: () => { stopAll(); play(swiper.activeIndex); } }
            });
            videos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 0, controls: 0, modestbranding: 1, playsinline: 1, loop: 1 },
                    events: { 'onStateChange': (e) => earn(e) }
                });
            });
            setTimeout(() => play(0), 1000);
        }

        let profitInterval = null;
        function earn(e) {
            if (e.data === YT.PlayerState.PLAYING) {
                profitInterval = setInterval(() => {
                    db.doc(`/artifacts/${appId}/users/${user.uid}/profile/vFinalWork`).update({ balance: firebase.firestore.FieldValue.increment(0.0001) });
                }, 5000);
            } else { clearInterval(profitInterval); }
        }

        async function doLike(id) {
            const uRef = db.doc(`/artifacts/${appId}/users/${user.uid}/profile/vFinalWork`);
            const vRef = db.doc(`/artifacts/${appId}/public/data/vFinalWork_Vids/${id}`);
            const isL = likedIds.includes(id);
            if (isL) {
                await uRef.update({ likedVideos: firebase.firestore.FieldValue.arrayRemove(id) });
                await vRef.update({ likes: firebase.firestore.FieldValue.increment(-1) });
            } else {
                await uRef.update({ likedVideos: firebase.firestore.FieldValue.arrayUnion(id) });
                await vRef.update({ likes: firebase.firestore.FieldValue.increment(1) });
            }
            tg.HapticFeedback.impactOccurred('medium');
            getVideos();
        }

        async function saveV() {
            const url = document.getElementById('yt-url').value;
            const vid = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if (!vid) return alert("الرابط خطأ");
            await db.collection(`/artifacts/${appId}/public/data/vFinalWork_Vids`).add({
                videoId: vid, author: tg.initDataUnsafe?.user?.first_name || "Guest", likes: 0
            });
            location.reload();
        }

        function play(i) { players[i]?.playVideo?.(); }
        function stopAll() { Object.values(players).forEach(p => p.pauseVideo?.()); clearInterval(profitInterval); }
        
        function showP(id) {
            stopAll();
            document.querySelectorAll('.full-page').forEach(p => p.classList.remove('show'));
            document.getElementById(`p-${id}`).classList.add('show');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(`t-${id}`).classList.add('active');
        }

        function hideP() {
            document.querySelectorAll('.full-page').forEach(p => p.classList.remove('show'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('t-home').classList.add('active');
            if(swiper) play(swiper.activeIndex);
        }

        function copyL() {
            const t = document.getElementById('share-link').innerText;
            const el = document.createElement('textarea'); el.value = t;
            document.body.appendChild(el); el.select(); document.execCommand('copy');
            document.body.removeChild(el); alert("تم النسخ!");
        }

        window.onload = start;
    </script>
</body>
</html>
