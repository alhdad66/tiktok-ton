<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - عبود برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 10000; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: flex !important; }
        .timer-badge { position: absolute; top: 110px; left: 20px; background: #dc2626; padding: 8px 15px; border-radius: 50px; z-index: 1000; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #dc2626; font-size: 10px; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #dc2626; }
        .profile-tab { border-bottom: 3px solid transparent; opacity: 0.4; padding: 12px 0; transition: 0.3s; cursor: pointer; font-weight: 900; font-size: 0.85rem; }
        .profile-tab.active { border-bottom: 3px solid #dc2626; opacity: 1; color: #dc2626; }
        .reward-popup { position: fixed; left: 50%; top: 50%; color: #4ade80; font-weight: 900; font-size: 2.5rem; z-index: 20000; pointer-events: none; animation: floatUp 2s forwards; }
        @keyframes floatUp { 0% { opacity:0; transform: translate(-50%, 20px); } 20% { opacity:1; transform: translate(-50%, -20px); } 100% { opacity:0; transform: translate(-50%, -120px); } }
        .yt-frame-container { position: relative; width: 100%; height: 100%; }
        .yt-frame-container iframe { width: 100%; height: 100%; pointer-events: none; }
        .admin-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 10px; }
        .task-card { background: linear-gradient(145deg, #111, #050505); border: 1px solid #222; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .banned-screen { position: fixed; inset: 0; background: black; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; p: 20px; }
    </style>
</head>
<body>

    <!-- Banned Screen -->
    <div id="bannedScreen" class="banned-screen hidden">
        <h1 class="text-6xl mb-4">🚫</h1>
        <h2 class="text-3xl font-black text-red-600 mb-2">لقد تم حظرك!</h2>
        <p class="text-zinc-500 font-bold">حسابك منتهك لقوانين المنصة ولا يمكنك الدخول.</p>
    </div>

    <!-- Header -->
    <div class="fixed top-8 left-6 right-6 z-[11000] flex justify-between items-center pointer-events-none">
        <div class="bg-zinc-900/95 px-5 py-2.5 rounded-full border border-white/5 pointer-events-auto flex items-center gap-3 shadow-xl">
            <span id="mainBal" class="text-red-500 font-black text-lg">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_#dc2626]"></div>
        </div>
        <div class="flex gap-2 pointer-events-auto">
            <div id="adminBtn" onclick="switchTab('admin')" class="hidden bg-zinc-900/95 p-3 rounded-full border border-white/5 cursor-pointer shadow-lg active:scale-95 transition-transform">
                <span class="text-xl">👑</span>
            </div>
        </div>
    </div>

    <!-- Pages -->
    <div id="homePage" class="page active-page !p-0">
        <div id="videoTimer" class="timer-badge hidden">
            <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
            <span id="timerText" class="font-black text-xs text-white">10s</span>
        </div>
        <div class="swiper mySwiper"><div class="swiper-wrapper" id="videoWrapper"></div></div>
    </div>

    <div id="tasksPage" class="page p-6 pt-24">
        <h2 class="text-3xl font-black mb-8 italic">المهام المتاحة 📋</h2>
        <div id="userTasksList" class="space-y-3 pb-10"></div>
    </div>

    <div id="statsPage" class="page p-6 pt-24 text-right">
        <h2 class="text-2xl font-black italic mb-6">نشر وإحصائيات 📊</h2>
        <div class="bg-red-600/5 p-6 rounded-[2.5rem] border border-red-600/20 mb-6">
            <input id="ytInput" type="text" placeholder="رابط فيديو يوتيوب..." class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-xs outline-none focus:border-red-600 text-right mb-3">
            <button onclick="handlePublish()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-sm">نشر الفيديو</button>
        </div>
        <div id="myVideosList" class="space-y-3 pb-10"></div>
    </div>

    <div id="profilePage" class="page !p-0">
        <div class="pt-24 pb-10 text-center bg-gradient-to-b from-red-900/20 to-black">
            <div class="w-24 h-24 mx-auto mb-4 border-2 border-red-600 rounded-full bg-zinc-900 overflow-hidden">
                <img id="uProfImg" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="uProfName" class="text-2xl font-black">...</h2>
            <div class="px-10 mt-6 space-y-3">
                <button id="withdrawBtn" onclick="openWithdrawModal()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs hidden">سحب الأرباح 💸</button>
                <button id="followBtn" onclick="toggleFollow()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-xs">متابعة</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-0.5 mt-0.5 pb-20" id="profileGrid"></div>
    </div>

    <!-- Admin Page -->
    <div id="adminPage" class="page p-6 pt-24 text-right">
        <h2 class="text-2xl font-black mb-6 text-red-600">لوحة التحكم 👑</h2>
        
        <!-- إعدادات المنصة -->
        <div class="bg-zinc-900/40 p-5 rounded-3xl border border-white/5 mb-6">
            <h3 class="text-sm font-black mb-4">⚙️ إعدادات السحب</h3>
            <div class="space-y-3">
                <input id="adminMinWithdraw" type="number" placeholder="الحد الأدنى للسحب" class="w-full bg-black border border-white/10 p-3 rounded-xl text-xs text-right">
                <input id="adminWithdrawMethod" type="text" placeholder="طريقة السحب (مثلاً: Binance)" class="w-full bg-black border border-white/10 p-3 rounded-xl text-xs text-right">
                <input id="adminPlatformImage" type="text" placeholder="رابط شعار المنصة" class="w-full bg-black border border-white/10 p-3 rounded-xl text-xs text-right" dir="ltr">
                <button onclick="updatePlatformSettings()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs">حفظ الإعدادات</button>
            </div>
        </div>

        <div id="adminWithdrawalsList" class="space-y-3 mb-6"></div>
        <div id="adminUsersList" class="space-y-3"></div>
    </div>

    <!-- Modals -->
    <div id="withdrawModal" class="fixed inset-0 bg-black/95 z-[30000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10 text-right">
            <img id="platformLogo" src="" class="h-8 mx-auto mb-4 object-contain">
            <h3 class="text-xl font-black mb-2 text-center">طلب سحب جديد</h3>
            <p id="withdrawHint" class="text-[10px] text-zinc-500 mb-6 text-center">الحد الأدنى للسحب: 10$</p>
            
            <input id="withdrawAmount" type="number" placeholder="أدخل المبلغ المطلوب" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-3 text-right">
            <input id="withdrawWallet" type="text" placeholder="عنوان المحفظة / الرقم" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs mb-6 text-right">
            
            <div class="flex gap-2">
                <button onclick="closeWithdrawModal()" class="flex-1 bg-zinc-800 py-4 rounded-2xl font-black text-xs">إلغاء</button>
                <button onclick="submitWithdraw()" class="flex-1 bg-red-600 py-4 rounded-2xl font-black text-xs">تأكيد الطلب</button>
            </div>
        </div>
    </div>

    <!-- Nav -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl opacity-40 hover:opacity-100 p-2 cursor-pointer">🏠</div>
        <div onclick="switchTab('tasks')" class="text-2xl opacity-40 hover:opacity-100 p-2 cursor-pointer">📋</div>
        <div onclick="switchTab('stats')" class="bg-red-600 w-14 h-10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg">+</div>
        <div onclick="switchTab('profile_self')" class="text-2xl opacity-40 hover:opacity-100 p-2 cursor-pointer">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // Firebase Config
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const uID = String(tg.initDataUnsafe?.user?.id || "7416599626"); 
        const userName = tg.initDataUnsafe?.user?.first_name || "User";
        const adminID = "7416599626";

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer = null;
        let platformSettings = { minWithdraw: 10, method: "Binance", logo: "https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.png" };

        async function init() {
            // Load Platform Settings
            db.collection("settings").doc("platform").onSnapshot(doc => {
                if(doc.exists) {
                    platformSettings = doc.data();
                    updateWithdrawUI();
                }
            });

            // Load User Data
            const userRef = db.collection("users").doc(uID);
            userRef.onSnapshot(d => {
                if(d.exists) {
                    const data = d.data();
                    if(data.isBanned) { document.getElementById('bannedScreen').classList.remove('hidden'); return; }
                    balance = data.balance || 0;
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                } else {
                    userRef.set({ name: userName, balance: 0.0, isBanned: false, createdAt: new Date() });
                }
            });

            if(uID === adminID) {
                document.getElementById('adminBtn').classList.remove('hidden');
                loadWithdrawalsForAdmin();
            }

            // Load Videos
            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderHome();
            });
        }

        function updateWithdrawUI() {
            document.getElementById('platformLogo').src = platformSettings.logo;
            document.getElementById('withdrawHint').innerText = `الحد الأدنى للسحب هو ${platformSettings.minWithdraw}$ عبر ${platformSettings.method}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(tab + (tab === 'profile_self' ? '' : 'Page'))?.classList.add('active-page');
            if(tab === 'profile_self') openProfile(uID);
            if(tab !== 'home') stopVideos(); else startTimerProcess(swiper?.activeIndex || 0);
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            if (!wrap) return;
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                wrap.innerHTML += `
                    <div class="swiper-slide relative bg-black">
                        <div class="yt-frame-container"><div id="player-${i}"></div></div>
                        <div class="absolute right-5 bottom-36 z-50 text-center">
                            <img src="https://i.ibb.co/vz6V0vD/default-user.png" class="w-12 h-12 rounded-full border-2 border-red-600 mb-4" onclick="openProfile('${v.ownerId}')">
                            <div class="text-2xl">❤️</div>
                            <p class="text-xs font-bold">${v.likes || 0}</p>
                        </div>
                    </div>`;
            });

            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", 
                on: { 
                    slideChange: () => { 
                        stopVideos(); 
                        const idx = swiper.activeIndex;
                        if(players[idx]) players[idx].playVideo();
                    } 
                } 
            });
            initPlayers();
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                if (window.YT && YT.Player) {
                    players[i] = new YT.Player(`player-${i}`, {
                        videoId: v.videoId,
                        playerVars: { autoplay: i === 0 ? 1 : 0, controls: 0, modestbranding: 1, playsinline: 1, rel: 0 },
                        events: { 'onStateChange': (e) => { if(e.data == 1 && i == swiper.activeIndex) startCountdown(i); } }
                    });
                }
            });
        }

        function startCountdown(idx) {
            clearInterval(currentTimer);
            const badge = document.getElementById('videoTimer');
            badge.classList.remove('hidden');
            let sec = 10;
            currentTimer = setInterval(async () => {
                sec--;
                document.getElementById('timerText').innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer);
                    badge.classList.add('hidden');
                    db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(0.001) });
                }
            }, 1000);
        }

        function stopVideos() {
            Object.values(players).forEach(p => { if(p && p.pauseVideo) p.pauseVideo(); });
            clearInterval(currentTimer);
            document.getElementById('videoTimer').classList.add('hidden');
        }

        // Withdrawal Functions
        function openWithdrawModal() { document.getElementById('withdrawModal').classList.remove('hidden'); }
        function closeWithdrawModal() { document.getElementById('withdrawModal').classList.add('hidden'); }

        async function submitWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const wallet = document.getElementById('withdrawWallet').value;

            if(!amount || amount < platformSettings.minWithdraw) return alert(`الحد الأدنى هو ${platformSettings.minWithdraw}$`);
            if(amount > balance) return alert("رصيدك غير كافٍ");
            if(!wallet) return alert("يرجى إدخال عنوان المحفظة");

            await db.collection("withdrawals").add({
                uID, userName, amount, wallet, method: platformSettings.method, status: 'pending', createdAt: new Date()
            });
            await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(-amount) });
            
            alert("تم إرسال الطلب بنجاح!");
            closeWithdrawModal();
        }

        // Admin Settings
        async function updatePlatformSettings() {
            const min = parseFloat(document.getElementById('adminMinWithdraw').value);
            const method = document.getElementById('adminWithdrawMethod').value;
            const logo = document.getElementById('adminPlatformImage').value;
            await db.collection("settings").doc("platform").set({ minWithdraw: min, method, logo });
            alert("تم الحفظ!");
        }

        function loadWithdrawalsForAdmin() {
            db.collection("withdrawals").where("status", "==", "pending").onSnapshot(snap => {
                const list = document.getElementById('adminWithdrawalsList');
                list.innerHTML = '<h3 class="text-xs font-bold mb-2">طلبات السحب:</h3>';
                snap.forEach(doc => {
                    const w = doc.data();
                    list.innerHTML += `
                        <div class="bg-zinc-900 p-4 rounded-xl border border-white/10 text-xs">
                            <p>المستخدم: ${w.userName}</p>
                            <p class="text-green-500">المبلغ: $${w.amount}</p>
                            <p class="text-zinc-500">العنوان: ${w.wallet}</p>
                            <div class="flex gap-2 mt-3">
                                <button onclick="actionWithdraw('${doc.id}', 'completed')" class="bg-green-600 px-3 py-1 rounded-lg">تم الدفع</button>
                                <button onclick="actionWithdraw('${doc.id}', 'rejected', ${w.amount}, '${w.uID}')" class="bg-zinc-800 px-3 py-1 rounded-lg">رفض</button>
                            </div>
                        </div>`;
                });
            });
        }

        async function actionWithdraw(id, status, amt=0, uid=null) {
            if(status === 'rejected') await db.collection("users").doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amt) });
            await db.collection("withdrawals").doc(id).update({ status });
        }

        async function openProfile(id) {
            activeProfileID = id;
            const doc = await db.collection("users").doc(id).get();
            const data = doc.data();
            document.getElementById('uProfName').innerText = data.name;
            document.getElementById('uProfImg').src = data.img || 'https://i.ibb.co/vz6V0vD/default-user.png';
            document.getElementById('withdrawBtn').classList.toggle('hidden', id !== uID);
            switchTab('profile');
        }

        async function handlePublish() {
            const val = document.getElementById('ytInput').value;
            const vidId = val.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(vidId) { 
                await db.collection("shared_videos").add({ videoId: vidId, ownerId: uID, ownerName: userName, likes: 0, createdAt: new Date() });
                alert("تم النشر!");
            }
        }

        function onYouTubeIframeAPIReady() { init(); }
    </script>
</body>
</html>
