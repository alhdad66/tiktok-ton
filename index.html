<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fogrener - Official App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        .loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tiktok-loader { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid #fe2c55; border-left: 3px solid #25f4ee; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #666; font-size: 10px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item.active { color: #fff; transform: scale(1.1); }

        .video-player-container { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; pointer-events: none; }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loader" class="loading-screen">
        <div class="tiktok-loader mb-6"></div>
        <h1 class="text-2xl font-black tracking-tighter italic text-white">FOGRENER</h1>
        <p id="loader-msg" class="text-zinc-600 text-[10px] mt-4 uppercase tracking-[4px]">Connecting to server...</p>
    </div>

    <!-- التطبيق -->
    <div id="app" class="h-screen w-screen opacity-0 transition-opacity duration-1000 relative">
        
        <!-- Header Stats -->
        <div class="fixed top-12 left-0 right-0 px-6 flex justify-between items-center z-[500]">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-zinc-900/60 backdrop-blur rounded-lg flex items-center justify-center border border-white/5" onclick="location.reload()">
                    <span class="text-xs">🔄</span>
                </div>
            </div>
            <div class="bg-zinc-900/60 backdrop-blur-xl px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                <span class="text-green-400 font-black text-sm" id="bal-text">0.0000</span>
                <span class="text-xs opacity-50">💰</span>
            </div>
        </div>

        <!-- Feed Area -->
        <div class="swiper mySwiper h-full w-full">
            <div class="swiper-wrapper" id="feed-wrapper"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="nav-bar">
            <div class="nav-item active">
                <span class="text-xl">🏠</span>
                <span class="mt-1">الرئيسية</span>
            </div>
            <div class="nav-item" onclick="alert('المهام قادمة قريباً!')">
                <span class="text-xl">⚡</span>
                <span class="mt-1">المهمات</span>
            </div>
            <div class="nav-item">
                <div class="w-11 h-8 bg-white rounded-lg flex items-center justify-center text-black text-xl font-bold">+</div>
            </div>
            <div class="nav-item" onclick="alert('المحفظة قريباً')">
                <span class="text-xl">💰</span>
                <span class="mt-1">الأرباح</span>
            </div>
            <div class="nav-item" onclick="alert('الملف الشخصي قريباً')">
                <span class="text-xl">👤</span>
                <span class="mt-1">الملف</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function initApp() {
            try {
                // Telegram expand
                if(window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand();
                }

                // Auth
                await firebase.auth().signInAnonymously();

                // Get Videos - نستخدم المسار التلقائي shared_videos
                db.collection("shared_videos").get().then(snap => {
                    if (snap.empty) {
                        document.getElementById('loader-msg').innerText = "EMPTY FEED - ADD VIDEOS IN FIREBASE";
                        // إظهار واجهة فارغة بدل البقاء في اللودر
                        render([]);
                    } else {
                        render(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }
                }).catch(err => {
                    document.getElementById('loader-msg').innerText = "DB ERROR: " + err.message;
                });

            } catch (e) {
                document.getElementById('loader-msg').innerText = "SYSTEM ERROR";
            }
        }

        function render(vids) {
            const wrapper = document.getElementById('feed-wrapper');
            
            if(vids.length === 0) {
                wrapper.innerHTML = `
                    <div class="swiper-slide bg-black flex items-center justify-center text-zinc-700 text-center p-10">
                        <div>
                            <div class="text-6xl mb-4 text-zinc-800">📭</div>
                            <h2 class="text-lg font-bold">لا توجد فيديوهات حالياً</h2>
                            <p class="text-xs">تأكد من إضافة فيديوهات في مجموعة shared_videos</p>
                        </div>
                    </div>`;
            } else {
                wrapper.innerHTML = vids.map((v, i) => `
                    <div class="swiper-slide bg-black overflow-hidden">
                        <div class="video-player-container">
                            <div id="player-${i}"></div>
                            <div class="absolute inset-0 z-10" onclick="handleTap(${i})"></div>
                            
                            <!-- Sidebar Actions -->
                            <div class="absolute bottom-32 right-4 z-20 flex flex-col gap-6 items-center">
                                <div class="flex flex-col items-center">
                                    <div class="w-12 h-12 bg-zinc-900/60 backdrop-blur-md rounded-full flex items-center justify-center text-xl shadow-lg">❤️</div>
                                    <span class="text-[10px] mt-1 font-bold">${v.likes || '2.4K'}</span>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div class="w-12 h-12 bg-zinc-900/60 backdrop-blur-md rounded-full flex items-center justify-center text-xl shadow-lg">💬</div>
                                    <span class="text-[10px] mt-1 font-bold">120</span>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div class="w-12 h-12 bg-zinc-900/60 backdrop-blur-md rounded-full flex items-center justify-center text-xl shadow-lg">🔗</div>
                                    <span class="text-[10px] mt-1 font-bold">مشاركة</span>
                                </div>
                            </div>

                            <!-- Info -->
                            <div class="absolute bottom-28 left-5 z-20 max-w-[75%]">
                                <h3 class="font-bold text-lg mb-1 drop-shadow-md">@${v.owner || 'fogrener_user'}</h3>
                                <p class="text-sm text-zinc-200 line-clamp-2 leading-relaxed drop-shadow-sm">${v.title || 'استمتع بأفضل المقاطع على منصة فقرينر الأولى في ليبيا 🇱🇾'}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.opacity = '1';

            if(vids.length > 0) {
                initSwiper();
                initPlayers(vids);
            }
        }

        let players = [];
        function initPlayers(vids) {
            vids.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.youtubeId || v.id,
                    playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1, 'iv_load_policy': 3 },
                    events: {
                        'onReady': (e) => { if(i === 0) e.target.playVideo(); }
                    }
                });
            });
        }

        function initSwiper() {
            new Swiper(".mySwiper", {
                direction: "vertical",
                resistanceRatio: 0,
                on: {
                    slideChange: function () {
                        players.forEach(p => p?.pauseVideo());
                        players[this.activeIndex]?.playVideo();
                    }
                }
            });
        }

        function handleTap(i) {
            const state = players[i]?.getPlayerState();
            if(state === 1) players[i].pauseVideo();
            else players[i].playVideo();
        }

        window.onload = initApp;
    </script>
</body>
</html>
