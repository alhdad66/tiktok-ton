<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fogrener - Unfreeze Build</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* كونسول مراقبة الأخطاء - يظهر عند اللزوم */
        #debug-box { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.95); z-index: 9999; display: none; 
            padding: 20px; font-family: monospace; font-size: 12px; color: #0f0; 
            overflow-y: auto; pointer-events: auto;
        }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: #fff; }
        
        .sub-page { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; padding: 25px; overflow-y: auto; }
        .sub-page.active { display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="debug-box">
        <div class="flex justify-between items-center border-b border-zinc-800 mb-4 pb-2">
            <span class="font-bold">تقرير الحالة (Debug)</span>
            <button onclick="document.getElementById('debug-box').style.display='none'" class="text-red-500 font-bold">إغلاق ×</button>
        </div>
        <div id="debug-logs"></div>
    </div>

    <div id="loading-screen" class="fixed inset-0 z-[500] flex flex-col items-center justify-center bg-black">
        <div class="w-12 h-12 border-4 border-red-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loading-text" class="text-zinc-500 cursor-pointer" onclick="toggleDebug()">جاري مزامنة البيانات...</p>
        <button id="emergency-btn" class="mt-10 text-xs text-red-800 hidden" onclick="location.reload()">إعادة تحميل إجبارية</button>
    </div>

    <div id="main-ui" class="opacity-0 transition-opacity duration-500">
        <div class="fixed top-10 left-5 right-5 flex justify-between items-center z-[100]">
            <div class="p-2 bg-zinc-900 rounded-full" onclick="toggleDebug()">⚙️</div>
            <div class="px-4 py-2 bg-zinc-900 rounded-full text-green-400 font-black" id="top-bal">0.0000 💰</div>
        </div>

        <div class="swiper mySwiper h-screen">
            <div class="swiper-wrapper" id="feed"></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="goHome()"><span>🏠</span><span>الرئيسية</span></div>
            <div class="nav-item" onclick="openP('wallet')"><span>💰</span><span>الأرباح</span></div>
            <div class="nav-item" onclick="openP('profile')"><span>👤</span><span>الملف</span></div>
        </div>
    </div>

    <div id="p-wallet" class="sub-page">
        <h2 class="text-3xl font-black mb-10">المحفظة</h2>
        <div class="bg-zinc-900 p-8 rounded-3xl text-center">
            <p class="text-zinc-500 mb-2 text-sm">الرصيد الحالي</p>
            <h1 class="text-5xl font-black text-green-400 mb-8" id="p-bal">$0.0000</h1>
            <button class="w-full bg-white text-black py-4 rounded-2xl font-black" onclick="alert('السحب متاح قريباً')">طلب سحب</button>
        </div>
        <button class="mt-auto text-zinc-600" onclick="goHome()">رجوع</button>
    </div>

    <div id="p-profile" class="sub-page">
        <h2 class="text-3xl font-black mb-10">الملف الشخصي</h2>
        <div class="flex items-center gap-5 mb-10">
            <div id="u-avatar" class="w-20 h-20 rounded-full bg-zinc-800 border-2 border-red-500 overflow-hidden"></div>
            <div>
                <h3 id="u-name" class="font-black text-xl">...</h3>
                <p id="u-id" class="text-xs text-zinc-600 font-mono"></p>
            </div>
        </div>
        <button class="mt-auto text-zinc-600" onclick="goHome()">رجوع</button>
    </div>

    <script>
        function log(m, type="info") {
            const d = document.getElementById('debug-logs');
            const color = type === 'error' ? 'text-red-500' : 'text-zinc-400';
            d.innerHTML = `<div class="mb-2"><span class="${color}">> ${m}</span></div>` + d.innerHTML;
            if(type === 'error') {
                document.getElementById('debug-box').style.display = 'block';
                document.getElementById('emergency-btn').classList.remove('hidden');
            }
        }

        function toggleDebug() {
            const b = document.getElementById('debug-box');
            b.style.display = b.style.display === 'none' ? 'block' : 'none';
        }

        // تهيئة فورية
        const tg = window.Telegram.WebApp;
        tg.expand();
        log("بدء تشغيل Telegram WebApp...");

        const config = JSON.parse(__firebase_config);
        firebase.initializeApp(config);
        const db = firebase.firestore();
        
        // عرض اسم المستخدم فوراً من تليجرام
        const userTg = tg.initDataUnsafe?.user;
        document.getElementById('u-name').innerText = userTg?.first_name || "مستخدم فقرينر";
        document.getElementById('u-avatar').innerHTML = `<img src="https://api.dicebear.com/7.x/identicon/svg?seed=${userTg?.id || '1'}" class="w-full h-full">`;

        async function startApp() {
            try {
                log("محاولة تسجيل الدخول...");
                const u = await firebase.auth().signInAnonymously();
                log("تم الدخول بنجاح ID: " + u.user.uid, "success");
                
                document.getElementById('u-id').innerText = u.user.uid.substring(0,15);
                
                // جلب البيانات مع Timeout
                const dataPromise = db.collection(`/artifacts/${__app_id}/public/data/vULTRAs_Vids`).get();
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout: الخادم لا يستجيب")), 8000));

                const snap = await Promise.race([dataPromise, timeoutPromise]);
                log("تم استلام بيانات الفيديوهات: " + snap.size);
                
                // إظهار الواجهة
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-ui').classList.remove('opacity-0');
                
            } catch (e) {
                log("فشل في بدء التطبيق: " + e.message, "error");
                // حتى لو فشل، نظهر الواجهة عشان الأزرار تشتغل
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-ui').classList.remove('opacity-0');
            }
        }

        function openP(id) {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(`p-${id}`).classList.add('active');
        }

        function goHome() {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
        }

        window.onload = startApp;
    </script>
</body>
</html>
