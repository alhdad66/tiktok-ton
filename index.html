<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة العرض - عبود برو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow: hidden; }
        .swiper { width: 100%; height: 100vh; }
        .interaction-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .interactive-element { pointer-events: auto; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; padding: 15px 0; z-index: 10000; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .page { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: flex !important; }
        
        .glass-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); transition: 0.3s; }
        .red-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.3); }
        .crown-btn { background: linear-gradient(135deg, #f59e0b, #dc2626); box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        
        .timer-badge { position: absolute; top: 110px; left: 20px; background: #dc2626; padding: 8px 15px; border-radius: 50px; z-index: 1000; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: #dc2626; color: #fff; font-size: 10px; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        
        .yt-frame-container { position: relative; width: 100%; height: 100%; pointer-events: auto; z-index: 10; }
        iframe { width: 100%; height: 100%; pointer-events: none; }
        
        .reward-popup { position: fixed; left: 50%; top: 50%; color: #4ade80; font-weight: 900; font-size: 2.5rem; z-index: 20000; pointer-events: none; animation: floatUp 2s forwards; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { opacity:0; transform: translate(-50%, 20px); } 20% { opacity:1; transform: translate(-50%, -20px); } 100% { opacity:0; transform: translate(-50%, -120px); } }

        .admin-tab { padding: 10px; flex: 1; text-align: center; font-weight: bold; border-bottom: 2px solid transparent; opacity: 0.5; }
        .admin-tab.active { border-bottom: 2px solid #f59e0b; opacity: 1; color: #f59e0b; }
        .banned-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body onclick="enableAudioAndPlay()">

    <!-- Banned Screen -->
    <div id="bannedScreen" class="banned-screen">
        <div>
            <h1 class="text-6xl mb-6">🚫</h1>
            <h2 class="text-3xl font-black text-red-600 mb-2">تم حظر حسابك</h2>
            <p class="text-zinc-400">لقد تم حظرك من قبل الإدارة لمخالفة القوانين.</p>
        </div>
    </div>

    <!-- Upper UI -->
    <div class="fixed top-8 left-6 right-6 z-[11000] flex justify-between items-center pointer-events-none">
        <div class="bg-zinc-900/90 px-5 py-2.5 rounded-full border border-white/10 pointer-events-auto flex items-center gap-3 shadow-2xl red-glow">
            <span id="mainBal" class="text-red-500 font-black text-lg tracking-tighter">$0.0000</span>
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_#dc2626]"></div>
        </div>
        <div class="flex gap-3 pointer-events-auto">
            <div id="adminBtn" onclick="switchTab('admin')" class="hidden crown-btn p-3 rounded-full cursor-pointer transition-transform active:scale-90">
                <span class="text-xl">👑</span>
            </div>
            <div onclick="switchTab('notifs')" class="glass-btn p-3 rounded-full cursor-pointer relative transition-transform active:scale-90">
                <span class="text-xl">🔔</span>
                <div id="notifBadge" class="notif-badge hidden">0</div>
            </div>
        </div>
    </div>

    <!-- Home Page -->
    <div id="homePage" class="page active-page !p-0">
        <div id="videoTimer" class="timer-badge hidden">
            <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
            <span id="timerText" class="font-black text-xs text-white">10s</span>
        </div>
        <div class="swiper mySwiper"><div class="swiper-wrapper" id="videoWrapper"></div></div>
    </div>

    <!-- Stats Page -->
    <div id="statsPage" class="page p-6 pt-24">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-14 h-14 bg-red-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg">📊</div>
            <div><h2 class="text-3xl font-black italic">الإحصائيات</h2><p class="text-zinc-500 text-[10px] font-bold uppercase">أداء فيديوهاتك</p></div>
        </div>
        <div class="bg-zinc-900/40 p-5 rounded-[2.5rem] border border-white/5 mb-6"><canvas id="tradingChart" style="max-height: 180px;"></canvas></div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900/60 p-5 rounded-3xl border border-white/5 text-center"><p class="text-[9px] text-zinc-500 font-black uppercase">المشاهدات</p><h4 id="totalViews" class="text-3xl font-black text-white">0</h4></div>
            <div class="bg-zinc-900/60 p-5 rounded-3xl border border-white/5 text-center"><p class="text-[9px] text-zinc-500 font-black uppercase">التفاعل</p><h4 id="totalLikes" class="text-3xl font-black text-white">0</h4></div>
        </div>
        <div class="bg-zinc-900/30 p-6 rounded-[2.5rem] border border-white/5 mb-20 text-center">
            <input id="ytInput" type="text" placeholder="رابط فيديو يوتيوب..." class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-center mb-3 text-xs outline-none focus:border-red-600 text-white">
            <button onclick="handlePublish()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-sm">نشر الفيديو</button>
        </div>
        <div id="myVideosList" class="space-y-3 pb-10"></div>
    </div>

    <!-- Profile Page -->
    <div id="profilePage" class="page !p-0">
        <div class="pt-24 pb-10 text-center bg-gradient-to-b from-red-900/20 to-black">
            <img id="uProfImg" src="" class="w-28 h-28 mx-auto rounded-full border-2 border-red-600 p-1 mb-4">
            <h2 id="uProfName" class="text-2xl font-black italic">...</h2>
            <div class="flex justify-center gap-10 my-6">
                <div class="text-center"><p id="uVidsCount" class="text-xl font-black">0</p><p class="text-[9px] text-zinc-500 uppercase">بث</p></div>
                <div class="text-center"><p id="uFollsCount" class="text-xl font-black">0</p><p class="text-[9px] text-zinc-500 uppercase">متابع</p></div>
            </div>
            <div class="px-10 flex flex-col gap-3">
                <button id="withdrawBtn" onclick="requestWithdraw()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs hidden">سحب الأرباح 💸</button>
                <button id="followBtn" onclick="toggleFollow()" class="w-full bg-red-600 py-4 rounded-2xl font-black text-xs">متابعة</button>
            </div>
        </div>
        <div id="profileGrid" class="grid grid-cols-3 gap-0.5 mt-0.5"></div>
    </div>

    <!-- Notifs Page -->
    <div id="notifsPage" class="page p-6 pt-24">
        <h2 class="text-3xl font-black italic mb-8">التنبيهات 🔔</h2>
        <div id="notifList" class="space-y-4"></div>
    </div>

    <!-- Admin Page -->
    <div id="adminPage" class="page p-0 pt-20 bg-zinc-950">
        <div class="px-6 flex justify-between items-center mb-4">
            <h2 class="text-2xl font-black text-amber-500 italic">لوحة الإدارة 👑</h2>
            <div id="adminStats" class="text-[10px] text-zinc-500 text-right">جاري التحميل...</div>
        </div>
        <div class="flex bg-zinc-900 border-b border-white/5 mb-4">
            <div onclick="setAdminTab('withdraws')" id="adminTab-withdraws" class="admin-tab active">سحوبات</div>
            <div onclick="setAdminTab('users')" id="adminTab-users" class="admin-tab">مستخدمين</div>
            <div onclick="setAdminTab('videos')" id="adminTab-videos" class="admin-tab">فيديوهات</div>
        </div>
        <div class="px-6 pb-20">
            <div id="adminView-withdraws" class="space-y-4"></div>
            <div id="adminView-users" class="hidden space-y-3">
                <input id="adminSearchUsers" oninput="searchUsers(this.value)" type="text" placeholder="بحث عن مستخدم..." class="w-full bg-zinc-900 p-3 rounded-xl text-xs border border-white/5 text-white mb-4">
                <div id="adminUsersList" class="space-y-3"></div>
            </div>
            <div id="adminView-videos" class="hidden space-y-3">
                <div id="adminVideosList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="nav-bar">
        <div onclick="switchTab('home')" class="text-2xl opacity-40 hover:opacity-100 p-2">🏠</div>
        <div onclick="switchTab('stats')" class="bg-red-600 w-16 h-10 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg">+</div>
        <div onclick="switchTab('profile_self')" class="text-2xl opacity-40 hover:opacity-100 p-2">👤</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const config = { apiKey: "", authDomain: "tik-ton-92124.firebaseapp.com", projectId: "tik-ton-92124" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        const tg = window.Telegram.WebApp;
        const tgUser = tg.initDataUnsafe?.user || {};
        const uID = String(tgUser.id || "7416599626"); 
        const userName = tgUser.first_name || "مستخدم مجهول";
        const userImg = tgUser.photo_url || "https://i.ibb.co/vz6V0vD/default-user.png";
        const adminID = "7416599626";

        let allVideos = [], swiper, players = {}, balance = 0, currentTimer = null;
        let myLikes = [], watchedVids = [], myFollowing = [], activeProfileID = null;
        let allUsers = [], isInteractionEnabled = false;

        async function init() {
            const userRef = db.collection("users").doc(uID);
            const userDoc = await userRef.get();
            
            if(!userDoc.exists) { 
                await userRef.set({ name: userName, img: userImg, balance: 1.0, likedVids: [], watchedVids: [], following: [], followersCount: 0, isBanned: false }); 
            } else if(userDoc.data().isBanned) {
                document.getElementById('bannedScreen').style.display = 'flex';
                return;
            }

            if(uID === adminID) {
                document.getElementById('adminBtn').classList.remove('hidden');
                initAdminPanel();
            }

            userRef.onSnapshot(d => {
                if(d.exists) {
                    const data = d.data(); 
                    if(data.isBanned) { window.location.reload(); return; }
                    balance = data.balance || 0;
                    document.getElementById('mainBal').innerText = `$${balance.toFixed(4)}`;
                    myLikes = data.likedVids || []; watchedVids = data.watchedVids || []; myFollowing = data.following || [];
                }
            });

            db.collection("shared_videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                allVideos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderHome(); updateStats(); renderChart();
                if(uID === adminID) renderAdminVideos();
            });

            loadNotifs();
        }

        // تفعيل الصوت والتشغيل عند أول لمسة
        function enableAudioAndPlay() {
            if (!isInteractionEnabled) {
                isInteractionEnabled = true;
                const idx = swiper ? swiper.activeIndex : 0;
                playCurrentVideo(idx);
            }
        }

        function renderHome() {
            const wrap = document.getElementById('videoWrapper');
            const currentIdx = swiper ? swiper.activeIndex : 0;
            wrap.innerHTML = '';
            allVideos.forEach((v, i) => {
                const isLiked = myLikes.includes(v.id);
                wrap.innerHTML += `
                    <div class="swiper-slide relative bg-black">
                        <div class="yt-frame-container" onclick="playCurrentVideo(${i})">
                            <div id="player-${i}"></div>
                        </div>
                        <div class="interaction-layer">
                            <div class="absolute right-5 bottom-40 flex flex-col items-center gap-7">
                                <div class="relative p-0.5 bg-red-600 rounded-full interactive-element" onclick="openProfile('${v.ownerId}')">
                                    <img src="${v.ownerImg || userImg}" class="w-14 h-14 rounded-full object-cover">
                                </div>
                                <div onclick="handleLike('${v.id}', '${v.ownerId}', ${i}, this)" class="interactive-element text-center cursor-pointer transition-transform active:scale-150">
                                    <span class="text-3xl" style="filter: ${isLiked ? 'grayscale(0) drop-shadow(0 0 10px #dc2626)' : 'grayscale(1)'}">❤️</span>
                                    <p class="text-xs font-black mt-1">${v.likes || 0}</p>
                                </div>
                                <div class="interactive-element text-center opacity-70"><span class="text-3xl">✈️</span></div>
                            </div>
                            <div class="absolute bottom-32 right-8 text-right pointer-events-none">
                                <h3 class="text-xl font-black drop-shadow-lg">@${v.ownerName}</h3>
                                <p class="text-[10px] text-zinc-400 font-bold mt-1">بث مباشر يوتيوب 🎬</p>
                            </div>
                        </div>
                    </div>`;
            });
            if(swiper) swiper.destroy();
            swiper = new Swiper(".mySwiper", { 
                direction: "vertical", initialSlide: currentIdx, 
                on: { slideChange: () => { stopVideos(); startTimerProcess(swiper.activeIndex); } } 
            });
            setTimeout(initPlayers, 500);
            startTimerProcess(currentIdx);
        }

        function initPlayers() {
            allVideos.forEach((v, i) => {
                players[i] = new YT.Player(`player-${i}`, {
                    videoId: v.videoId,
                    playerVars: { autoplay: 1, controls: 0, modestbranding: 1, playsinline: 1, rel: 0, loop: 1, playlist: v.videoId, mute: isInteractionEnabled ? 0 : 1 },
                    events: { 
                        'onReady': (e) => { if(i === swiper.activeIndex && isInteractionEnabled) e.target.playVideo(); },
                        'onStateChange': (e) => { 
                            if(e.data == 1 && i == swiper.activeIndex) startActualCountdown(i); 
                            if(e.data == 0) e.target.playVideo(); // إعادة التشغيل التلقائي
                        } 
                    }
                });
            });
        }

        function playCurrentVideo(idx) {
            if(players[idx]) {
                players[idx].unMute();
                players[idx].playVideo();
            }
        }

        function startTimerProcess(idx) {
            playCurrentVideo(idx);
        }

        function startActualCountdown(idx) {
            clearInterval(currentTimer);
            const v = allVideos[idx];
            const badge = document.getElementById('videoTimer');
            if(!v || v.ownerId === uID || watchedVids.includes(v.id)) { badge.classList.add('hidden'); return; }
            badge.classList.remove('hidden');
            let sec = 10;
            document.getElementById('timerText').innerText = sec + "s";
            currentTimer = setInterval(async () => {
                sec--;
                document.getElementById('timerText').innerText = sec + "s";
                if(sec <= 0) {
                    clearInterval(currentTimer);
                    badge.classList.add('hidden');
                    showRewardPopup();
                    // تحديث الربح دون لمس حالة الفيديو
                    await db.collection("users").doc(uID).update({ 
                        balance: firebase.firestore.FieldValue.increment(0.0005),
                        watchedVids: firebase.firestore.FieldValue.arrayUnion(v.id)
                    });
                    await db.collection("shared_videos").doc(v.id).update({ views: firebase.firestore.FieldValue.increment(1) });
                }
            }, 1000);
        }

        async function handleLike(vidId, ownerId, playerIdx, el) {
            playCurrentVideo(playerIdx);
            const isLiked = myLikes.includes(vidId);
            const p = el.querySelector('p'); const icon = el.querySelector('span');
            icon.style.filter = isLiked ? "grayscale(1)" : "grayscale(0) drop-shadow(0 0 10px #dc2626)";
            p.innerText = isLiked ? Math.max(0, parseInt(p.innerText)-1) : parseInt(p.innerText)+1;
            if(isLiked) {
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(-1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayRemove(vidId) });
            } else {
                await db.collection("shared_videos").doc(vidId).update({ likes: firebase.firestore.FieldValue.increment(1) });
                await db.collection("users").doc(uID).update({ likedVids: firebase.firestore.FieldValue.arrayUnion(vidId) });
                if(ownerId !== uID) {
                    db.collection("users").doc(ownerId).collection("notifs").add({
                        message: `🔥 أعجب @${userName} بفيديوهك!`, seen: false, createdAt: new Date()
                    });
                }
            }
        }

        // --- Admin Functions ---
        function initAdminPanel() {
            db.collection("users").onSnapshot(snap => {
                allUsers = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderAdminUsers();
                document.getElementById('adminStats').innerHTML = `مستخدمين: ${allUsers.length}<br>فيديوهات: ${allVideos.length}`;
            });
            loadWithdrawsForAdmin();
        }

        function setAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`adminTab-${tab}`).classList.add('active');
            document.getElementById('adminView-withdraws').classList.add('hidden');
            document.getElementById('adminView-users').classList.add('hidden');
            document.getElementById('adminView-videos').classList.add('hidden');
            document.getElementById(`adminView-${tab}`).classList.remove('hidden');
        }

        function renderAdminUsers() {
            const list = document.getElementById('adminUsersList'); list.innerHTML = '';
            allUsers.forEach(u => {
                list.innerHTML += `
                    <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <img src="${u.img}" class="w-10 h-10 rounded-full border border-white/10">
                            <div><h4 class="text-xs font-black ${u.isBanned ? 'line-through text-zinc-500' : ''}">${u.name}</h4><p class="text-[10px] text-amber-500 font-bold">$${(u.balance || 0).toFixed(4)}</p></div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="adminEditBalance('${u.id}', ${u.balance})" class="bg-zinc-800 p-2 rounded-lg text-xs">💰</button>
                            <button onclick="adminToggleBan('${u.id}', ${u.isBanned})" class="${u.isBanned ? 'bg-green-600' : 'bg-red-600'} px-3 py-2 rounded-lg text-[10px] font-bold">${u.isBanned ? 'فك' : 'حظر'}</button>
                        </div>
                    </div>`;
            });
        }

        function renderAdminVideos() {
            const list = document.getElementById('adminVideosList'); list.innerHTML = '';
            allVideos.forEach(v => {
                list.innerHTML += `
                    <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-12 h-8 rounded-md object-cover">
                            <div><h4 class="text-[10px] font-black italic">بواسطة: ${v.ownerName}</h4><p class="text-[9px] text-zinc-500">ID: ${v.videoId}</p></div>
                        </div>
                        <button onclick="delVid('${v.id}')" class="bg-red-600/20 text-red-500 p-2 rounded-lg text-xs">🗑️</button>
                    </div>`;
            });
        }

        async function adminEditBalance(id, current) {
            const amount = prompt(`الرصيد الحالي: $${current.toFixed(4)}\nأدخل القيمة:`);
            if(!amount || isNaN(amount)) return;
            await db.collection("users").doc(id).update({ balance: firebase.firestore.FieldValue.increment(parseFloat(amount)) });
        }

        async function adminToggleBan(id, currentBan) {
            if(confirm(currentBan ? "فك الحظر؟" : "حظر المستخدم؟")) await db.collection("users").doc(id).update({ isBanned: !currentBan });
        }

        function searchUsers(val) {
            const query = val.toLowerCase();
            const cards = document.getElementById('adminUsersList').children;
            allUsers.forEach((u, i) => { cards[i].style.display = u.name.toLowerCase().includes(query) ? 'flex' : 'none'; });
        }

        // --- Core App Functions ---
        async function openProfile(id) {
            activeProfileID = id;
            const doc = await db.collection("users").doc(id).get();
            const data = doc.exists ? doc.data() : {};
            document.getElementById('uProfName').innerText = data.name || "...";
            document.getElementById('uProfImg').src = data.img || userImg;
            document.getElementById('uFollsCount').innerText = data.followersCount || 0;
            const btn = document.getElementById('followBtn'); const wBtn = document.getElementById('withdrawBtn');
            if(id === uID) { btn.classList.add('hidden'); wBtn.classList.remove('hidden'); }
            else { btn.classList.remove('hidden'); wBtn.classList.add('hidden'); btn.innerText = myFollowing.includes(id) ? "إلغاء المتابعة" : "متابعة"; }
            updateProfileGrid(); switchTab('profile');
        }

        function updateProfileGrid() {
            const grid = document.getElementById('profileGrid'); grid.innerHTML = '';
            allVideos.filter(v => v.ownerId === activeProfileID).forEach(v => {
                grid.innerHTML += `<div class="aspect-[9/16] bg-zinc-900 overflow-hidden" onclick="goToVideo(${allVideos.findIndex(vid=>vid.id===v.id)})"><img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`;
            });
        }

        function goToVideo(idx) { switchTab('home'); setTimeout(() => swiper.slideTo(idx), 300); }

        async function handlePublish() {
            const val = document.getElementById('ytInput').value;
            const vidId = val.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
            if(vidId) {
                await db.collection("shared_videos").add({ videoId: vidId, ownerId: uID, ownerName: userName, ownerImg: userImg, views: 0, likes: 0, createdAt: new Date() });
                document.getElementById('ytInput').value = ''; alert("تم النشر! 🚀");
            }
        }

        function updateStats() {
            const mine = allVideos.filter(v => v.ownerId === uID);
            let views = 0, likes = 0; mine.forEach(v => { views += (v.views || 0); likes += (v.likes || 0); });
            document.getElementById('totalViews').innerText = views; document.getElementById('totalLikes').innerText = likes;
            const list = document.getElementById('myVideosList'); list.innerHTML = '';
            mine.forEach(vid => {
                list.innerHTML += `<div class="bg-zinc-900/60 p-4 rounded-3xl border border-white/5 flex items-center justify-between mb-2">
                    <img src="https://img.youtube.com/vi/${vid.videoId}/mqdefault.jpg" class="w-10 h-10 rounded-lg">
                    <p class="text-[10px] font-black">👁️ ${vid.views} | ❤️ ${vid.likes}</p>
                    <button onclick="delVid('${vid.id}')" class="text-red-500 font-bold text-[9px]">حذف</button>
                </div>`;
            });
        }

        async function delVid(id) { if(confirm("حذف؟")) await db.collection("shared_videos").doc(id).delete(); }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            if(t === 'profile_self') { openProfile(uID); return; }
            document.getElementById(t + 'Page').classList.add('active-page');
            stopVideos(); if(t === 'home') startTimerProcess(swiper.activeIndex);
        }

        function stopVideos() { Object.values(players).forEach(p => p.pauseVideo && p.pauseVideo()); clearInterval(currentTimer); }
        function showRewardPopup() { const el = document.createElement('div'); el.className = 'reward-popup'; el.innerText = '+$0.0005'; document.body.appendChild(el); setTimeout(() => el.remove(), 2000); }
        
        function renderChart() {
            const ctx = document.getElementById('tradingChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, { type:'line', data:{labels:['1','2','3','4','5'], datasets:[{data:[10,40,25,70,55], borderColor:'#dc2626', fill:true, backgroundColor:'rgba(220,38,38,0.1)', tension:0.4, pointRadius:0}]}, options:{plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}}} });
        }

        async function requestWithdraw() {
            if(balance < 0.01) return alert("الحد الأدنى $0.01");
            const amt = parseFloat(prompt(`المبلغ (رصيدك $${balance.toFixed(4)}):`));
            const wall = prompt("محفظة USDT (TRC20):");
            if(amt && wall) {
                await db.collection("users").doc(uID).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                await db.collection("withdraws").add({ uID, userName, amount: amt, wallet: wall, status: 'pending', createdAt: new Date() });
                alert("تم الطلب!");
            }
        }

        function loadNotifs() {
            db.collection("users").doc(uID).collection("notifs").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('notifList'); list.innerHTML = '';
                snap.forEach(doc => { list.innerHTML += `<div class="bg-zinc-900 p-4 rounded-2xl border-r-4 border-red-600 mb-2 text-xs font-bold">${doc.data().message}</div>`; });
            });
        }

        function loadWithdrawsForAdmin() {
            db.collection("withdraws").where("status", "==", "pending").onSnapshot(snap => {
                const list = document.getElementById('adminView-withdraws'); list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="bg-zinc-900 border border-white/5 rounded-3xl p-5 mb-3">
                        <p class="text-xs">${d.userName}</p><h3 class="text-2xl font-black">$${d.amount.toFixed(4)}</h3>
                        <div class="flex gap-2 mt-4"><button onclick="handleAdminAction('${doc.id}','approved','${d.uID}',0)" class="flex-1 bg-green-600 py-3 rounded-xl font-bold">موافقة</button></div>
                    </div>`;
                });
            });
        }

        window.onload = init;
        function onYouTubeIframeAPIReady(){}
    </script>
</body>
</html>
